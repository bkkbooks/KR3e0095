body:
  text: 絳雪園古方選注醫家類提要臣等謹案絳園園古方選注三卷國朝王子接撰子接字晉三長洲人自古集經方者不過註某丸某散主治某症而已其兼論病源脉候者已不多見至於製方之意則未有發明之者近始有醫方集解然所見較淺亦未盡窺運用之本㫖是書所選之方雖非秘異而其中加減之道銖兩之宜君臣佐使之義皆能推闡其所以然前有自序稱釐為三卷上卷獨明仲景一百一十三方三百九十七法中下二卷發明内科女科外科幼科眼科及各科之方未附雜方藥性以書按之則和寒温汗吐下六劑及内科以下諸科上中下三品本草俱各自為帙不題卷數葢其門人葉桂吳蒙等所分非子接之舊也今仍定為三卷以還其舊而得宜本草則附於末焉乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:80e47a5904c5904b2137eb9e898cc083fa59ca93c60742e7f37087a078ce616c
