body:
  text: 絳雪園古方選注醫家類提要臣等謹案絳園園古方選注三卷國朝王子接撰子接字晉三長洲人自古集經方者不過注某丸某散主治某症而已其兼論病源脉候者已不多見至於製方之意則未有發明之者近始有醫方集解然所見較淺亦未盡窺運用之本㫖是書所選之方雖非祕異而其中加減之道銖兩之宜君臣佐使之義皆能推闡其所以然前有自序稱釐為三卷上卷獨明仲景一百一十三方三百九十七法中下二卷發明內科女科外科幼科眼科及各科之方未附雜方藥性以書按之則和寒溫汗吐下六劑及內科以下諸科上中下三品本草俱各自為帙不題卷數蓋其門人葉桂吳蒙等所分非子接之舊也今仍定為三卷以還其舊而得宜本草則附於末焉乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:fa079c58703d8c9b8a37a03712103bf5f65aa72b3910cb500bb6a536e3b0505b
