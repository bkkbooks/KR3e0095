body:
  text: 絳雪園古方選註卷二蘇州王子接撰寒劑白虎湯石膏一觔碎綿裹知母六兩甘草二兩炙粳米六合右四味以水一斗煑米熟湯成去滓温服一升日三服白虎湯治陽明經表裏俱熱與調胃承氣湯為對峙調胃承氣導陽明腑中熱邪白虎泄陽明經中熱邪石膏泄陽知母滋陰粳米緩陽明之陽甘草緩陽明之陰因石膏性重知母性滑恐其疾趨於下另設煎法以米熟湯成俾辛寒重滑之性得粳米甘草載之於上逗遛陽明成清化之功名曰白虎者虎為金獸以明石膏知母之辛寒肅清肺金則陽明之熱自解實則瀉子之理也白虎加人參湯石膏一斤碎綿裹知母六兩甘草二兩炙粳米六合人參三兩右五味以水一斗煑米熟湯成去滓温服一升日三服陽明熱病化燥用白虎加人葠者何也石膏辛寒僅能散表熱知母甘苦僅能降裏熱甘草粳米僅能載藥留於中焦若胃經熱久傷氣氣虚不能生津者必須人參養正囘津而後白虎湯乃能清化除燥竹葉石膏湯竹葉二把石膏一斤麥門冬一升去心人參三兩半夏半升洗甘草二兩炙粳米半升右七味以水一斗煑取六升去滓内粳米煑米熟湯成去米温服一升日三服竹葉石膏湯分走手足二經而不悖於理者以胃居中焦分行津液於各臟補胃瀉肺有補母瀉子之義也竹葉石膏麥冬瀉肺之熱人參半夏炙草平胃之逆複以粳米緩於中使諸藥得成清化之功是亦白虎越脾麥冬三湯變方也葛根黄芩黄連湯葛根八兩甘草三兩黄芩三兩黄連三兩右四味以水八升先煑葛根減二升内諸藥煑取二升去滓分温再服是方即瀉心湯之變治表寒裏熱其義重在芩連肅清裏熱雖以葛根為君再為先煎無非取其通陽明之津佐以甘草緩陽明之氣使之鼔舞胃氣而為承宣苦寒之使清上則喘定清下則利止裏熱解而邪亦不能留戀於表矣梔子栢皮湯梔子十五箇擘甘草一兩炙黄栢二兩右三味以水四升煑取一升半去滓分温再服梔子栢皮表劑也以寒勝熱以苦燥濕已得治黄之要矣而乃緩以甘草者黄必内合太陰之濕化若發熱者熱已不瘀於裏有出表之勢故汗下皆所不必但當奠安脾土使濕熱二邪不能復合其黄自除梔子厚朴湯言熱梔子乾薑湯言寒治皆在裏此章之治則在表也白頭翁湯白頭翁二兩秦皮三兩黄連三兩黄栢皮三兩右四味以水七升煑取二升去滓温服一升白頭翁湯治厥陰熱利後重者太少二陰下利屬寒惟厥陰下利主熱以厥陰司相火也故以白頭翁凉陽明血分之熱秦皮收厥陰之濕黄連勝中焦之熱黄柏燥下焦之濕四者皆味苦性寒直入下焦堅陰止利考本草白頭翁秦皮各列品類而今世所用乃於柴胡中揀出紫皮頭有白毛者為白頭翁以防風細辛之紥縛為秦皮余謂白頭翁沾柴胡之氣可入少陽秦皮沾細辛之氣可入少陰當與禹餘糧湯並叅但漢時採藥未識亦如是否存之以質君子文蛤散文蛤五兩右一味為散以沸湯和一錢七服湯用五合蛤稟天一之剛氣而生故能獨用建功味醎性燥醎寒足以勝熱寒燥足以滲濕大陷胸湯治太陽内水結於胸鬲此治水寒之氣外鬱於表陽縮於内而成結胸只須滲泄水氣功斯畢矣取用紫斑紋者得陰陽之氣若黯色無紋者餌之令人狂走赴水大黄黄連瀉心湯大黄二兩黄連一兩右二味以麻沸湯二升漬之須臾絞去滓分温再服痞有不因下而成者君火亢盛不得下交於陰而為痞按之虚者非有形之痞獨用苦寒便可泄却如大黄瀉營分之熱黄連泄氣分之熱且大黄有攻堅破結之能其泄痞之功即寓於瀉熱之内故以大黄名其湯以麻沸湯漬其須臾去滓取其氣不取其味治虚痞不傷正氣也茵陳蒿湯茵陳蒿六兩梔子十四枚擘大黄二兩去皮右三味以水一斗先煑茵陳減六升内二味煑取三升去滓分温三服小便當利尿如皂角汁狀色正赤一宿腹減黄從小便去也茵陳散肌表之濕得大黄則兼瀉中焦之鬱熱山梔逐肉理之濕得大黄則兼瀉上焦之鬱熱惟其性皆輕浮故與大黄僅入氣分泄熱利小便建退黄之功與調胃承氣僅瀉無形之熱同義無枳實芒硝不能疾行大便故不得妄稱為下法猪膚湯猪膚一斤用白皮去其内肥刮令如紙薄右一味以水一斗煑取五升去滓加白蜜一升白粉五合熬香和令相得温分六服腎應彘而肺主膚腎液下泄不能上蒸於肺致絡燥而為咽痛者又非甘草所能治矣當以猪膚潤肺腎之燥解虚煩之熱白粉白蜜緩於中俾猪膚比類而致津液從腎上入肺中循喉嚨復從肺出絡心注胸中而上中下燥邪解矣絳雪園古方選註卷二
