body:
  text: 絳雪園古方選注卷八蘇州王子接撰內科丸方腎氣丸熟地八兩山茰肉四兩山藥四兩澤瀉三兩丹皮三兩白茯苓三兩肉桂一兩熟川附子一兩右為末煉蜜為丸梧子大每服五七十丸空心淡鹽湯送或臨卧溫酒下每服當以美膳壓之前方加牛膝車前子即金匱腎氣丸腎氣丸者納氣歸腎也地黃茰肉山藥補足三隂經澤瀉丹皮茯苓補足三陽經臟者藏精氣而不泄以填塞濁隂為補腑者如府庫之出入以通利清陽為補復以肉桂從少陽納氣歸肝復以附子從太陽納氣歸腎金匱再復以牛膝導引入肝車前導引入腎分頭導納絲絲不亂獨取名腎氣者雖曰乙癸同源意尤重於腎也六味地黃丸熟地八兩山茰四兩去核山藥四兩澤瀉三兩丹皮三兩茯苓三兩右法製共搗爛烘燥入磨為末煉蜜丸桐子大每服七八十丸空心淡鹽湯下冬用酒下六味者苦酸甘鹹辛淡也隂陽應象論曰精不足者補之以味五臟之精皆賴腎氣閉藏故以地黃名其丸地黃味苦入腎固封蟄之本澤瀉味鹹入膀胱開氣化之源二者補少隂太陽之精也茰肉味酸入肝補羆極之勞丹皮味辛入膽清中正之氣二者補厥隂少陽之精也山藥味甘入脾健消運之機茯苓味淡入胃利入出之器二者補太隂陽明之精也足經道逺故制以大足經在下故治以偶錢仲陽以腎氣丸裁去桂附治小兒純陽之體始名六味後世以六味加桂名七味再加附子名八味方義昧矣扁鵲玉壺丸硫黃八兩右法製服食具載注中玉壺指人身而言道書曰金精滿鼎氣歸根玉液盈壺神入室玄夀先生曰硫是礬之液礬是鐵之精生於溫泉産於山旁有水火既濟之妙本草止治隂寒惡疾不言治臌今人用治命門火衰陽氣暴絶寒水臌脹却有神功獨是難於制死余得異授并志製法以廣仁術凡硫黃八兩配真麻油八兩以硫打碎入冷油內燉爐上炭火宜微勿烈以桑條徐調候硫溶盡即傾入大水內急攙去上面油水其色如金取缸底淨硫稱見若干兩仍配香麻油若干兩照前火候再溶再傾連前共三轉第四轉用真棉花核油配硫若干兩照前火候再溶再傾入大水內急攙去上面油水其色如絳第五轉用肥皂四兩水中同煮六時第六轉用皂莢四兩水中同煮六時拔淨製硫之油攙去其水其色如硫火之紫第七轉用爐中炭灰淋鹻水製六時第八轉用水豆腐製六時拔淨皂鹻之性第九轉用田字草搗汁田字草出水荒稻田中其葉如田字八九月採和水製六時臨用研如飛麵凡淨硫一兩配炒糯米粉二兩或水法或濕搗為丸每服以硫三分為凖漸加至一錢開水溫送下天王補心丹其方有四惟此道藏者通人參五錢當歸一兩柏子仁一兩丹參五錢茯神五錢棗仁一兩天門冬一兩麥門冬一兩五味子一兩生地四兩元參五錢逺志肉五錢桔梗五錢右法製為末蜜丸彈子大硃砂為衣燈心湯服一丸或噙化補心者補心之用也心藏神而神之所用者魂魄意智精與志也補其用而心能任物矣本神篇曰隨神往來者謂之魂當歸柏子仁丹參流動之藥以悅其魂心之所憶謂之意人參茯神調中之藥以存其意因思慮而處物謂之智以棗仁靜招乎動而益其智並精出入者謂之魄以天冬麥冬五味子寧靜之藥而安其魄生之來謂之精以生地玄參填下之藥定其精意之所存謂之志以逺志桔梗動生於靜而通其志若是則神之陽動而生魂魂之生而為意意交於外而智生焉神之隂靜而生魄魄之生而為精精定於中而志生焉神之為用不窮矣故曰補心四神丸補骨脂四兩肉豆蔲二兩吳茱茰一兩五味子三兩右為末用大棗百枚生薑八兩切片同煮棗爛去薑取棗搗丸每服二錢臨卧鹽湯送下四神者四種之藥治腎泄有神功也補骨脂通癸水之真陽肉豆蔲保戊土之真氣俾戊癸化火以運榖氣吳茱茰逺肝邪而散虛寒五味子攝腎氣而固真隂薑棗和營衛辛酸相輔助陽強隂則腎關自鍵固矣斑龍丸鹿角霜八兩鹿角膠八兩菟絲子八兩補骨脂四兩柏子仁八兩熟地八兩白茯苓四兩右將膠溶化量入無灰酒打糊為丸每服六七十丸淡鹽湯下乾寧記云鹿與遊龍相戲必生異角故得稱龍鹿有文故稱斑用其角為方故名斑龍鹿卧則口朝尾閭故為奇經督脈之方凡入房竭精耗散其真形神俱去雖溫之以氣補之以味不能復也故以有情之品專走督脈復以少隂太陽之藥治其合乃能搬運精髓填於骨空大會於督脈之𩕄會而髓海充盈鹿角霜通督脈之氣也鹿角膠溫督脈之血也菟絲骨脂溫腎中之氣也熟地柏仁補腎中之精也柏仁屬木性潤骨脂屬火性燥非但有木火相生之妙而柏仁通心骨脂通腎并有水火既濟之功使以茯苓性上行而功下降用以接引諸藥歸就少隂太陽逹於督脈上潮髓海而成搬運之功昔蜀中有道士酣歌酒肆曰尾閭不禁滄海竭九轉靈丹都漫説惟有斑龍頂上珠能補玉堂關下穴淡寮方用鹿茸為君者餘藥亦不同此茸珠丹非斑龍丸也今從青囊之方天真丸精羊肉七斤去筋膜脂皮批開入後藥當歸十二兩洗去蘆鮮山藥十兩去皮肉蓯蓉十兩去甲清水浸淡晒乾天門冬去心焙乾一斤右四味共搗烘燥磨末安羊肉內裹縳用無灰酒四瓶煮令酒盡再入水二升煮候羊肉糜爛再入後藥黃耆五兩蜜炙為末人參末三兩白术炒二兩為末熟糯米飯焙乾作餅將前後藥末和丸梧子大一日二次服三百丸溫酒下如難丸用蒸餅五七枚焙乾入臼中杵千下丸之形不足者補之以氣精不足者補之以味養形補精以全神故名天真人參黃耆白术養其形也當歸羊肉山藥補其精也肉蓯蓉暖腎中之陽引精氣以歸根天門冬保肺中之隂致髙原於清肅嘗按古方溫燥藥中必復滋隂保肺亦恐未得補陽之功先傷肺經隂氣爾喻嘉言力贊此方可謂長於用補其法製甚精允為補方之首大造丸紫河車一具用米泔水浸逾時輕輕擺開換水洗潔淨白如楊妃色者佳用竹器盛於長流水內浸一刻取生氣提回再入川椒滚湯內一過以鉛罐封固隔湯煮一伏取出先傾汁入藥用石臼木椎搗極勻入後藥熟地以生地五兩砂仁一兩二錢茯苓切塊四兩絹袋盛入瓦罐酒煮七次去砂苓晒乾二兩生地一兩五錢淡天門冬七錢去心清水浸五日晒乾當歸七錢枸把子一兩五錢牛膝七錢酒拌蒸五味子七錢淡肉蓯蓉七錢去甲切片浸去白膜以淡為度晒乾黃櫱七錢鹽水炒瑣陽七錢酒淨生杜仲一兩另磨去綿右法製為末河車搗為丸量加煉蜜每服三錢侵晨百滚湯送大造者其功之大有如再造故名括蒼吳球宗丹溪之旨創立大造丸世咸遵之第藥品配合未臻玄奧余即參丹溪潛隂之法而為損益焉上能金水相生下可肝腎同治潛隂固陽功倍原方河車得父母精中之氣而成乃乾坤之槖籥鉛汞之匡廓所謂胚胎兆九混元歸一者也為補養先天之妙品用熟地即以生地為佐乃白飛霞天一生水之法當歸枸把益血添精牛膝杜仲強筋壯骨肉蓯蓉暖腎中真陽五味子攝腎中真隂天冬保肺恐邪火上僭爍金黃柏堅隂下守丹田真氣復以瑣陽之澀封固周密諸法具備力量宏深夫是謂之大造庶得曰可固精丸鹿茸一具鹿角霜分兩同茸陽起石五錢韭菜子一兩淡肉蓯蓉一兩五味子五錢茯苓五錢熟附子五錢巴戟肉五錢青花龍骨五錢煆赤石脂五錢煆右為細末酒煮糊為丸如梧子大每服七十丸空心鹽湯送下固精丸治無夢之滑精夫房勞過度則精竭陽虛陽虛則無氣以制其精故寐則陽陷而精道不禁隨觸隨泄不必夢而遺也與走陽不甚相逺治之必須提陽固氣乃克有濟獨用補澀無益也鹿茸通督脈之氣舍鹿角霜通督脈之精室陽起石提陷下之真陽韭菜子去淫欲之邪火肉蓯蓉暖腎中真陽五味子攝腎中真隂巴戟入隂附子走陽引領真陽運行陽道不使虛火陷入於隂白茯苓淡滲經氣使諸藥歸就腎經用石脂龍骨攔截精竅之氣而成封固之功葶藶丸葶藶隔紙炒杏仁麩炒去皮尖桑根白皮銼豬苓去黑皮澤瀉椒目已上各五錢右搗羅為末煉蜜為丸如桐子大每服二十丸蔥白湯下病不知加至三十丸聖濟方有牽牛五錢葶藶丸治涌水涌或作湧按經義肺移寒於腎為涌水者無形之邪移於肺之子也按之腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿者明係腹不堅是土虛水泛水閉鬱而不流則客於大腸有形之邪反涌於肺之腑也聖濟治涌水十三方亦有從大腸溫下之者河間採擇是方仍從肺腎主治葶藶杏仁桑皮泄肺經之氣閉豬苓澤瀉椒目從腎經瀉其水溢原方牽牛子利大腸下水積其性雄烈因證屬土虛故去之恐犯虛虛之戒也檳榔丸檳榔銼大黃銼炒枳殼去瓤麩炒各二兩桃仁去皮尖麩炒大麻仁炒木香各一兩聖濟方有青皮湯浸去白一兩蜜丸每服十丸溫酒下檳榔丸與潤腸通幽二方同義和劑也治小腸移熱於大腸之虙瘕證夫大腸為傳道之腑熱則氣結液耗腹痛便澀然或有時而通故腹雖有形聚散靡常是為虙瘕虙者伏也瘕與瑕通女病恆有之君以檳榔佐以木香枳殼泄決大腸之氣臣以大黃桃仁麻仁潤下大腸之熱治在腑者宣而通之病在下者因而奪之河間減去青皮勿雜肝膽之藥也左金丸吳茱茰去閉口鹽水浸一伏一兩川黃連六兩鹽水炒右為末水法為丸或粥糊丸每服三十丸開水送經脈循行左升右降藥用苦辛肅降行於升道故曰左金吳茱茰入肝散氣降下甚捷川黃連苦燥胃中之濕寒勝胃中之熱臟惡熱而用熱腑惡寒而用寒是謂反治乃損其氣以泄降之七損之法也當知可以治實不可以治虛若勿論虛實而用之則誤矣礞石滚痰丸青礞石一兩以焰硝一兩同入瓦罐鹽泥固齊晒乾火煅石色如金為度無金星者不用黃芩八兩大黃八兩酒蒸沉香五錢右為細末水法為丸每服三五十丸量人強弱加減礞石性寒下降隂也焰硝性熱上升陽也用以同煅不特取焰硝有化石之能并與礞石有隂陽相濟之妙是方也治痰之功在於礞石然獨能攻肝經風熱老痰與他臟之痰不相及也王隱君云其痰似墨有如桃膠破絮蜆肉之狀咯之不出咽之不下形堅性重入水必沉服之其痰下滚從大便而出復以黃芩肅肺經清化之源大黃瀉脾經釀痰之熱沉香利腎經生痰之本三焦清利痰自不生是礞石治其本三者窮其原爾威喜丸雲茯苓去皮四兩作匱以豬苓四錢半入內煮二十餘沸日乾揀去豬苓晒乾為度黃蠟四兩溶化右即以蠟丸彈子大空心細嚼滿口生津徐徐咽下以小便清為度忌米醋尤忌怒氣勞力抱朴子云茯苓千萬嵗其上生小木狀似蓮花名威喜芝今以名方者須擇雲茯苓之年深質結者製以豬苓導之下出前隂蠟淡歸陽不能入隂須用黃蠟性味緩澀有續絶補髓之功專調斫喪之陽分理潰亂之精故治元陽虛憊而為遺濁帶下者若治肺虛痰火久嗽茯苓不必結而豬苓亦可不用矣鱉甲煎丸鱉甲十一分炙阿膠三分炙蜣螂六分熬蜂房四分炙蟅蟲五分熬鼠婦三分熬葶藶一分熬大黃三分赤消十二分桃仁二分烏扇三分燒即射干紫威三分柴胡六分桂枝三分乾薑三分黃苓三分半夏一分厚朴三分瞿麥二分石葦三分去毛人參一分芍藥五分丹皮五分去心右二十三味為末取鍛竈下灰一斗清酒一斛五斗浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁內諸藥煎為丸如梧子大空心服七丸日三服鱉甲煎丸都用異類靈動之物若水陸若飛潛升者降者走者伏者咸備焉但恐諸蟲擾亂神明取鱉甲為君守之其泄厥隂破癥瘕之功有非草木所能比者阿膠達表熄風鱉甲入裏守神蜣螂動而性升蜂房毒可引下蟅蟲破血鼠婦走氣葶藶泄氣閉大黃泄血閉赤消軟堅桃仁破結烏扇降厥陽相火紫威破厥隂血結乾薑和陽退寒黃芩和隂退熱和表裏則有柴胡桂枝調營衛則有人參白芍厚朴達原劫去其邪丹皮入隂提出其熱石葦開上焦之水瞿麥滌下焦之水半夏和胃而通隂陽竈灰性溫走氣清酒性暖走血統而論之不越厥隂陽明二經之藥故久瘧邪去營衛而著臟腑者即非瘧母亦可借以截之按金匱惟此丸及薯芋丸藥品最多皆治正虛邪著久而不去之病非彚集氣血之藥攻補兼施未易奏功也虎潛丸龜甲四兩炙虎脛骨一兩炙熟地三兩當歸一兩五錢酒洗白芍二兩酒炒牛膝二兩酒蒸陳皮二兩鹽水潤黃柏三兩鹽水炒知母三兩鹽水炒瑣陽一兩五錢酒潤右為末羯羊肉酒煮爛搗丸鹽湯下冬加乾薑一兩虎隂獸潛伏藏也臟隂不藏內熱生痿者就本臟分理以伏藏其隂也故用龜甲為君專通任脈使其肩任三隂臣以虎骨熄肝風丸以羊肉補精髓三者皆有情之品能戀失守之隂佐以地黃味苦補腎當歸味辛補肝使以牛膝行血陳皮利氣芍藥約隂下潛知柏苦以堅之鎖陽澀以固之其隂氣自然伏藏而內守矣黑地黃丸白术一兩六錢炒黑熟地一兩六錢炒黑五味子八錢蒸熟生淡乾薑清水浸淡春七分夏五分冬一錢右為末棗肉為丸每服百丸清米飲湯送下地黃丸名之以黑者白术熟地皆須炒黑也經言脾寒則溼腎熱則燥故治脾惡潤劑治腎惡燥劑許學士云用白术則有礙於腎用熟地則有礙於脾今以二者炒黑乃去其味留其氣庶可兩擅其長治上咳下利脈至細數者頗有效白术熟地扶太隂少隂先後天之正氣五味子乾薑獨攝太陽之表氣保肺止嗽仲景云太陽膀胱嗽不止者當加五味子乾薑是也來復丹太隂玄精石一兩舶上硫黃一兩橘紅二錢硝石一兩用硫黃為末微火炒結砂子大青皮二錢去白五靈脂二錢澄去砂炒令煙盡右為末醋糊丸豌豆大每服三十丸空心米飲下易言一陽來復於下在人則為少陽生氣所出之臟病上盛下虛則陽氣去生氣竭此丹能復陽於下故曰來復玄精石乃鹽鹵至隂之精硫黃乃純陽石火之精寒熱相配隂陽互濟有扶危拯逆之功硝石化硫為水亦可佐玄硫以降逆靈脂引經入肝最速能引石性內走厥隂外達少陽以交隂陽之樞紐使以橘紅青皮者納氣必先利氣用以為肝膽之向導也至寶丹暹羅犀角鎊硃砂研水飛觀音靣者佳雄黃研水飛琥珀研玳瑁鎊各一兩牛黃五錢麝香研龍腦研各一錢金銀箔各五十片水安息香一兩無灰酒熬成膏如無以旱安息香代之右將犀玳為細末入餘藥研勻將安息膏重湯煮入諸藥搜和分作百丸蠟護臨服剖用參湯化下至寶丹治心臟神昏從表透裏之方也犀角牛黃玳瑁琥珀以有靈之品內通心竅硃砂雄黃金銀箔以重墜之藥安鎮心神佐以龍腦麝香安息香搜剔幽隱諸竅李杲曰牛雄腦麝入骨髓透肌膚抱朴子言金箔雄黃合餌為地仙若與丹砂同用為聖金餌之可以飛升故熱入心包絡舌絳神昏者以此丹入寒涼湯藥中用之能祛隂起陽立展神明有非他藥之可及若病起頭痛而後神昏不語者此肝虛魂升於頂當用牡蠣救逆以降之又非至寶丹所能蘇也萬氏牛黃清心丸西牛黃二分五釐鏡面硃砂一錢五分生黃連五錢黃芩三錢山梔三錢鬱金二錢右為末蒸餅為糊丸如黍大每服七八丸喻嘉言治中風門云熱阻關竅湯劑中調入牛黃清心丸但古有數方其義各别若治溫邪內陷胞絡神昏者惟萬氏之方為妙蓋溫熱入於心胞絡邪在裏矣草木之香僅能達表不能透裏必藉牛黃幽香物性乃能內透胞絡與神明相合然尤在佐使之品配合咸宜萬氏用芩連山梔以瀉心火鬱金以通心氣辰砂以鎮心神合之牛黃相使之妙是丸調入犀角羚羊角金汁甘草或人中黃連翹薄荷等湯劑中定建奇功蘇合香丸蘇合香白者良研二兩安息香無灰酒煮去砂二兩暹羅犀角鎊研龍腦氷片研一兩麝香勿經火另研各一兩香附炒木香薰陸香另研沉香另研極細丁香白术各一兩右十一味為末逐一配勻量加煉蜜和劑分作五十丸另以硃砂一兩水飛為衣蠟護臨用剖開井水生薑湯溫酒皆可化下一丸原方尚有白檀香蓽撥訶黎勒局方裁去之因其太澀燥耳蘇合香能通十二經絡三百六十五竅故君之以名其方與安息香相須能內通臟腑龍腦辛散輕浮走竄經絡與麝香相須能內入骨髓犀角入心沉香入腎木香入脾香附入肝薰陸香入肺復以丁香入胃者以胃亦為一臟也用白术健脾者欲令諸香留頓於脾使脾轉輸於各臟也諸臟皆用辛香陽藥以通之獨心經用硃砂寒以通之者以心為火臟不受辛熱散氣之品當反佐之以治其寒阻關竅乃寒因寒用也木香硇砂煎丸木香一分硇砂醋內化瀘淨炒五錢京三稜生用一分巴豆去膜勿去油研一分大黃炮一分蓬莪茂炮一分青皮湯浸去白焙一分乾薑炮一分肉桂去粗皮一分附子炮製去皮臍一分乾漆炒煙出一分松墨一指大研右一十二味將京三稜巴豆大黃三味各搗研為末同置銀石器內用醋一升煎一兩沸次入硇砂同熬成膏收將諸藥搗為末以前四味膏和成劑杵千下為丸如菉豆大每服五丸炒生薑湯下結聚腹內氣塊痛乾薑湯或橘皮湯下若麵黏食成癥煮麵湯下牛羊鱉肉成癥各用本肉淡汁下婦人諸般血癥當歸酒下如要宣轉茶清下加至七丸小兒三丸硇砂方出自唐宋癥癖痼疾推之不移者非此不化木香專走三焦硇砂亦能化三焦之痼疾故方名並稱之三稜破血中之氣昔有五色癥塊為刀柄遇稜化水夷堅志所載甚悉巴豆走氣潰堅大黃入血攻積時珍謂其同用瀉人反緩此先以醋煎三味次入硇砂成膏亦使猛鋭之力徐行耳蓬莪茂與三稜相須破氣中之血青皮助肝疏泄乾薑肉桂附子通三焦之陽乾漆性急飛竄松墨性輕健捷諸藥止用一分者僅取其引經報使通陽入隂捷如影響佐硇砂成化癥之功天真丹沉香一兩琥珀一兩巴戟天酒浸去心一兩胡盧巴炒香一兩蘹香鹽炒香去鹽用一兩補骨脂炒香一兩杜仲炒去絲一兩肉桂萆薢酒浸炒香兩牽牛子鹽炒香黑一兩右十味為細末用元浸藥酒打麵糊為丸如桐子大每服五十丸至七八十丸空心溫酒下天真丹治下焦陽虛臍腹痼冷腿腫如斗囊腫如升肌肉堅鞕按之不窅是皆形氣不及之病非因寒而腫鞕也陽虛濕至則腫陽氣去則堅如石不因寒而腫鞕者則非理中真武之通陽舟車神祐之去濕矣蓋陽去肉堅當以辛香走氣起陽破堅陽虛濕至當以辛熱利水逐濕消腫細繹是方用沉香入腎消風水之腫毒琥珀達命門利水道破堅瘀巴戟療腳氣寒濕胡盧巴搜下焦冷氣潛伏舶蘹香辟膀胱冷氣除下焦氣分之濕補骨脂暖腰膝逐囊濕杜仲健腰膂除隂下濕肉桂除下焦沉寒痼冷萆薢味苦療􅍙痺去下焦風濕牽牛子性大熱除氣分之濕三焦壅結腳浮水腫以上諸藥辛香者居多其苦辛無香者或藉酒浸或令炒香俾陽通濕去其腫自消肌肉自柔於以迎陽下返積氣全形命曰天真形不壞也資生丸白扁豆一兩山藥一兩五錢人參三兩白术土炒三兩蓮肉一兩芡實一兩五錢橘紅二兩桔梗五錢甘草炙五錢白豆蔲三錢五分厚朴一兩山查肉二兩川黃連三錢五分神麯二兩藿香五錢茯苓一兩五錢澤瀉三錢五分薏苡仁三兩麥芽一兩五錢右為末煉蜜丸每丸二錢重每服一丸醉飽後二丸細嚼淡薑湯下易曰至哉坤元萬物資生取以名方者因三焦五藏生生之氣全資脾胃而輸化也蓋土居乎中而位寄乎五行三焦分受其氣於五藏故補脾胃而仍分理三焦也白扁豆山藥補金中之土也人參白术補其正土也蓮肉芡實補水中之土也橘紅桔梗甘草豆蔲運上焦之氣而使之輸也麥芽苡仁茯苓澤瀉理下焦之氣而使之化也三焦氣行五藏氣充而生氣勃然矣伐木丸茅山蒼术米泔水浸二宿去皮毛二斤黃酒麵麯造法另載本草四兩同蒼术炒赤色皂礬醋拌曬乾入陽城罐火煆一斤右法製為末醋糊丸梧子大每服三四十丸好酒米湯任下日二三服伐木丸出張三丰仙傳方三半云此乃上清金蓬頭祖師所傳治黃腫如土色其效如神皂礬味酸性涼百草遇之不生人穢得之化水其消積滯燥脾濕之功非諸藥所能及再製以米醋丸以醋糊瀉肝經之氣使脾胃無賊邪之患蒼术疏泄陽明之氣除濕以安太隂為仙家服食之藥黃酒麵麯乃菉豆杏仁辣蓼所罨其辛涼之氣能除陳腐亦仙品也李時珍云以皂礬加入平胃散胡桃棗子為丸又以皂礬當歸百草霜為劑總不及此方之妙寧肺散御米囊醋炒一兩六錢烏梅肉四錢右為末每服二錢沸湯點服寧甸安也嗽久則勞於肺氣散不收肺脹病劇者始用以安肺河間云嗽久不已諸藥無效者用之極驗罌粟殼輕清入肺性澀固氣復以烏梅者肺欲收急食酸以收之也但粟殼之性緊急恐其固澀太過反佐以米醋製之與烏梅氣味相投斂而降下不使粟殼留戀肺經以傷嬌藏其法少用點服者朱震亨云治病之功過急恐急則傷人也禹攻散黑牽牛頭末入磨一次不復再磨四兩大茴香炒一兩右為細末以生薑自然汁調一二錢臨臥服禹攻者脾濕腫脹肉堅攻之如神禹決水牽牛苦熱入脾瀉濕欲其下走大腸當以舶茴辛香引之從戊入丙至壬開通陽道走泄濕邪決之使下一瀉無餘而水土得平神香散丁香七粒白豆䓻七粒右為末清湯調下如小腹痛者加砂仁七粒神香散景嶽之新方也以之治乾霍亂痧脹腹痛屬於寒濕凝滯脈絡者殊有神功與辰砂益元散治濕熱痧脹可謂針鋒相對夫痧者寒熱之濕氣皆可以為患或四時寒濕凝滯於脈絡或夏月濕熱鬱遏於經隧或鼻聞臭氣而阻逆經氣或內因停積而壅塞府氣則胃脘氣逆皆能脹滿作痛甚至昏憒欲死西北人以楊栁枝蘸熱水鞭其腹謂之打寒痧東南人以油碗或油線括其胸背手足內胻謂之刮痧以碗鋒及扁針刺舌下指尖及曲池委中出血謂之槊痧更服八砂丹以治其內是皆內外達竅以泄其氣則氣血得以循度而行其脹即已非另有痧邪也近世俗醫另立痧科凡見腹痛脹滿煩悶不安咸謂之痧唯欲自衒其術反戒患家勿輕用藥殊堪捧腹霹靂散雄黃五分雌黃五分人言四分氷片五分生山梔二十枚牛黃五分急性子一錢生菉豆一百八十粒先將菉豆冷水洗去皮同餘藥各生曬乾為末大人用七分十五六嵗者用四分或粉麵糕餅令其食少頃吐出頑痰為妙晚以稀粥補之霹靂者破泄隂霾也是方治陽狂殊為不合若治癡顚頗有批却導窽之妙按內經顚狂篇顚分骨筋脈三種又按難經二十四難曰重隂者顚明係癡顚是藏病多由肝經風痰隨氣上逆於心迷亂神明故宜湧而吐之生黃砒不及煉白砒燥烈純熱劫痰善吐但煉砒毒能傷人故必重用生菉豆以解其毒然有服之其毒內攻而不吐者又必以食物如粉麵糕餅鼓動胃氣則無有不吐者矣山梔輕揚上浮急性子下氣透骨是即梔子豉湯激而行之相助以吐雄黃入肝之陽分殺精辟鬼雌黃入肝之隂分祛風殺蟲牛黃入肝藏引風外出氷片入骨髓搜風可盡剛猛毒藥無微不入胸中即有固結頑痰亦必倒倉吐出其神明得以歸舍而清矣小金丹辰砂二兩水摩雄黃一兩葉子雌黃一兩紫金煉熟金箔五錢右藥同入合中外固了埋地一尺築地實不用爐不須藥製用炭二十斤煆之七日終候冷七日取次日出合子埋藥地中七日取出順日研之三日煉白蜜為丸梧桐子大每日望東吸日華氣一口氷水下一丸和氣咽之服十粒無疫干也小金丹為辟疫之方全用金石者取天地五行自然之氣也辰砂生稟青陽受氣於丙有木火之德雄黃得陽土之精雌黃得隂土之精金稟己土隂氣得水之精以火煆之以土埋之循太陽左旋以研之吸太陽初升之氣以吞之純陽之氣用冷水以攝之採取隂陽之精氣坐鎮中宫正氣在內邪不能干也按素問遺論辟疫篇是方係後人增附然方義頗通故釋之獺肝丸獺肝一具隂乾為末水服二錢日三服以瘥為度獺肝丸奇方也葛稚川治尸疰鬼疰仲景治冷勞皆取用之按獺肝性溫能驅隂邪而鎮肝魂不使魂遊於上而生變動之症蓋疰者邪注於臟也若注於肝則肝為善變之臟邪與魂相合症變便有二十二種其蟲三日一食五日一退變見之症無非隂象而獺肝一月生一葉又有一退葉是其性亦能消長出入以殺隱見變幻之蟲真神品也吐蠱散新製白礬建茶土常山馬兜鈴根雄黃刺蝟皮灰桑枝汁蒜汁雞翅下血赤雄敗鼓皮灰甘草節麻油浸右等分為末每服五分以吐為度按周禮有秋官庶民掌除毒蠱者蠱之為害由來久矣其名有五所謂蛇蠱蜥蜴蠱蜈蚣蠱蜣螂蠱草蠱是也其法以諸蟲同畜一器任其互相吞啖存者即以為蠱中其毒於飲食中能蝕人腑臟發症難以名狀緩治即無生理千百年來大抵皆淫亂之俗及妄圖福利者之所為故其害於今猶未泯也然有解蠱之法能令人不至於死地者考古治法初中蠱者當越之使吐去盡惡物可不致死余故採擇古人解蠱效驗藥餌配合成方名曰吐蠱散雄黃解五蠱之毒刺蝟制五蠱之神蒜汁純陽制五隂之毒桑汁殺腹內蟲專制蜈蚣赤雄雞翅下血入血而性升善祛伏風故解蛇蜴蜈蚣之風毒敗鼓皮灰以其久鳴而敗能令病人自言造蠱者之名土常山出天台性涼味甘如蜜嶺南人呼為三百頭牛馬兜鈴根味苦能吐五蠱草蟲之毒非此不除嶺南人呼為三百兩銀甘苦同行必發吐也白礬出閩中北苑性寒味苦治熱毒苦澀寒熱相佐以行當發吐也常山兜鈴白礬建茶皆攻毒涌越之品再以甘草載引於上則無有不傾囊而吐者矣雪羮大葧薺四個海蛇漂去石灰礬性一兩右二味水二鍾煎八分服羮食物之味調和也雪喻其淡而無奇有清涼內沁之妙葧薺味甘海虴味鹹性皆寒而滑利凡肝經熱厥少腹攻衝作痛諸藥不效者用以泄熱止痛捷如影響鍊真丸茅术去皮米泔浸麻油炒三兩茯苓三兩黃柏三兩童便各人乳鹽水製一兩澤瀉一兩蛇床子一兩酒炒淫羊藿去刺羊脂拌蒸一兩白蓮鬚酒洗一兩五味子一兩沉香另末勿見火一兩人參三兩鹿茸大者一對酥炙大蘹香去子一兩鳳眼草一兩即樗莢金鈴子酒蒸去皮核三兩大檳榔七兩童便浸切右為末用乾山藥末為糊丸空心鹽湯送四錢臨卧溫酒再服二錢鍊真者鍊本身之精氣神不為隂邪所蔽常使虛靈不昧以復天真也世有膏粱之人再為房勞所傷濕熱障蔽於內精氣昏亂因而無子者宜服此丸統論方義似僅能去濕熱通陽道而已然細繹其配合之理却有斡旋造化之妙蓋膏粱之濕傷及腎隂非蒼术不能勝其濕膏粱之熱擾動隂火非黃柏不能制其熱二者滌身中素藴之濕熱也茯苓上滲水飲澤瀉下通水道二者引未蓄之濕熱旋從小便而出也蛇床子燥隂濕益陽事淫羊霍起隂痿興絶陽二者通命門之真火以生氣也白蓮鬚清心通腎交媾水火會合木金五味子收五臟之隂功專攝金氣以生真水二者兼固精氣神以寓生生不息之機也沉香入腎壯陽暖精大茴香開上下之經氣內接丹田二者芳香走竄諸藥雖具補瀉之功藉其芳香乃能內入也人參升舉五臟之陽鹿茸督率竒經之陽二者宣發真陽以迎合精氣神也金鈴子泄氣分之熱引相火下行鳳眼草清血中之熱使真隂內守二者又為諸藥之嚮導也獨以大腹子為君者非但取其迅墜諸藥至於下極之功且佐术苓澤瀉黃蘗金鈴等掃除清道不致茸茴蛇霍反助素藴之濕熱亦種玉之一則也兔絲子丸濟生兔絲子酒拌生用二兩鹿茸酒炙二兩淡肉蓯蓉酒拌二兩淡附子一兩泡五味子一兩雞䏶脛五錢炙桑螵蛸酒炙五錢右為末酒糊丸如梧子大每服七十丸空心鹽湯下小便失禁古方多用固澀或兼通大陽究非尋源探本之治蓋小便癃閉則用附子等獨開太陽之氣化若夫不約則三陽俱撤矣獨攝太陽亦無益也當升舉督脈之陽以保護諸陽之氣故鹿茸為必需之藥大制用之當奏奇功余博考失禁諸方惟濟生兔絲子丸稍為合法然必佐以芳香入隂之品乃能扺下焦而升陽如韭子茴香補骨脂杜仲等類願後賢裁之豬䐗丸牡蠣四兩煆另研極細白色苦參三兩白术四兩豬䐗一具洗潔砂􅀈煮爛石臼搗數百杵右藥同豬䐗搗令極勻如藥乾量增䐗汁丸如梧桐子大每服五十丸空心米飲送下日三服久服不但治遺即勞瘦者亦能肥也劉松石豬䐗丸治肥貴人濕熱遺精之方也即仲景黃連豬䐗丸之義蓋肥貴之人嗜鮮美飲醇醪久之脾胃釀成濕熱留伏隂中夜為夢泄治以水畜之䐗為水中之土能厚胃泄水佐以白术健脾勝濕截其病之所從來苦參泄脾濕而堅腎隂佐以牡蠣鹹寒勝熱固澀止遺又先於其濕之所往也泄其邪固其正則雖有夢而不遺矣夫遺滑變症雖多不越乎有夢無夢濕熱三者之範圍從此推之可如庖丁之導窽矣大補隂丸黃蘖鹽酒炒褐色四兩知母酒炒四兩熟地酒蒸六兩敗龜板去衣牆雄者酥炙六兩右為末豬脊髓和蜜丸每服七十丸淡鹽湯下治虛厄用參术湯送下丹溪補隂立法義專重於黃蘖主治腎虛勞熱水虧火炎以之治虛火厄逆亦為至當難經言逆氣而裏急衝之為病也以衝為隂脈之海並足少隂之脈行乎幽門通谷夾巨闕而上故丹溪謂厄逆屬於肝腎之虛者其氣必從臍下直衝上出於口斷續作聲苐肝腎之氣在下相凌左腎屬水不能自逆而右腎為相火所寓相火炎上挾其衝氣乃能逆上為厄主之以黃蘖從其性以折右腎之相火知母滋腎水之化源熟地固腎中之元氣龜板潛通奇脈伏藏衝任之氣使水不妄動治虛厄用參术湯下之者人之隂氣依胃為飬胃土損傷則相火直衝清道而上此土敗於相火之賊當崇土以制龍雷之火也通關丸一名滋腎丸黃蘖去皮銼酒洗焙知母銼酒洗焙乾各一兩肉桂五分右為細末熟水為丸每服一百丸空心白湯下頓兩足令藥易下行如小便利前隂中如刃刺痛當有惡物下為驗東垣滋腎丸原名通關丸難經關格論云關則不得小便口不渴而小便不通乃下焦腎與膀胱隂分受熱閉塞其流即內經云無隂則陽無以化也何則膀胱稟大寒之氣腎感寒水之運氣運窒塞故受熱而閉治法仍須用氣味俱隂之藥除其熱泄其閉治以黃蘗瀉膀胱之熱知母清金水之源一燥一潤相須為用佐以肉桂寒因熱用伏其所主而先其所因則鬱熱從小便而出而關開矣再議膏粱酒溼損傷腎水以致關隂者亦能使火逆而為格陽或為厄逆為咽痛東垣嘗為隂火上衝而吸氣不得入胃脈反逆隂中伏陽即為厄又謂腎虛蒸熱腳膝無力隂痿隂汗衝脈上沖而為喘為咽痛者用之亦效大黃蟅蟲丸大黃蒸十分黃芩二兩杏仁一升桃仁一升乾地黃十兩乾漆一兩虻蟲一升水蛭百枚蠐螬一升蟅蟲半升芍藥四兩甘草三兩右十二味末之煉蜜和丸如小豆大酒飲服五丸日三服金匱血痺虛勞脈證九條首條是汗出而風吹之血凝於膚而為痺然痺未至於乾血後六條是諸虛不足而成勞然勞亦不至於虛極故治法皆以補虛和營衛去風氣為方若五勞虛極痺而內成乾血者悉皆由傷而血瘀由瘀而為乾血也假如隂之五宫傷在五味飲食自備則食傷於脾西方生燥在臟為肺在志為憂憂患不止則營澀衛除故憂傷於肺以酒為漿以妄為常女子脫血醉入房中則飲傷於肝嗜欲無窮精氣弛壞則房勞傷於腎穀氣不盈上焦不行下脘不通胃熱隂虧則飢傷於胃尊榮人有所勞倦喘息汗出其傷在營若負重努力人亦傷於營營氣屬心故勞傷於心諸傷而胃亦居其一者以五臟皆稟氣於胃為四時之病變死生之要會胃熱液涸則五臟絶隂氣之源而絡痺血乾愈速故飢傷亦列於藏傷之間其第七句是總結諸傷皆傷其經絡營衛之氣也細繹本文云腹滿不能食肌膚甲錯面目黯黑明是不能內穀以通流營衛則營衛凝泣瘀積之血牢不可破即有新生之血亦不得暢茂條達惟有日漸羸瘦而成內傷乾血勞其有不死者幾希矣仲景乃出佛心仙手治以大黃􅟟蟲丸君以大黃從胃絡中宣瘀潤燥佐以黃芩清肺衛杏仁潤心營桃仁補肝虛生地滋腎燥乾漆性急飛竄破脾胃關節之瘀血蜚虻性升入陽分破血水蛭性下入隂分逐瘀蠐螬去兩脅下之堅血􅟟蟲破堅通絡行傷却有神功故方名標而出之芍藥甘草扶脾胃解藥毒緩中補虛者緩舒也綽也指方中寬舒潤血之品而言也故喻嘉言曰可用瓊玉膏補之勿以耆术補中失却寬舒胃氣之義又大黃􅟟蟲丸􅟟蟲二十枚去足桃仁二十粒大黃三兩右三味末之煉蜜和為丸每以一丸酒一升煮一丸取八合頻服之新血下如豚肝金匱云産婦腹痛內有乾血著臍下用三味為方蓋因瘀積未久榮衛經絡血亦未必固結止以大黃桃仁潤其血之乾以􅟟蟲蠕動噉血之物行其瘀便可奏捷不必如五勞之用重劑也百勞丸當歸一錢乳香一錢去油沒藥一錢去油虻蟲十四箇人參二錢大黃四錢水蛭十四箇桃仁十四箇浸去皮尖右為細末煉蜜為丸桐子大都作一服可百丸五更用百勞水下取惡物為度服白粥十日百勞水即甘瀾水以杓揚百遍者也百勞丸許州陳大夫流傳出自仲景方治一切癆瘵積滯未經藥壞證者細譯是方無非氣血並補和營逐瘀其緩中補虛之義毫不相關較之金匱原方却遜一籌惟用百勞水不助腎邪以藥留頓中宫導去脾胃絡之瘀血使其內穀流通營衛亦乾血癆之良治禹餘糧丸蛇含石本草名蛇黃大者三兩以新鑯銚盛入炭火中燒蛇黃與銚子一般紅用鉗取蛇黃傾入醋中候冷取出研極細禹餘糧石三兩狀如牛黃重重甲錯中有黃土如蒲黃無沙者佳鋼針砂五兩入餘糧一處用米醋二升就銚內煮令醋乾為度却就用銚子同二藥入一稱炭火中煆令通赤鉗出銚子傾藥於淨磚地上候冷研一二日極細以上三物為主其次量人虛實入下項藥喻嘉言曰治水多取轉推此方三物既非大戟甘遂芫花之比又有下項諸藥扶持故虛人老人亦可用羌活川芎京三稜炮蓬莪术白豆蔲白蒺藜陳皮青皮木香大茴香炒牛膝酒浸當歸酒浸一宿乾薑炮熟附子炮肉桂各五錢右為末入前藥拌勻以湯浸神麯捩去水為糊和藥再杵極勻丸如桐子大食前溫酒或白湯送下三十丸至五十丸最忌鹽一毫不可入口否則發疾愈甚但試服藥即於小便內旋去不動藏府而能去病日三服兼用溫和調補氣血藥助之真神方也禹餘糧丸用三物治肝脾胃之藥為主者以水病莫不本之於三臟也蛇黃得蛇性之走竄靈異能內走臟腑外徹皮膚禹餘糧入陽明血分之重劑同針砂醋製即於胃中辟肝經客賊之氣佐之羌活川芎以開鬼門三稜蓬术以潔淨府蒺藜豆蔲木香茴香陳皮青皮去鬱陳莝理則然也而諸品之藥猶為力綿不及未能開闢重隂經言三隂結謂之水三隂肺脾腎也若肺之治節不行脾之健運失常腎之關門不利則膀胱之水日益泛濫占據肢體重隂堅壘設非薑桂附之大力斬關奪門焉能重雲見睍而腫脹潛消耶再使以當歸牛膝導薑桂附下行入絡而奏驅隂功績更為徑捷統論全方不用逐水之藥不蹈重虛之戒斯為神治也小溫中丸白术二兩茯苓一兩陳皮一兩半夏湯泡去皮臍一兩甘草三錢神麯炒一兩香附忌烘曬一兩五錢苦參炒五錢黃連炒五錢針砂醋炒紅研如飛麵一兩五錢右為末醋水各一盞打神麯糊為丸如桐子大每服七八十丸白术六錢陳皮一錢生薑一片煎湯吞下虛甚加人參一錢本方去黃連加厚朴半兩忌口病輕者服此丸六七兩小便長甚者服一斤小便始長小溫中丸太隂氣脹土鬱奪之之法也經脈篇曰太隂虛則臌脹又曰脾氣實則腹脹至真要大論曰諸濕腫病皆屬於脾諸腫腹大皆屬於熱是誠以腫脹為濕熱矣雖然熱者脹病之末也若脹病之始末有不從寒而成熱者如五常政大論曰西北方隂也左寒而右涼適寒涼者腠理閉而脹下之則脹已豈非寒涼外襲而六陽寓於坤土之中內鬱為熱而成脹滿乃用土鬱下奪之法則脹已丹溪深得經旨另出手眼而立下奪消脹之方治以六君子扶脾胃之正氣神麯香附一氣一血去菀陳莝苦參黃連導去濕熱重用針砂助脾去濕抑肝邪客賊之氣以鑯受太陽之氣而隂氣不交性燥重墜濕熱之邪劫而衰之非必以行大便始為下奪也再用白术陳皮生薑湯吞下重於健脾也若虛甚者加人參厚朴去黃連不尖溫中之義四神丸甘枸把子揀紅潤者八兩煮酒一杯清水一杯和勻以杞子浸三時漉出曬乾分為四分以二兩用川椒二錢拌焙燥揀去川椒以二兩用小茴香三錢拌焙燥揀去茴香以二兩同黑芝麻四錢拌焙燥不揀去芝麻以二兩同方解青鹽研末四錢同焙燥不揀去青鹽焙法以繩挂銅盆懸火三四寸不住手將銅盆浴轉焙至燥要枸把子仍是大紅焙焦則不靈各研細黃甘菊去蒂曬一兩五錢當歸頭酒拌曬九錢熟地白水製一兩五錢茯苓九錢女貞子淘漂蒸至極黑酒浸六時布袋擦去皮九錢目有赤脈者加白蒺藜右為末蜜丸每服三錢開水送下四神丸奇方也本草言枸把子味甘氣平退虛熱補精髓治目昏雲翳按孫思邈王燾西河女子所載服食之法惟服枸把子經嵗不輟能延年耐老豈非奇用而有此神效乎今名之曰四神者藉椒茴之香以和陽芝鹽之潤以和隂得乎四者製法之神耳服之精髓生則火自退隂液充則目自明若服兩經之藥分殺其勢則力有所不專推原記者之心惟恐泄真方之祕故為溷亂以炫人耳然獨用一味後賢必以此為不全之方余因刪去背謬之藥復以相須相使之品減其錢數俾枸把得行專政以建奇功惟後賢臨用斟酌去就可也育麟丸木棉子取當年者去殼其仁白如糯米色者佳每斤棉子用真秋石一兩六錢和水溶化浸棉子十二時漉出曬乾再用陳煮酒浸片刻入木甑內砂鍋上水蒸六時曬乾再入酒浸片刻蒸六時曬乾如是者不計次其仁製之內外如墨色者佳二十四兩同後藥修合大熟地先用白水煮爛每斤加砂仁四兩陳煮酒一斤貯瓶中隔湯煮三日曬乾再蒸濕得太陽之光多者為熟十二兩枸把子揀大紅色者分四分依四製枸把子丸製法研末仍是大紅色者佳八兩線魚鰾用黃麻切炒炭拌入炒成珠六兩沙苑蒺藜六兩補骨脂胡桃肉拌蒸鹽酒同炒二兩四錢柏子仁去油者三兩二錢當歸酒洗曬乾焙三兩二錢生杜仲粉去皮切片另磨粉篩去綿三兩二錢生牛膝酒拌曬乾三兩二錢楮實子酒浸十二時蒸六時二兩四錢雲茯苓五兩川萆薢酒浸曬四兩麥門冬去心四兩五味子二兩四錢右法製共搗爛逺火焙乾磨為末用羊內外腎四件兩副鹽酒拌蒸爛搗膏量加煉蜜為丸每晨用五錢午後用三錢臨卧用五錢陳酒送下不用酒者淡鹽湯送下男婦皆服之無間求子者得子求夀者益夀若男有遺精婦有帶下者去牛膝加覆盆子漂去浮子曬乾酒浸十二時曬乾二兩四錢精氣神命曰人男女相媾功在隂陽氣交交則神合合則化形如露珠之一滴升於丹鼎之上而為孕朱子所謂稟於有生之初悟真篇所謂生身受氣於初者是也種子之方自古迄今而欲寓合此意者亦甚難得余觀育麟丸之藥品填補精髓妙合隂陽却有至理存焉木棉子花黃子白殼青油赤得五行之正氣性溫去濕製黑功專入腎暖精熟地色黑入腎枸把色赤入心有水火既濟之妙魚鰾暖少隂之精沙蒺藜暖少陽之精俾藏府所藏之精剛柔相摩隂陽相蕩而精自生神補骨脂能使命門與心包絡之火相通柏子仁能使手厥隂與足厥隂之氣並清杜仲補肝之氣而利於用當歸助少隂之血而主於和牛膝通前隂之精道楮實通九竅之神靈茯苓通腎經之陽萆薢堅腎經之隂麥冬清肺氣五味攝腎氣古人用熱藥必清上焦之熱使熱藥不傷肺氣丸以羊腎血肉有情之品俾能留戀五內以成化育之功備急丸巴豆去皮心膜研如脂出油用霜一兩大黃一兩生乾薑二兩右藥各須精新先搗大黃乾薑為末研巴豆內中合治一千杵用為散蜜和丸亦佳密器中貯之莫令歇以暖水苦酒服大豆許三四丸或不下捧頭起灌令咽須臾當差如未差更與三丸當腹中鳴即吐下便差若口噤亦須折齒灌之備先具以待用也急及也謂臨事之迫也金匱以備急丸救中惡客忤神昏口噤者折齒灌之立蘇若臨時製藥則無及矣巴豆辛熱大毒生用性急開通水穀道路之閉塞蕩練五臟六腑之隂霾與大黃性味相畏若同用之瀉人反緩妙在生大黃與生乾薑同搗監制其直下之性則功專內通於心外啓胃之神明協助心神歸舍却有撥亂反正之功控涎丹白芥子甘遂去心大戟去皮各等分右為末糊丸每服五七丸至十丸臨卧薑湯服控引也涎讀作羡湎涎也水流貌引三焦之水湎涎流出於水道也白芥子色白入肺而達上焦甘遂色黃入脾而行中焦大戟色黑入腎而走下焦故白芥子走皮裏膜外之水飲甘遂決經隧之水飲大戟逐臟腑之水飲三者引經各異湎涎於水道則同故復之為方當審證採用可也玉真丸硫黃二兩消石原方作繩分配硫四分之一也準作一兩即焰消石膏煆通赤研一兩半夏洗一兩右為細未研勻生薑汁糊圓如梧子大隂乾每服二十丸薑湯或米飲下更灸關元穴百壯玉真丸治腎厥頭痛之聖藥也頭以配天三隂三陽五臟六腑之氣皆會於此故六淫七情之邪皆可以為頭痛按靈素論頭痛二十餘證惟頭痛巔疾下虛上實過在足少隂巨陽甚則入腎一證最為危急許白沙謂腎厥頭痛其脈舉之則弦按之則石堅以玉真丸治之硫黃消石升陽至頂有迅雷風烈之勢石膏半夏達隂降逆有通玄入冥之神治頭痛不以輕清散邪而用霸術劫奪其邪者以濁隂上逆亂其清陽壅遏經隧頭痛如擘刻欲昏憒豈容緩治圖功然欲出補天手迅掃濁隂非深入聖域者不能白沙之後惟東璧能知之乃曰硫黃與消石同用配合二氣調燮隂陽有升降水火之功治冷熱緩急頭痛旨哉言乎紫金丹信白砒五分豆豉膏二錢用水略潤少時以紙把乾研膏右用膏子和砒同杵極勻圓如麻子大母服五圓至十圓用蠟茶清極冷吞下臨臥服以知為度信白砒有大毒須煆煉得法庶不傷人凡白砒一錢用石膏一兩同研勻貯鎔銀罐中勿蓋陽煆通赤俟其煙盡飛去砒毒僅取石膏得白砒之性復藉豆豉挫砒毒之餘威兼領石膏中砒性上升迅掃肺經痼積之沉寒不使少留一如太空廓清疾返沖和氣象其愈痼之功莫有過於此者又按必效方治痰積齁喘遇隂氣觸發用砒與白礬為丸冷茶送下髙枕仰臥即愈治法雖同而砒與礬能爛人肉不及本事方佳驚氣圓白花蛇肉去頭尾一尺及骨五錢乾蠍一分一錢二分白附子五錢白殭蠶五錢麻黃五錢天麻煨五錢橘紅五錢紫蘇子一兩天南星洗浸切薄片薑汁浸一夕五錢硃砂一分一錢二分留半為衣右為末入研腦麝少許同研極勻煉蜜拌圓如龍眼大每服一粒金銀花薄荷湯化下溫酒亦可本事方論云驚憂積氣心受風邪發則牙關緊急涎潮昏塞醒則精神若癡俗呼為心風癲疾也素問云病癲疾為母腹中受驚所致則本文云心受風邪由驚憂積氣與經旨合轍驚則傷肝憂則傷肺清肅之令不行則木火化風外充斥於陽明之筋脈循人迎環口頰斯筋脈牽引卒口噤內摶激肺胃之津液斯涎沫上湧溢於口角而神明昏亂總是內風煽動與痰迷昏塞逈隔天淵故立方以治風為首務經言風者善行而數變君以花蛇亦善行而去風佐以乾蠍搜風更捷白附子行藥勢散隂臟之風佐以白殭蠶得清化之氣散肌表之風麻黃天麻入營透表泄風苐人之內風無不從積氣以化故治氣亦不可廢橘紅南星蘇子入營下氣佐以腦麝助諸藥開泄上下升降諸氣妙在不治驚而治風不治痰而治氣較之世醫治心風妄揑驚痰輕施鎮墜勾引風邪沉潛內臟其禍寧有底止許學士曰此豫家祕方也信哉麋茸丸麋茸一兩治如鹿茸兔絲子一兩生取末舶蘹香五錢右為末以羊腎四隻酒煮爛去膜研如泥和圓如梧子大隂乾如腎膏少加酒糊之每服三五十丸溫酒送鹽湯亦可少隂寒濕腰痛不用薑桂术附而用麋茸羊腎足徴許學士之深心善於護陽者也蓋腎為水臟溼為隂邪寒濕踞於水臟真陽陷沒而生氣內絶難經云腰者腎之府轉搖不能腎將􅉵矣是則亡陽之機已露豈可治不經心輒用剛燥壯火之劑摧鋒陷陳殊不思隂陽應象論所謂壯火食氣少火生氣之説乎故必以血肉有情沖和純粹之品戀住真陽潛驅寒濕麋茸通脈之隂羊腎壯腎中之陽生兔絲子升發腎中之陽氣舶蘹香散腎中之寒濕治濕不用燥劑則不傷腎隂俾真陽旺而邪自退斯為正治之良圖薑桂湯老生薑汁三錢沖肉桂二錢四分去皮人參三錢當歸二錢四分南棗三枚右水二鍾煎八分沖入薑汁分三服隨時服傷寒臟結證舌上白胎滑者難治戒之不可攻而舌鑑論白胎十九證皆用汗下辛熱之法余閲歷多年未有能治之者戊午嵗少隂君火太乙天符自春徂秋民病毋論三因舌胎白者居多有白滑白屑白粉之異原其義即至真要論熱勝寒復火勝水復熱極反兼勝巳之化也用炮薑附子則白胎厚而液燥用芩連則手足冷而陽脫余尋思舌為心之外候其色當赤白為肺之色反加心火之上是侮其所勝顯係寒邪入肺鬱蒸見於舌是衛實營虛乃以大劑生薑汁泄衛肉桂通營佐以人參當歸南棗助營衛之正氣服之皆應手而愈名之曰薑桂湯宗仲景心營肺衛立方也絳雪園古方選注卷八
