body:
  text: 絳雪園古方選注卷十二蘇州王子接撰痘疹科附幼科按痘喜流通氣血清凉攻毒此常法也若補益辛熱處其變也余所選痘科方補益居多者以常法人咸知之故議其變耳清涼攻毒散石膏三錢至一兩黃連一錢至三錢牛蒡子一錢五分荆芥穗四分青皮七分細木通四分犀角磨汁三分生地五錢至一兩紅花四分牡丹皮一錢地丁一錢加燈草一分即瀉黃散毒重者加大黃右㕮咀水二鍾煎八分去滓溫服石膏味辛性寒痘中每用兩許以及數兩更有始終不徹用及數斤者然必確係肺經火毒壯火食氣氣失其運火邪妄行空竅鬱遏處則冷冲突處則熱飛殃臟腑種種惡候如火邪爍肺則鼻煤衄血咽痛聲啞淫於大腸則暴瀉如注逆傳於心則煩躁顛狂弄舌黑刺移於小腸則溺膏溲血肆虐於脾則唇裂肌燥日胞紅腫淫於胃則消渴飲冷口穢噴人順乘於肝則液沸淚熱乘於膽則淚血返於腎非但灑墨塗硃迸裂泡湧空竅失血神昏躁亂煎熬及此則亦無臟不銷無腑不燥矣自宜急用大劑石膏瀉氣分之火毒佐以牛蒡荆芥黃連青皮木通燈草清熱散火以起脹犀角生地紅花地丁丹皮凉血攻毒以行漿服石膏之後腸瀉用之而反實血滯用之而色紅活氣伏用之而精神煥發斯為至當苟非氣分火毒妄用大劑石膏必有亡陽惡寒之禍紫草承氣湯大黃四兩厚朴二兩枳實一兩紫草一兩右㕮咀為粗末每服五錢水半盞煎二三分溫服以利為度如未利加芒硝一字紫草承氣湯大黃功專蕩滌為斬關奪門之將痘科用之蓋為毒滯脾經而設痘從命門出諸太陽經逆上至脾俞毒氣太盛即從脾經肆虐若迅雷之不及掩初起板而不鬆紫而乾滯粒粒頂陷呌哭抽掣煩亂昏憒此毒伏血中不能載毒而出轉輸各臟之俞急急重用大黃破脾經之實瀉血中之滯復以紫草內通血脉外達皮毛洞瀉者用之而反實不食者用之而胃氣開有瀉至數度而精神不減有用至斤許而肌肉始鬆然必是脾經毒壅者方為至當若毒悶命門不發或轉輸肝肺而用大黃非理也費建中曰毒出鬱伏而重者重與之功而輕與之散此方是也保元湯人參二錢黃耆三錢甘草一錢肉桂春夏二三分秋冬六七分右㕮咀水二鍾煎六分去滓溫服元氣者未生之前所固有之氣也不用升降固澀疏泄但維持調護之故曰保元魏桂岩分四時之輕重治痘家熱傷元氣氣虛頂陷血虛漿清痘色與肉色一般乾燥平塌皮薄發癢頭溫足冷求一熱症而不得者用之殊有神功參耆不能從血透表必藉肉桂入血推動其毒而後參耆之力乃能內托透表苐桂性剛速非甘草和緩亦不循循善導補不用术惡其燥也泄不用苓惡其滲也入血不用芎歸恐其辛散也保護不用芍地恐其酸斂凝滯也止用性柔者以養陽是亦少火生氣也與東垣治慢驚土衰火旺之方今借以治痘內補營血外護衛氣滋助隂陽作為漿水誠出化裁參歸鹿茸湯鹿茸酒炙去毛三錢人參一錢二分綿黃耆蜜炙一錢五分當歸身酒洗一錢五分甘草炙六分生薑一片龍眼肉三個右用水煎去滓入醇酒一杯溫服鹿茸湯提漿之方也形呈乎氣毒載乎血痘漿之成必賴氣足乃能領血載毒而出化為漿水若元氣衰弱則血寒而縮氣血氷伏毒必內陷外見空竅頂平淡白根無紅暈內則寒戰咬牙泄瀉肢冷食少當用鹿茸為君從命門督脉升陽於顛頂以參耆炙草補助氣升以當歸桂圎生薑補助血行再加醇酒流暢氣血達之於表則頭面之漿先足金鏡録有言頭面蒼蠟見之切莫慌張其斯之謂與若未服是湯周身痘色恍白根無紅暈而頭面之漿漸呈蠟黃者此或毒重氷伏即宜詳審切勿輕用蓋參茋鹿茸亦可提毒於胸以致氣髙而殞不可忽也十一味木香散木香丁香桂心訶子人參半夏青皮甘草前胡大腹皮赤茯苓各等分每服五錢薑三片水一大鍾煎六分溫服木香散手太隂陽明之方也肺氣表虛變為寒燥毒陷泄瀉裏虛表白白必灰灰必陷瀉必脹脹必毒滯症因表虛而變內毒不透當以破滯透毒為先補虛止瀉次之故君以木香順氣散滯丁香贊助元陽肉桂溫表虛轉灰白為紅潤訶子破滯氣又能止瀉青皮破下焦之滯脹寬則毒鬆腹皮寬膨消毒其功莫大半夏通隂甘草和中人參佐暖藥和陽扶破藥養正使以前胡清肺赤苓瀉心俾心肺寧而營衛和且熱藥不傷肺破藥不傷營也十二味異功散人參七分白术七分官桂七分附子五分半夏五分丁香七分木香七分當歸七分肉果七分陳皮七分厚朴七分茯苓七分每服五錢生薑三片大棗二枚水一大鍾煎六分溫服異功散治脾腎裏虛之方也脾不升漿變為寒濕裏虛泄瀉毒因陷伏頭雖溫足乃冷腹脹喘悶寒戰咬牙證因內虛而變故方中破滯之味輕助陽之力大人參茯苓和胃白术廣皮健脾俾胃暖脾溫而營衛無滯自能升提痘毒出於皮毛附子理虛寒而收戰栗官桂鼓陽氣以安塌癢丁香安胃木香理脾半夏破滯化痰厚朴溫胃破滯肉果溫脾止瀉當歸活血成漿表虛裏實獨用生薑裏虛表陷薑棗並用雞鳴散牛蒡子炒香研細臨服加入雄雞血五匙狀元紅少許調勻以炒荆芥三分煎湯送雞屬巽風其性應日而動當其引頸長鳴陽升於頂之候剪取冠上之血故曰雞鳴痘發四五日毒壅不宣此散妙在止用牛蒡荆芥二味表藥助雞冠血升毒於六陽之首使頭面漿足便可無虞今人則不然不分頭面肢體不論朝數乍見漿清輒用雞冠血提漿佐以桑蟲酒釀服之燥痛異常又有可以收成之痘如頭面漿濃肢體漿清過十朝仍然如乍必俟頭面結靨而周身漿足周身結靨而下體漿足此乃名為三截痘若誤用雞冠血提漿上升必然伏毒於胸結毒於肺乃至胸髙氣喘而殞豫女八嵗得三截痘誤用雞冠血桑蟲致殤深可悲夫雞矢丸雞矢一堆溏而有尖白色者良六一散三匙氷片少許為衣右丸如菉豆大燈心湯送下按岐伯治臌方用醴去矢今痘家用矢者取濁隂也但嬰孩不能用丸亦可用矢浸醴調六一散服勿用氷片治痘用濁隂方甚多如人中黃人中白童便金汁皆不足為異至於人糞牛糞犬糞貓糞咸用礱糠火煆過為方者世人畏而罕用余亦不及詳考若夫雞矢醴自岐伯用起後人因以治病都取其發散利小便之功今火毒發痘躁熱如焚喉痹聲啞畏明譫語一切苦寒重劑所不能勝者無如雞矢醴為最雞為巽風善動之畜其矢為濁中之濁隂中之隂能直透至隂以滌其火毒復以六一散外開𤣥府宣發火毒達於陽分以氷片為衣掩其臭氣并藉此以開泄內外脉絡諸竅佐六一散而成發汗泄熱之功庶可劫奪凶湧火毒之勢然後用藥亦與有力矣貴在用藥對證勿以穢賤而忽之附痧疹防風解毒湯防風八分荆芥八分薄荷七分牛蒡子炒研一錢石膏一錢知母八分連翹一錢淡竹葉八分木通八分枳殼七分桔梗八分甘草三分右水一鍾煎入分不拘時服痧疹初發以肺經藥主之風溫雖分逐年嵗氣雜至要皆輕清之邪或從口鼻或襲三焦四時皆有惟春為甚聶久吾曰治痧疹最忌誤用辛熱驟用寒凉治以防風解毒湯防風荆芥薄荷牛蒡以辛散之石膏知母連翹淡竹葉卒寒以清之木通通氣枳殼疏表桔梗甘草載引諸藥以達肺經仲淳曰痧疹不宜依證施治惟當治肺使痧疹發出毒解則了無餘藴矣竹葉石膏湯竹葉三十片石膏五錢西河栁葉五錢牛蒡子炒研一錢五分荆芥穗一錢蟬蛻一錢薄荷葉一錢麥門冬去心三錢知母蜜炙一錢乾葛一錢五分𤣥參二錢甘草一錢冬米一撮右水一鍾五分煎八分不拘時服痧疹熱邪壅於肺逆傳於心胞絡喘咳煩悶躁亂狂越者非西河栁不能解仲淳間嘗獨用西河栁葉風乾為細末水調服四錢喘躁立定水漿不入口者灌之可生力贊其為神祕之方又云慎勿用定喘藥惟應大劑竹葉石膏湯加西河栁兩許另出心裁立一湯方表裏施治蓋以客邪犯心肺二經營衛並傷非獨主於裏也大凡灼熱固表無汗而見諸證者則有竹葉石膏之辛凉解肌發汗熱毒藴裏而見諸證者則有西河栁之鹹溫潤燥開結和營以解天行時熱至於十味佐使之藥不外乎潤肺解肌清營透毒母容議也麻黃散麻黃蜜酒拌炒升麻酒炒人中黃牛蒡炒研蟬蛻去頭足各等分右為末每服三錢水煎服嚴寒之時風邪襲肺𤣥竅為寒所閉目微紅淚汪汪鼻塞喘嗽咽腫此痧疹不得出也治以蜜酒炒麻黃溫衛發汗酒炒升麻入營開泄溫風佐以人中黃清解溫熱使以牛蒡蟬蛻祛風出疹仲淳曰肺氣虛者升麻宜輕重用必喘學者宜臨證斟酌猪尾膏小公猪尾尖刺血或半盞或一盞入生腦子少許辰砂一錢同研成膏木香湯化下猪尾性動生腦性竄入裏治下與雞冠血升表治上二者有上下表裏之分尾血利內竅破真隂佐以硃砂安內神木香湯行外瘀究非王道之品也如厚禀孩童痘發五六朝表受風寒內血瘀滯而漿靨或觸穢汚紫黑焦枯平闊倒靨者用之可轉凶為吉若內熱而變腳闊頂平色白形空氣血虛倒靨者用之反凶幼科抱龍丸琥珀五錢辰砂二錢雄黃七錢香麻油煎十二時再用水蘿蔔汁煮膽星二兩一錢殭蠶四錢炒去嘴足全蠍三錢研末用石榴一枚剜空以無灰酒調末填入蓋定坐文火上徐徐攪動成膏取出冷用牛黃一錢麝香五分天竺黃七錢赤茯苓一兩右法製各為末蒸餅為丸金箔為衣燈心薄荷湯送下抱保也龍者肝臟也肝臟受驚則魂升搐搦不語用以熄風化痰鎮驚發音保守肝魂也殭蠶全蠍薄荷辛以散肝風天竺黃膽星苦辛以泄風痰辰砂琥珀安五臟鎮魂魄雄黃搜肝膽之伏風麝香利骨髓之伏痰金箔佐辰砂可鎮胎驚竺黃佐牛黃可發音聲赤苓燈心可止夜啼集肝經之藥為復方初無深義一方加人參二錢五分培植正氣以禦肝風紫河車三錢五分即蚤休草切片黑穭豆製能伏牛黃丹砂之毒并可治驚祛風二味却有妙義當纂入方中五疳保童丸大乾蟾蜍一箇五月午日收風乾燒存性皂角去皮弦燒存性一錢海蛤粉水飛三錢麝香一錢右為末陳神麯為稀糊丸如粟米大每服三四十丸空心米飲下日二服兒童面黃肌瘦疳積腹膨皆由寒痰食積治以蟾蜍其性靈異穴土食蟲主殺疳蟲散結氣時珍曰五疳八痢咸宜佐以皂角通諸經之竅海蛤粉生於海者其味鹹能消頑痰化積聚生於淡水中者僅清熱利水而已當用鹽水煮十二時使以麝香搜骨髓之熱消瓜果之積時珍曰酒得麝則敗果得麝則壞深得用麝之理丸以神麯除陳腐也按錢仲陽如聖丸方白蕪荑川黃連胡黃連各二兩五錢史君子一兩麝香五分以乾蟾蜍酒煮成膏為丸亦一法也治肝脾疳熱津液乾涸熱甚者宜之絳雪園古方選注卷十二
