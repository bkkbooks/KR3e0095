body:
  text: 絳雪園古方選注卷一蘇州王子接撰和劑桂枝湯桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘右五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜稀粥一升餘以助藥力溫覆令一時許遍身漐漐微似有汗者佳不可令大汗如水流漓病必不除若一服汗出病瘥停後服不必盡劑若不汗更服依前法又不汗小促役其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病症猶在者更作服若汗不出者乃服二三劑禁生冷粘滑肉麵五辛酒酪臭惡等物桂枝湯和方之祖故列於首太陽篇云桂枝本為解肌明非發汗也桂枝甘草辛甘化陽助太陽融㑹肌氣芍藥甘草酸甘化陰啓少陰奠安營血薑通神明佐桂枝行陽棗泄營氣佐芍藥行陰一表一裏一陰一陽故謂之和加熱粥內壯胃陽助藥力行衛解腠理鬱熱故曰解肌邪未入營而用白芍者和陽解肌恐動營發汗病反不除觀此足以貫通全部方法變化生心非作聖其孰能之桂枝甘草湯桂枝四兩去皮甘草二兩炙右二味以水三升煮取一升去滓頓服桂枝湯中採取二味成方便另有精藴勿以平淡而忽之桂枝復甘草是辛從甘化為陽中有陰故治胸中陽氣欲失且桂枝輕揚走表佐以甘草留戀中宫載還陽氣仍寓一表一裏之義故得以外止汗而內除煩芍藥甘草湯芍藥四兩甘草四兩炙右二味㕮咀以水三升煮取一升半去滓分溫再服此亦桂枝湯之變偏於營分純一不雜之方讀傷寒論反煩更煩心悸而煩皆用芍藥止煩不分赤白孫尚許叔微亦云白芍惟許𢎞方議聖惠方是赤芍今裏氣不和陰氣欲亡自當用白芍補營佐以甘草酸甘化陰止煩觀其去薑棗恐生薑散表大棗泄營是用白芍無疑桂枝加桂湯桂枝五兩去皮白芍三兩甘草二兩炙生薑一兩大棗十二枚擘右五味以水七升煮取三升去滓溫服一升桂枝湯太陽經藥也奔豚腎邪上逆也用太陽經藥治少陰病者水邪上逆由於外召寒入故仍從表治惟加桂二兩便可溫少隂而泄隂氣矣原文云更加桂二兩者加其兩數非在外再加肉桂也古者銖兩斤法以四為數申明桂枝加一加二猶為不足當加四分之三故曰更加桂枝加芍藥湯芍藥六兩桂枝三兩去皮甘草二兩生薑三兩切大棗十二枚擘右五味㕮咀以水七升煮取三升去滓溫服一升桂枝加芍藥湯此用陰和陽法也其妙即以太陽之方求治太陰之病腹滿時痛陰道虛也將芍藥一味倍加三兩佐以甘草酸甘相輔恰合太陰之主藥且倍加芍藥又能監桂枝深入陰分升舉其陽辟太陽陷入太陰之邪復有薑棗為之調和則太陽之陽邪不留滯於太陰矣桂枝加芍藥生薑人參新加湯桂枝三兩去皮芍藥四兩生薑四兩切甘草二兩炙人參三兩大棗十二枚擘右六味㕮咀四味以水一斗二升煮取三升去滓溫服一升桂枝湯調和營衛一絲不亂桂枝生薑和衛芍藥大棗和營今祖桂枝人參湯法則偏於衛矣妙在生薑加一兩佐桂枝以大通衛氣不使人參有實邪之患尤妙芍藥亦加一兩仍是和營衛法名曰新加者申明新得其分兩之理而加之也桂枝加葛根湯葛根四兩桂枝二兩去皮芍藥二兩甘草二兩炙生薑三兩切大棗十二枚擘右六味以水一斗先煮葛根減二升內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝法桂枝加葛根湯治邪從太陽來才及陽明即於方中加葛根先於其所往以伐陽明之邪因太陽未罷故仍用桂枝湯以截其後但於桂枝芍藥各減一兩既不使葛根留滯太陽又可使桂枝芍藥並入陽明以監其發汗太過其宣陽益陰之功可謂周到者矣桂枝加附子湯桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘附子一枚炮去皮臍破八片右六味㕮咀以水七升煮取三升去滓溫服一升桂枝加附子治外亡陽而內脫液熟附雖能補陽終屬燥液四肢難以屈伸其為液燥骨屬不利矣仲景以桂枝湯輕揚力薄必藉附子剛烈之性直走內外急急溫經復陽使汗不外泄正以救液也桂枝去桂加茯苓白术湯芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘茯苓三兩白术三兩右六味㕮咀以水七升煮取三升去滓溫服一升小便利即愈苓术芍甘治太陽裏水法也解肌或下水邪不去而反變症是非解肌者矣當去桂枝而以苓术生薑代桂枝行陽存芍藥以收陰不取辛甘發散於表取苓芍約陰利水甘棗培土制水即太陽入裏用五苓表裏兩解之義也桂枝去芍藥湯桂枝三兩去皮甘草二兩炙生薑二兩切大棗十二枚擘右四味㕮咀以水七升煮取三升去滓溫服一升芍藥専益陰氣桂枝湯去芍藥者誤下陽虛濁陰必僭於中焦故去芍藥之酸寒存一片陽和甘緩之性得以載還中焦陽氣成清化之功茯苓甘草湯茯苓二兩桂枝二兩去皮生薑二兩切甘草一兩炙右四味以水四升煮取二升去滓分溫三服茯苓甘草湯治汗出不渴其義行陽以統陰而有調和營衛之妙甘草佐茯苓滲裏緩中並用是留津液以安營生薑佐桂枝散外固表並施是行陽氣而實衛自無汗出亡陽之虞茯苓桂枝甘草大棗湯茯苓八兩桂枝四兩去皮甘草二兩炙大棗十五枚擘右四味以甘瀾水一升先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服作甘瀾水取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之腎氣奔豚治宜泄之制之茯苓桂枝通陽滲泄保心氣以禦水凌甘草大棗補脾土以制水泛甘瀾水緩中而不留入腎而不著不助水邪則奔豚臍悸之勢緩是方即茯苓甘草湯惡生薑性升而去之其義深且切矣苓桂术甘湯茯苓四兩桂枝三兩去皮白术三兩甘草二兩炙右四味以水六升煮取三升去滓分溫三服此太陽太陰方也膀胱氣鈍則水蓄脾不行津液則飲聚白术甘草和脾以運津液茯苓桂枝利膀胱以布氣化崇土之法非但治水寒上逆并治飲邪留結頭身振搖小建中湯芍藥六兩甘草三兩桂枝三兩去皮生薑二兩切大棗十二枚擘膠飴一升右六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服建中者建中氣也名之曰小者酸甘緩中僅能建中焦營氣也前桂枝湯是芍藥佐桂枝今建中湯是桂枝佐芍藥義偏重於酸甘専和血胍之陰芍藥甘草有戊己相須之妙膠飴為稼穡之甘桂枝為陽木有甲己化土之義使以薑棗助脾與胃行津液者血胍中之柔陽皆出於胃也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯桂枝三兩去皮甘草二兩炙生薑三兩切大棗十二枚擘蜀漆三兩洗去腥牡蠣五兩熬龍骨四兩右為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升火迫心經之陽非酸收可安故去芍藥而用龍牡鎮攝藉桂枝蜀漆疾趨陽位以救卒然散亂之神明故先煮蜀漆使其飛騰劫去陽分之痰并賴其急性引領龍骨牡蠣從陽鎮驚固脫方寸無主難緩須臾故曰救逆桂枝甘草龍骨牡蠣湯桂枝一兩去皮甘草二兩牡蠣二兩熬龍骨二兩右四味為末以水五升煮取二升半去滓溫服八合日三服桂枝甘草龍骨牡蠣其義取重於龍牡之固澀仍標之曰桂甘者蓋陰鈍之藥不佐陽藥不靈故龍骨牡蠣之鈍陰必須藉桂枝甘草之清陽然後能飛引入經收斂浮越之火鎮固亡陽之機甘草湯甘草二兩右一味以水三升煮取一升半去滓溫服七合日三服一藥治病是曰竒方甘草為九土之精生用則凉故可伐腎泄熱治咽痛者功在緩腎急而救陰液也桔梗湯桔梗一兩甘草二兩右二味以水三升煮取一升去滓分溫再服桔梗味苦辛苦主於降辛主於散功専開提足少陰之熱邪佐以甘草載之於上則能從腎上入肺中循喉嚨而清利咽嗌張元素謂其為舟楫之劑者譬之鐵石入水本沉以舟載之則浮於上也半夏散及湯半夏洗桂枝去皮甘草炙各等分已上三味各别搗篩已合治之白飲和服方寸七日三服若不能散服者以水一升煎七沸內散兩方寸匕更煎三沸下火令小冷少少咽之半夏散咽痛能咽者用散不能咽者用湯少陰之邪逆於經胍不得由樞而出用半夏入陰散鬱熱桂枝甘草達肌表則少隂之邪由經胍而出肌表悉從太陽開發半夏治咽痛可無劫液之虞苦酒湯半夏洗破如棗核大十四枚雞子一枚去黃內上苦酒著雞子殼中右二味內半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不差更作三劑苦酒湯治少陰水虧不能上濟君火而咽生瘡聲不出者瘡者疳也半夏之辛滑佐以雞子清之甘潤有利竅通聲之功無燥津涸液之慮然半夏之功能全賴苦酒攝入陰分劫涎斂瘡即陰火沸騰亦可因苦酒而降矣故以名其湯小柴胡湯柴胡八兩黃芩三兩人參三兩大棗十二枚擘甘草三兩半夏八兩洗生薑三兩切右七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服柴胡湯不從表裏立方者仲景曰少陽病汗之則譫語吐下則悸而驚故不治表裏而以升降法和之蓋遵經言少陽行身之側左升主乎肝右降主乎肺柴胡升足少陽清氣黃芩降手太陰熱邪招其所勝之氣也柴芩解足少陽之邪即用參甘實足太陰之氣截其所不勝之處也仍用薑棗和營衛者助半夏和胃而通陰陽俾陰陽無爭則寒熱自解經曰交陰陽者必和其中也去渣再煎恐剛柔不相濟有礙於和也七味主治在中不及下焦故稱之曰小柴胡桂枝湯柴胡四兩黃芩一兩五錢人參一兩五錢半夏二合半洗甘草二兩炙桂枝一兩五錢去皮白芍一兩五錢生薑一兩五錢切大棗六枚擘右九味以水七升煮取三升去滓溫服一升桂枝湯重於解肌柴胡湯重於和裏仲景用此二方最多可為表裏之權衡隨機應用無往不宜即如肢節煩疼太陽之邪雖輕未盡嘔而支結少陽之病機已甚乃以柴胡冠於桂枝之上即可開少陽微結不必另用開結之方佐以桂枝即可解太陽未盡之邪仍用人參白芍甘草以奠安營氣即為輕劑開結之法柴胡桂枝乾薑湯柴胡八兩桂枝二兩去皮乾薑二兩黃芩三兩括蔞根四兩牡蠣二兩熬甘草二兩炙右七味以水一斗二升煮取六升去滓再煮取三升溫服一升初服微煩復服汗出愈揭出三陽經藥以名湯者病在太陽稍涉厥陰非但少陽不得轉樞外出而陽明亦窒而不降故以桂枝行太陽未罷之邪重用柴胡黃芩轉少陽之樞佐以乾薑甘草開陽明之結使以花粉佐牡蠣深入少陰引液上升救三陽之熱不必治厥陰而三陽結邪一一皆從本經而解矣柴胡加龍骨牡蠣湯柴胡四兩大黃二兩人參一兩五錢半夏二合洗生薑一兩五錢切大棗六枚龍骨一兩五錢牡蠣一兩五錢熬桂枝一兩五錢去皮鉛丹一兩五錢黃芩一兩五錢茯苓一兩半一方無黃芩右十二味以水八升煮取四升內大黃切如碁子更煮一二沸去滓溫服一升足經方治手經病者參苓龍牡鉛丹入足經而可轉行於手經者也手少陰煩驚從足太少陽而來故仍從柴桂立方邪來錯雜不一藥亦錯雜不一以治之柴胡引陽藥升陽大黃領陰藥就陰人參炙草助陽明之神明即所以益心虛也茯苓半夏生薑啓少陽三焦之樞機即所以通心機也龍骨牡蠣入陰攝神鎮東方甲木之魂即所以鎮心驚也龍牡頑鈍之質佐桂枝即靈邪入煩驚痰氣固結於陰分用鉛丹即墜至於心經浮越之邪借少陽樞轉出於太陽即從兹收安內攘外之功矣生薑瀉心湯生薑四兩切乾薑一兩半夏半升洗黃芩三兩黃連一兩人參三兩甘草三兩大棗十二枚擘右八味以水一斗煮取六升去滓再煮取三升溫服一升日三服瀉心湯有五總不離乎開結導熱益胃然其或虛或實有邪無邪處方之變則各有微妙先就是方胃陽虛不能行津液而致痞者惟生薑辛而氣薄能升胃之津液故以名湯乾薑半夏破陰以導陽黃芩黃連瀉陽以交陰人參甘草益胃安中培植水穀化生之主宰仍以大棗佐生薑發生津液不使其再化陰邪通方破滯宣陽是亦瀉心之義也甘草瀉心湯甘草四兩乾薑三兩大棗十二枚擘半夏半升洗黃芩三兩黃連一兩右六味以水一斗煮取六升去滓再煮取三升溫服一升日三服甘草瀉心非瀉結熱因胃虛不能調劑上下致水寒上逆火熱不得下降結為痞故君以甘草大棗和胃之陰乾薑半夏啓胃之陽坐鎮下焦客氣使不上逆仍用芩連將已逆為痞之氣輕輕瀉却而痞乃成泰矣附子瀉心湯附子一枚炮去皮破别煮取汁用黃芩一兩黃連一兩大黃二兩右四味㕮咀三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服附子非瀉心之藥見不得已而用寒凉瀉心故以附子名其湯蓋氣痞惡寒陽氣外撤此際似難用苦寒矣然其痞未解又不得不用苦寒以瀉其熱顧仲景以大黃黃連猶為未足再復黃芩蓋因上焦之氣亦拂鬱矣故三焦皆熱苦寒之藥在所必用又恐其虛寒驟脫故用三黃撤三焦而瀉熱即用附子徹上下以溫經三黃用麻沸湯漬附子别煮汁是取三黃之氣輕附子之力重其義仍在乎救亡陽也半夏瀉心湯半夏半升洗黃芩三兩黃連一兩人參三兩甘草三兩炙乾薑三兩大棗十二枚擘右七味以水一斗煮取六升去滓再煮取三升溫服一升日三服方名半夏非因嘔也病發於陰而反下之因作痞是少陰表證誤下之寒反入裏阻君火之熱化結成無形氣痞按之自濡用乾薑開痞岑連泄熱未能治少陰之結必以半夏啓一陰之機人參甘草大棗壯二陽生氣助半夏開闢陰寒使其熱化痞解梔子乾薑湯梔子十四枚擘乾薑二兩右二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服煩皆由熱而寒證亦有煩但微耳乾薑和太陰在裏之傷陽而表熱亦去梔子清心中之微熱而新煩亦除立方之義陰藥存陰陽藥和陽是調劑陰陽非謂乾薑以熱散寒也黃芩湯黃芩三兩芍藥二兩甘草二兩炙大棗十二枚右四味以水一斗煮取三升去滓溫服一升日再夜一服黃芩湯太少合病自利邪熱不從少陽之樞外出反從樞內陷故舍陽而治陰也芍藥甘草大棗一酸二甘使酸化甘中以和太陰則腸胃得博厚之通而利止矣黃芩加半夏生薑湯黃芩三兩芍藥二兩甘草二兩大棗十二枚半夏半升洗生薑三兩右六味以水一斗煮取三升去滓溫服一升太少合病獨治陽明者熱邪入裏僭逆當從樞轉出陽明用甘草大棗和太陰之陽黃芩芍藥安太陰之陰復以半夏生薑宣陽明之闔助太陽之開上施破縱之法則邪無容著嘔止利安黃芩人參湯黃芩二兩人參二兩桂枝二兩去皮乾薑二兩半夏半升洗大棗十二枚擘右六味以水七升煮取二升去滓分溫再服黃芩人參湯傷寒論中有方而無症此太陽才入少陽故倣小柴胡湯之和解用桂枝之升復黃芩之降亦用人參半夏奠安裏氣薑棗和營衛獨以乾薑易生薑者欲其守中不欲其上升也乾薑黃連黃芩人參湯乾薑三兩黃連三兩黃芩三兩人參三兩右四味以水六升煮取二升去滓分溫再服厥陰寒格吐逆者陰格於內拒陽於外而為吐用芩連大苦泄去陽熱而以乾薑為之嚮導開通陰寒但誤吐亡陽誤下亡陰中州之氣索然矣故必以人參補中禆胃陽得轉并可助乾薑之辛衝開陰格而吐止黃連湯黃連三兩桂枝二兩去皮甘草三兩炙乾薑三兩人參二兩半夏半升大棗十二枚擘右七味以水一斗煮取六升去滓溫服一升日三夜二服黃連湯和劑也即柴胡湯變法以桂枝易柴胡以黃連易黃芩以乾薑易生薑胸中熱欲嘔吐腹中痛者全因胃中有邪氣阻遏陰陽升降之機故用人參大棗乾薑半夏専和胃氣使飲入胃中聽胃氣之上下敷布交通陰陽再用桂枝宣發太陽之氣載引黃連從上焦陽分瀉熱不使其深入太陰有礙虛寒腹痛黃連阿膠湯黃連四兩黃芩一兩芍藥二兩阿膠三兩雞子黃二枚右五味以水五升先煮三物取二升去滓內膠煬盡小冷內雞子黃攪令相得溫服七合日三服芩連瀉心也阿膠雞子黃養陰也各舉一味以名其湯者當相須為用也少陰病煩是君火熱化為陰煩非陽煩也芩連之所不能治當與阿膠雞子黃交合心腎以除少陰之熱雞子黃色赤入通於心補離中之氣阿膠色黑入通於腎補坎中之精第四者沉陰滑利恐不能留戀中焦故再佐芍藥之酸澀從中收陰而後清熱止煩之功得建厚朴生薑半夏甘草人參湯厚朴八兩去皮炙生薑八兩切半夏半升洗人參一兩甘草二兩炙右五味以水一斗煮取三升去滓溫服一升日二服太陰病當腹滿是傷中也與吐下後邪氣入裏腹脹治法不同厚朴寬脹下氣生薑散滿升津半夏利竅通陰陽三者有升降調中之理佐以甘草和陰人參培陽補之泄之則陰結散虛滿消旋覆代赭石湯旋覆花三兩代赭石一兩生薑五兩切大棗十二枚擘人參一兩半夏半升洗甘草三兩右七味以水一斗煮取六升去滓再煮取三升溫服一升日三服旋覆代赭石湯鎮陰宣陽方也以之治噫噫者上焦病聲也脾失升度肺失降度陰盛走於胃屬於心而為聲故用旋覆醎降肺氣代赭重鎮心包絡之氣半夏以通胃氣生薑大棗以宣脾氣而以人參甘草奠安陽明不容陰邪復遏則陰寧於裏陽發於表上中二焦皆得致和矣赤石脂禹餘糧湯赤石脂一斤碎禹餘糧一斤碎右二味以水六升煮取二升去滓每日三服仲景治下焦利重用固澀者是殆以陽明不闔太陰獨開下焦關閘盡撤耳若以理中與之從甲巳化土復用開法非理也當用石脂酸溫斂氣餘糧固澀勝濕取其性皆重墜直走下焦從戊巳化土闔法治之故開太陽以利小便亦非治法惟從手陽明攔截穀道修其關閘斯為直捷痛快之治芍藥甘草附子湯芍藥三兩甘草三兩附子一枚炮去皮破八片右三味以水五升煮取一升五合去滓分溫三服芍藥甘草附子湯太陽少陰方也太陽致亡陽本由少陰不內守少陰表惡寒實由太陽不外衛故取芍藥安內熟附攘外尤必藉甘草調和緩芍附從中斂戢真陽則附子可招散失之陽芍藥可收浮越之陰炙甘草湯一名復胍湯甘草四兩炙桂枝三兩去皮人參二兩麻子仁半升生地一斤阿膠二兩麥門冬半升去心生薑三兩切大棗十二枚擘右九味以清酒七升水八升先煮八味取三升去滓內膠煬消盡溫服一升日三服炙甘草湯仲景治心悸王燾治肺痿孫思邈治虛勞三者皆是津涸燥淫之證至真要大論云燥淫於內金氣不足治以甘辛也苐藥味不從心肺而主乎肝脾者是陽從脾以致津陰從肝以致液各從心肺之母以補之也人參麻仁之甘以潤脾津生地阿膠之醎苦以滋肝液重用地冬濁味恐其不能上升故君以炙甘草之氣厚桂枝之輕揚載引地冬上承肺燥佐以清酒芳香入血引領地冬歸心復脈仍使以薑棗和營衛則津液悉上供於心肺矣喻嘉言曰此仲景傷寒門中之聖方也仲景方每多通利於此處特開門户重用生地再借用麥冬手經藥者麥冬與地黃人參氣味相合而脾胃與心經亦受氣相交胍絡之病取重心經故又名復脈當歸四逆湯當歸三兩桂枝三兩白芍三兩細辛三兩大棗二十五枚擘甘草二兩炙通草二兩右七味㕮咀以水八升煮取三升去滓溫服一升日三服當歸四逆不用薑附者陰血虛微恐重劫其陰也且四逆雖寒而不至於冷亦惟有調和厥陰溫經復營而已故用酸甘以緩中則營氣得至太陰而脈生辛甘以溫表則衛氣得行而四末溫不失辛甘發散之理仍寓治肝四法如桂枝之辛以溫肝陽細辛之辛以通肝陰當歸之辛以補肝甘棗之甘以緩肝白芍之酸以瀉肝復以通草利陰陽之氣開厥陰之絡當歸四逆加吳茱萸生薑湯當歸三兩桂枝三兩芍藥三兩細辛三兩甘草二兩炙木通二兩大棗二十五枚擘吳茱萸二兩生薑八兩切右九味㕮咀以水四升清酒四升煮取三升去滓溫服一升日三服厥陰四逆證有屬絡虛不能貫於四末而為厥者當用歸芍以和營血若久有內寒者無陽化陰不用薑附者恐燥劫陰氣變出涸津亡液之證只加吳茱萸從上達下生薑從內發表再以清酒和之何患陰陽不和四逆不溫也耶烏梅丸烏梅三百箇人參六兩當歸四兩黃連一斤黃柏六兩桂枝六兩乾薑十兩蜀椒四兩炒去汗附子八兩炮細辛六兩右十味各搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下圓如桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等烏梅漬醋益其酸急瀉厥陰不欲其緩也桂椒辛附薑重用辛熱升達諸陽以辛勝酸又不欲其收斂陰邪也桂枝蜀椒通上焦君火之陽細辛附子啓下焦腎中生陽人參乾薑當歸溫中焦脾胃之陽則連柏瀉心滋腎更無亡陽之患而得厥陰之治法矣合為丸服者又欲其藥性逗留胃中以治蛔厥俾酸以縮蛔辛以伏蛔苦以安蛔也至於臟厥亦由中土不得陽和之氣一任厥陰肆逆也以酸瀉肝以辛散肝以人參補土緩肝以連柏監制五者之辛熱過於中焦而後分行於足三陰臟厥雖危或得溫之散之補之瀉之使之陰陽和平焉有厥不止耶燒褌散取婦人中褌近隱處剪燒灰以水和服方寸七日三服小便即利陰頭微腫則愈婦人病取男子褲襠燒灰褲襠穿之日久者良陰陽易本無客邪惟病人愈後藴蓄之熱乘虛襲人溷逆三焦仍取穢濁之物導歸陰竅亦求之於其所屬也燒以潔其汚灰取其色黑下行絳雪園古方選注卷一
