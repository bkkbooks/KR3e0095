body:
  text: 絳雪園古方選註卷十四蘓州王子接撰咽喉科内附口齒𤣥參升麻湯𤣥參一錢升麻八分白殭蠶一錢鼠黏子一錢連翹一錢防風五分黄芩六分川黄連八分桔梗一錢甘草七分右㕮咀作一服水二鍾煎八分稍熱噙潄時時細嚥之仲淳治喉癬有貝母花粉生地竹葉無芩連咽喉諸證歷考湯方皆辛散鹹軟去風痰解熱毒每用噙化嚥津法急於治標而緩於治本即喉痺之急證亦然隂陽别論曰一隂一陽結謂之喉痺一陽少陽也一隂厥隂也以一隂爲厥隂者隂陽之序次也厥隂之上風氣主之少陽之上火氣主之風火淫肺循絡而爲喉痺治以牛蒡散時行風熱消咽喉壅腫升麻散至髙之風解火鬱之喉腫白殭蠶得清化之氣散濁結之痰𤣥參清上焦氤氲之熱連翹散結熱消壅腫防風瀉肺經之風邪芩連清上中之熱毒甘桔載引諸藥上行清道急治其標而緩其本者盖因一隂一陽各自結於下無異乎隂陽之别也治緩則傷人故當急治其標爾聖濟透闗散雄黄猪牙皁莢去皮并子藜蘆去皮用仁各等分右三味搗研爲散先含水一口用藥一字許吹入鼻中即吐去水少時涎出立愈備急如聖散有白礬等分準繩一字散有白礬蠍稍纏喉風喉者氣之門户也上通肺氣熱閉於喉腫遶於外而頸大或麻或癢滴水不入一息不至命懸呼吸舍吹鼻通肺之外治别無良法可救藜蘆南人謂之鹿葱忽地生花其性迅發力能透頂令人善嚏吐風痰雄黄性亦升發佐藜蘆之吐又能解藜蘆之毒猪牙皁莢能開肺竅善嚏治喉痺之神藥周文采曰累用救人百無一失備急加白礬宗奭曰佐皁莢之性過喉即吐涎以礬能分膈下涎也惟準繩再加蠍稍雖去肝風與肺經相逺三方止從聖濟備急功非淺矣玉鑰匙馬牙硝一兩五錢白殭蠶二錢五分蓬砂五錢片腦一字右爲末以紙管吹五分入喉中即愈鑰匙者喻治咽喉功效之神也自其風邪客於喉間氣鬰爲熱壅遏而爲咽痛自其火邪生於肺胃風毒結腫而爲喉疼自其腎虛於下陽越於上而爲咽痛自其飲酒濕熱脾胃溼熱上攻而爲咽痛所因之邪不同至其乗肺則一也用馬牙硝爲朴硝之精結於上輕清而味鹹熱淫於内治以鹹寒白殭蠶感清化之氣以去風痰蓬砂味苦鹹消上焦熱痰清喉中腫痛蘓頌贊蓬砂爲治咽喉之要藥片腦大辛入肺善走散熱破結是藥吹入喉中火散風消立時痛緩惟云治標未及其本亦救急之良法聖濟蜂房湯露蜂房炒猪牙皁莢炙去皮子川椒去目并含口炒北細辛去苖各等分一方有蛇床子炒右搗羅爲散每服一錢匕水一盞煎沸熱渫冷吐齒牙之病不越乎風火濕䘌腎虛二者之因蜂房湯風火濕䘌蛀蚛之方也蜂房川椒去風而能殺蟲牙皁細辛去風之功勝蛇床子去濕之功多風濕既去蟲自消滅按古方渫潄含擦者居多内服攻毒之方甚少盖以湯藥内走諸絡上循齒牙莫若外渫功效㨗速也渫汙也以湯汙齒而含也東垣神功丸蘭香葉俗名省頭草藿香葉木香已上各一錢升麻二錢縮砂仁五錢生地酒洗三錢當歸一錢黄連去䰅酒洗五錢生甘草三錢右爲細末湯浸􅔻餅爲丸如菉豆大每服一百丸加至二百丸止白湯下食逺服神功丸治濕䘌齦爛之方也腎爲胃闗膏粱酒色之人腎虛則水道不利酒肉太過則濕熱藴積於胃循脉貫於上齦而爲齦腐之根由也下齦喜寒惡熱熱甚則疳蝕齦腐袒脫穢臭不可近東垣意在清熱仍以去濕爲首務濕淫所勝治以黄連木香以苦燥之佐以蘭香藿香以辛散之熱淫所勝治以木香砂仁之苦温佐以升麻甘草之甘辛反佐以清胃散中之當歸生地滋濕之品引領風燥之藥并去其血分之濕熱非東垣具過人之識不及此也良方安腎丸桃仁麩炒肉蓯蓉酒浸焙補骨脂炒乾山藥川石斛白蒺藜炒去刺川萆薢川烏泡去皮尖巴㦸天去心白术右爲細末煉蜜爲丸如桐子大每服七十丸空心用鹽湯送下五味論曰腎爲骨之所終故齒痛有屬於腎者腎虚則齒豁精固則齒堅至其爲病眞牙浮動見冷愈疼無熱無蟲是殆入房竭精耗散天真致無根失守之火挾相火而上淫於齒也治以肉蓯蓉巴㦸川烏安腎之陽萆薢堅腎之隂石斛清腎中浮游之火桃仁蒺藜補肝以安相火白术山藥健脾以鎮濁隂治虚火不用寒凉者以肝腎之火號曰龍雷誤用寒凉不啻天之隂霾四合益助龍雷之勢矣故腎虛齒痛當崇土以制之和陽以安之其龍雷之火有不翕然而熄者幾希矣絳雪園古方選註卷十四
