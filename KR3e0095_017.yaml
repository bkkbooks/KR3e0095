body:
  text: 絳雪園得宜本草卷十七蘓州王子接撰上品藥遵經一百一十八種隨時用刪補石菖蒲味辛入手少隂足太隂經功專開發心陽得犀角生地連翹治熱邪入絡神昏因是仙家服食故本經首推甘草入足陽明能通行十二經生瀉熱緩甘和温補得桔梗清咽喉得大豆爲甘豆湯解百毒奇騐黄耆味甘入手足太隂經生凉炙温得當歸能活血得白木能補氣得防風相畏相使而其功愈大人參味甘苦入手太隂能通行十二經得羊肉則補形古方寒熱攻補劑中皆用之以立正氣誠爲上品桔梗味苦入足少隂經得甘草能載引上行入肺爲舟舟楫之劑萎蕤味甘入手太隂經得石膏乾葛治風温自汗身重語言難出肉蓯蓉味淡入足少隂經周慎齋云蓯蓉補腎之隂得兔絲補腎之陽二者同用能生精補陽天麻味辛入足厥隂足陽明經得川芎則補肝得白术則去濕蒼术味苦辛入足陽明經得防風則發汗得黄蘗則勝濕得香附快中下二焦之氣得山栀解术性之燥白术味辛甘入足太隂經得枳實能滌飲消痞陶隠居始分蒼白二术李杲曰蒼术性發白术性止可謂得二术之神巴㦸天味辛入足少隂經功專温補元陽得純隂藥有既濟之功逺志味苦辛入足少隂經主治健忘得茯苓入腎通陽得棗仁通心安神丹參味苦入手少隂厥隂經調婦人經脉能扺四物之功得山查炭益母草清產後瘀血發熱黄連入手少隂經性冷而燥寒能勝熱得枳實瀉痞滿得烏梅川椒則安蚘得木香治滯下柴胡味苦辛入足少陽經入經達氣入絡和血升不上乎顛頂散不達乎皮毛故入膽而合其無出無入之性得益氣藥則能升陽得清氣藥則能散邪防風味甘辛入手太陽足太陽足厥隂經其性柔滛無所不入隨主藥而走經絡得蔥白能通行周身得澤瀉藁本療風濕得當歸芍藥陽起石禹餘糧療婦人子藏風冷升麻味辛入手陽明手太隂足太隂經火在上非升不散氣陷下非升莫舉惟東垣善用之得蔥白散手陽明風邪得石膏止陽明齒痛得柴胡引主氣上升得葛根發陽明之汗獨活一種二名上產有異獨活幽香入足少隂經得細辛治少隂伏風頭痛羌活羌活氣雄入足太陽經得當歸能利勞傷骨節痠痛當歸味苦辛入手少隂足厥隂經主治女子諸虛不足得人參黄耆則補氣生血同牽牛大黄則行氣破血得桂附茱茰則熱得大黄芒硝則寒川芎味辛温入手足厥隂經治婦人血閉無子得細辛療金瘡止痛得牡蠣療頭風得生犀角去痰清目得臘茶療產後頭痛得烏藥療氣厥頭痛白芷味辛温通行手足陽明經療風止痛排膿得土貝𤓰蔞治乳癰得辛夷細辛治鼻病得單葉紅蜀葵根排膿得椿根皮黄蘗治婦人濕熱帶下木香味辛苦入手太陽經功專調氣散滯得黄連治滯下得㯽榔治下焦氣滯得橘皮肉果生薑治腹間滯塞冷氣功效㨗速煨熟者實大腸草果仁味辛酸入足太隂經主治寒濕鬱滯得知母治瘴瘧得烏梅截瘧得木𤓰麴蘖療中虛惡穀佩蘭葉味辛入陽明太隂經治消渴膽癉津液凝滯有餘之邪甘菊味甘微苦入手太隂經功專清頭目風火得枸把便能下行恱腎茵陳味苦入足太陽陽明太隂經主治風濕寒熱得山栀療熱黄得附子治隂黄得車前治眼目濕熱赤腫益母草味苦辛入足厥隂經活絡調經功效甚㨗得炒黒山查治產後惡露不行續斷味苦主治跌撲傷續筋骨得當歸治勞傷腰痛得平胃散治血痢葉名接骨草生地黄味苦入足厥隂經主治勞傷血證得麥冬復脉内之隂得木通導小腸之熱熟地黄味甘入足少隂經功專生精填髓得砂仁行氣煮酒和血復得久曝太陽真火能使虛陽歸宿丹田牛膝味酸苦入足厥隂經生用逐瘀熟用强筋得肉蓯蓉則益腎得杜仲則補肝麥門冬味甘入手少隂太隂經功專清心保肺得地黄阿膠麻仁同爲潤經復脉之劑得五味子能都攝肺腎之津液冬葵子味甘氣寒入足太陽經性主滑利能通精下胎得縮砂仁治乳汁蓄癰得牛膝下胞衣車前子味醎入足少隂經得牛膝疏肝之性導引利水得兔絲子升清降濁能補虛明目白蒺藜味苦辛疾於通利破血去風得雞子油治偏枯神效得貝母下死胎得當歸通月事沙蒺藜味甘入足少隂少陽經功專補腎得魚鰾能聚精氣菟絲子味辛甘入足三隂經續絶傷煖精寒得茯苓廣蓮治白濁遺精得麥冬治赤濁得牛膝治腰脚痛得車前子治產難横生五味子味酸兼鹹苦甘辛入手太隂足少隂經歛肺經浮游之火歸腎藏散失之元得半夏治痰得阿膠定喘得吳茱茰治五更腎泄覆盆子味甘功專益腎精縮小便得肉蓯蓉補骨脂治陽事不起天門冬味甘苦入手太隂經主治肺熱得熟地則入腎張三丰獨用此二味一君一使爲長生不老方好古曰得人參五味枸札同爲生脉之劑茜草味苦入手足厥隂經通經脉療黴毒得生地烏髭髮得阿膠側柏療婦人敗血絡石味苦强筋骨利闗節得射干山栀療咽腫毒氣攻喉澤瀉味醎入足太陽少隂經功專利水通淋得白术治攴飲得麋銜治酒風蒲黄味甘入足厥隂經生破血熟止血得五靈脂治心腹諸痛得青黛治重舌脹滿石斛味甘醎入足陽明太隂少隂經主治胃熱兼益腎精得生薑治囊濕精清小便餘瀝同川芎爲末搐鼻治睫倒入胡麻即黑脂麻大者名巨勝湯浸蒸曝布裹捼去皮味甘辛入腎潤燥得桑葉逐風濕堅筋骨大麻仁一名火麻味甘入手陽明足太隂經緩脾潤燥得當歸厚朴等辛藥乃能利大腸薏苡仁味甘淡入足陽明經主治寒濕筋攣得麻黄杏仁治風濕周痹得郁李仁治水腫喘急山藥味甘入足太隂經得羊肉補脾隂得熟地固腎精冬𤓰子味甘平主治膓癰得麥冬治消渴大棗味甘主治和營得生薑則兼和衞得小麥治臟燥悲傷廣橘皮味苦辛入足陽明太隂經功專利氣止嘔得白术則補脾得甘草則補肺得杏仁治大腸氣閟亦治脚氣衝心得桃仁治大腸血閟得生薑治嘔噦厥冷得神麯主薑治經年氣𠻳得麝香治婦人乳癰蓮藕蓮子味甘濇入足太隂少隂經功專清心固腎得乳香益智治遺精白濁得炙甘草治赤濁得陳倉米治噤口痢藕衣節功專消瘀血得髪灰治血淋得酒解蟹毒蓮蕊䰅功專清心澁精蕊得黑牽牛當歸治久近痔漏䰅得黄蘗治慾火夢遺敗蓮房功專消瘀血得厥隂經藥治大便下血荷葉功專升少陽生氣得升麻蒼术治雷頭風紫背荷葉得殭蠶治痘倒靨四肢微厥神效芡實味甘濇功專煖元陽得生地能止血得金櫻子能澁精得兔絲子能實大便栢子仁味甘入足厥隂經功專養心平肝潤腎得逺志能交通心腎得松子麻仁治老人虛秘肉桂味甘辛入足厥隂經主治沉寒痼冷益火消隂得人參麥冬甘草能益中氣得紫石英療吐逆桂枝味辛温入足太陽經功專温經通脉去風止汗得芍藥甘草能和營衞得雄雞肝治小兒遺尿辛夷味辛入手太隂足陽明經主治頭風鼻病得川芎薄荷細辛石膏治鼻塞流涕不聞香臭得南星半夏黄柏牡蠣治鼻淵下如白膿黄蘗味苦入腎經主治濕熱得肉桂治咽痛得蒼术治濕痿得細辛瀉膀胱火得蛤粉治赤濁白滛杜仲味苦辛入足厥隂經主治肝虛得羊腎治腎虛腰痛得牡蠣治虛汗得糯米山藥棗肉治頻慣墮胎得補骨脂青鹽枸杞能壯腎陽乾漆味辛温功專消瘀破積得白蕪荑治小兒蟲病得牛膝生地治婦女經閉得大麥蘗治產後血氣青腫水疾得柏子山茰棗仁治七傷證槐角子味苦寒入足厥隂經功專殺蟲得牛膽明目通神得地榆當歸防風黄芩枳殻治五種腸風瀉血得苦參治内外痔槐花味苦主治腸熱得鬱金治小便血得荆芥穗治大便血得山栀治酒毒下血得條芩治血崩得牡蠣治白帶雲母味甘功專除邪安臟得蜀漆龍骨治牝瘧紫石英味甘温入手少隂足厥隂經主治子宫寒不孕上能鎮心重以去怯下能益肝濕以去枮丹砂味甘寒入手少隂經功專鎮心安魄得逺志龍骨則養心氣得當歸丹參則養心血得生地枸杞則養腎隂滑石味甘寒入足太陽經功專發汗利小便得粉甘草解中暑止泄瀉赤石脂味酸入手足陽明經功專厚腸止利得乾薑粳米治下利膿血得蜀椒附子治心痛徹背禹餘糧味甘寒入手足陽明經功專鎮固下焦得赤石脂治傷寒下利得乾薑治赤白帶下得牡蠣烏鱡魚骨桂心治崩中漏下膽礬味酸入足少陽經功專吐痰解毒得醋治喉痹垂死得乳香没藥大棗敷楊梅毒神效朴硝味苦醎其性主降逐腑積聚得大黄直入大腸滌垢硝石即火硝味苦辛其性主升功專破積散堅得殭蠶氷硼吹喉中治喉痹礬石味酸寒功專吐痰解毒得黄蠟解一切腫毒蜂蜜性温功專潤臟腑得薤白捣塗湯火傷痛立止得生薑治大頭癩瘡得升麻敷天口虜瘡神效蜜蠟白蠟味淡功專調氣得茯苓治陽虛遺濁帶下黄蠟得黄連阿膠治痢下腹痛靣青肢冷神效得當歸阿膠黄連黄蘗陳倉米治產後下痢桑螵蛸入足少隂厥隂經功專固澁得龍骨療洩精龍骨味濇功專固脫得逺志治健忘得韭子治滑精得桑螵蛸治遺尿得白石脂治泄瀉不止龍齒鎮心凉驚功用同前龜甲味醎入足少隂經主通任脉得黄柏知母治隂虛勞熱得側柏香附治鬱結得婦人髪川芎當歸能下死胎牡蠣味醎入足少隂經功專降逆止汗得柴胡去脇下硬得松蘿茶能消項上結核得大黄能消股間腫得地黄能澁精得元參甘草臘茶治瘰癧奇效海蛤味苦醎主治欬逆上氣得滑石甘草芒硝治傷寒血結阿膠味醎入手太隂足厥隂少隂經功專益隂止血得黄連治血痢得生地止吐血得蒲黄生地治大􅀈不止牛黄味苦入足厥隂經功專清心化熱利痰凉驚得犀角殊砂治小兒諸驚麝香味辛温入足太隂經得肉桂消𤓰果諸積得鹽豉燒酒爲末淬酒服產婦敗血裹子難產立效上品藥集補時用三十三種黄精味甘功專補諸虛安五藏得枸杞補精益氣得蔓菁養肝明目仙茅味辛温主治風冷虛勞得生地枸把茴香柏仁治腰脚攣痹月季花味甘温主治痘瘡見魘變色得活鯽魚糞水中遊死者治瘰癧未破神效草豆蔲味辛入足太隂陽明經功專散滯氣消鬲上痰得熟附子治寒瘧得烏梅治久瘧不止蛇床子味苦入少陽三焦經功專强陽養隂得五味菟絲療陽痿得烏梅治產後隂脫縮砂蜜味辛功專消食散滯得白术條芩能安胎蓬莪术味苦辛主治血氣結積得木香療冷氣攻心得阿魏治小兒盤腸荆三稜味苦功專療癥瘕破血結得蓬术治渾身燎泡得大黄治痃癖藁本味辛温入足太陽經主治頭風得木香治霧露之邪中於上焦得白芷療風濕可作面脂紫參味苦入足厥隂經功專破結逐瘀得甘草治下利肺痛得人參阿膠治吐血不止白鮮皮味苦入手太隂陽明經主治風濕痛痺鼠瘘已破者服之最效燈心草味甘寒功專降心火瀉肺熱得辰砂治小兒夜啼得紅花治喉風痺塞藿香味辛入手足太隂經主治霍亂腹痛得滑石治暑月泄瀉王不留行味苦陽明衝任之藥也功專通血脉療瘡瘍得黄柏治誤吞鐵石得穿山甲治婦人乳少鉤藤味甘苦入手足厥隂經功專息風降火得甘草治癎疾得紫草發斑疹藤黄味酸濇烏羊血製療折傷骨碎補味苦入足少隂經主治閃折筋骨傷損得猪腎治久瀉不止得獨活寄生虎骨治痿痺金銀花味甘功專散熱解毒得當歸治熱毒血利陳倉米味鹹酸入手陽明經功專補中益氣得人參治脾虛泄瀉得沉香治胃反噎塞杵頭糠味辛甘主治鬲氣噎塞得人參石蓮治咽喉不利苦酒味酸苦功專殺毒益血得耆芍桂枝治黄汗得麻黄清酒治黄疸得木香治心痛得黄柏治口瘡麥蘗味鹹入足三隂經主治消食下氣産後退乳得川椒乾薑治穀勞嗜臥得蜜能下胎飴餹味甘入足太隂經功專和藥性得桂枝能建中蘋一名田字草製硫黄毒功