痰紅花味辛入手少隂經功專活血消腫得去風藥治六十二種風胡盧巴味苦大温入命門之藥主治元藏虛冷得桃仁治膀胱氣得茴香川楝治奔豚偏墜得蕎麥茴香治冷氣疝瘕得補骨脂木𤓰治寒濕脚氣木賊味苦功專去目翳療腸風得牛角鰓麝香治休息利得禹餘糧當歸川芎治崩中赤白得槐子枳實治痔中出血淡竹葉味甘寒功專清心得麥冬去煩熱利小便穀精草味辛入陽明經主治目疾得羯羊肝治小兒雀目紫花地丁味苦辛主治乳癤痘疔使君子味甘功專殺蟲療五疳得蘆薈治小兒疳熱御米殼味酸濇入足少隂經功專止瀉刼𠻳得烏梅治久𠻳不止得陳皮烏梅治熱痢便血阿芙蓉味酸濇功專澁精固腸得木香黄連治久痢不止黑穭豆味甘功專利水除痺蒸餅味甘功專消穀利水得大蒜淡豆䜴治久淋蘹香味辛入奇經主治膀胱冷氣乾濕脚氣得生薑鹽治睪丸腫大得川楝子治腎消飲水得杏仁蔥白治膀胱疝痛菠菜味甘冷滑入手太陽陽明經功專通陽利藏得雞内金治消渴引飲蒲公英味甘入足少隂經功專化熱毒消腫核得忍冬藤治乳癰茄蒂味澁功專散血歛氣得何首烏治對口瘡山樝味酸功專消食起痘得茴香治偏墜疝氣得紫草治痘疹乾黑蓽澄茄味辛主治膀胱冷氣得白荳䓻治噎食不納得髙良薑治寒呃得薄荷荆芥治鼻塞不通降香味辛温功專療折傷金瘡止血定痛得牛膝生地治吐瘀血下品藥遵經一百一十八種白頭翁味苦主治熱毒自利得秦皮黄連黄柏治厥隂熱利白芨味苦主治金瘡癰毒得黄絹丹皮能補脬損青蒿味苦主治骨蒸勞熱得鱉甲治温瘧夏枯草味苦辛入足厥隂經主治頭瘡瘰癧得香附甘草治目珠疼痛得香附貝母治馬刀旋覆花味醎温主治結氣嘔逆得代赭石半夏治噫氣得蔥新絳治半産漏下草決明味苦功專明目得甘菊治熱毒赤眼葶藶味辛寒主治上氣水蓄得漢防己治陽水暴腫得大棗治肺壅喘急連翹味苦功專瀉心與小腸之熱得瞿麥大黄甘草治項邊馬刀得脂麻治瘰癧結核萹蓄味苦功專利小便得醋治蚘攻心痛大黄味苦功專下瘀得紫石英桃仁療女子血閉得黄連治傷寒痞滿得杏仁療傷損瘀血甘遂味甘苦主治十二種水得大黄阿膠治婦人血結得大麥麵治膜外水氣大㦸味苦寒主治十二種水得甘遂白芥子療水氣脹滿得乾薑治水腫喘急澤漆味苦功專利水得大黄葶藶療心下伏瘕常山味苦功專劫痰截瘧得知母貝母草果治諸瘧得丹砂能劫瘧得㯽榔草果治瘴瘧得甘草治肺瘧得豆䜴烏梅竹葉治腎瘧得小麥淡竹葉治温瘧得黄連治三十年瘧蜀漆常山苗也世人以䰅代之味辛生用性升炒黑則緩得雲母龍骨治牝瘧獨寒得麻黄甘草牡蠣治牡瘧獨熱附子味辛温熟附得麻黄發中有補生附得麻黄補中有發得人參能留陽氣得熟地能固元陽川烏頭味辛温功專去風痰得栀子治疝氣得乾薑治隂毒傷寒得木香治冷氣洞泄天雄味辛温主治一切風一切氣得烏頭附子治元陽虛憊得白术桂枝龍骨療男子失精得烏頭黒豆治大風惡癩草烏頭味辛主治諸風得五靈脂治風濕痺水得蛤粉茴香治結隂下血得川椒雞子白治腹中癥結天南星味苦温入手足太隂功專豁痰怯風得生薑天麻治吐瀉慢驚得防風治跌撲金刄傷風得琥珀硃砂治痰迷心竅半夏味辛入手太隂少隂經功專消痰止嘔救五絶急病得醋製再得茯苓甘草治伏暑引飲得黄連栝蔞實治結胸得硫黄治老人虚秘得牡蠣猪苓治無管攝之遺濁蚤休一名紫河車味苦主治驚癎胎風得甘遂括蔞根治慢驚發搐得川大黄木鱉子仁馬牙硝半夏治咽喉榖賊鬼臼味辛温主治鬼疰百毒下死胎如神射干味辛平主治咳逆上氣喉痺咽痛得麻黄杏仁五味甘草治喉中水雞聲芫花味辛温主治心腹脹溝水氣寒痰得大㦸甘遂為贅瘤焦法得大黄甘草大棗芒硝治水腫支飲白歛味苦主治隂腫帶下得白芷治諸物哽咽得附子治風痺筋急桃仁味苦甘功專破瘀血潤腸止心腹痛得吳茱茰治冷勞減食得延胡索川楝子治肝厥胃脘痛梓白皮味苦寒主治時行熱毒得連翹赤小豆治温熱發黄川楝子味苦主治諸疝得延胡索治熱厥心痛得吳茱茰治氣痛囊腫得補骨脂小茴香食鹽治偏墜痛不可忍巴豆味辛功專蕩滌藏府得杏仁治飛尸鬼疰得亂髮灰治舌上出血得白礬療天絲入咽郁李仁味酸入足太隂經功專下氣利水專治大腸燥澁得醇酒能使人睡蟬蛻味醎甘主治風熱得硃砂治小兒夜啼得薄荷葉治皮膚風癢蜣螂味醎寒入足厥隂經主治寒熱驚癎用其白心治疔瘡垂斃螻蛄味醎主治水腫癰毒得蜣螂治大小便閉得穿山甲塞耳中治聾螢火味辛主治温疫務成子有螢火丸鼠婦味酸温入足厥隂經主治寒熱葛洪用以截瘧神效䗪蟲味酸寒功專下血行傷得桃仁大黄治產婦乾血腹痛得乳香没藥龍骨自然銅能去傷接骨蝦蟇味平主治小兒五疳蜈蚣味辛温主治尸疰惡氣蚯蚓味醎功專利水得乳香治驚風悶亂和麵作餛飩治癡癲地膽味辛主治瘡瘍癥瘕得硃砂滑石治小腸氣痛得細辛白芷治鼻中瘜肉斑毛味辛寒功專入下竅利水去毒得糯米治風狗咬傷得滑石治便毒水蛭味醎苦入足厥隂經功專破血行傷得蜚􅀈治畜血得麝香治跌打傷蛇蛻味醎甘主治小兒百十二種驚癎得當歸治纒喉風得蟬蛻銕落頭髮治産難不下麋茸味甘温功專滋隂益腎得附子雀卵壯陽不老得附子山藥補元駐顔豬膚味甘寒禮運疏云膚外厚皮也得白蜜米粉治少隂下痢咽痛猪尾血味醎性寒善動得龍腦治痘疹倒靨白石英味甘主治痿痺肺癰實大腸得硃砂治驚悸得磁石治耳聾胡粉味辛功專療惡瘡得硼砂當歸接骨續筋得黍米治腹中鼈癥得猪脂療誤吞金銀鉛丹味辛寒功專墜痰止驚得龍骨牡蠣治心臟神驚代赭石味苦寒入足厥隂經功專入血鎮逆得冬𤓰仁治慢驚風青礞石味甘醎入足厥隂經功專利痰止驚得硝石赤石脂治一切痰積痼疾得燄硝治驚風危證青鹽味醎寒功專助水藏益精氣得杜仲補骨脂能補肝陽得川椒能明目下品藥集補時用五十品苧麻味甘主治漏胎得建蓮糯米能固胎元蘆根味甘寒主治消渴嘔逆得麥冬治霍亂煩悶得麥冬骨皮茯苓橘紅生薑治骨蒸肺痿旱蓮草味甘酸烏髭髮益腎隂得青鹽能固齒得車前治溺血蒴藋味酸温一名接骨草能蝕惡肉海金沙味甘寒功專利水通淋得臘茶治小便不通得滑石治膏淋如油得白术黑牽牛治脾濕腫滿馬兜鈴味苦寒主治熱咳得甘草治肺氣喘急黑牽牛味苦寒功專下氣逐水得茴香治水飲痛得大黄治馬脾風病何首烏味苦濇入足厥隂經功專消癰腫益精髓得當歸枸杞兔絲骨脂脂麻能固精延年得胡麻治大風癘疾土茯苓味甘淡功專去風濕利闗節得金銀花苦參治楊梅瘡毒山豆根味苦寒專解咽喉腫毒威靈仙味苦温功專去風濕療折傷得砂仁沙糖治骨鯁得木𤓰治腰脚諸病馬勃味辛平功專散血解毒得牛蒡子連翹𤣥參治温毒發頣神麵味甘辛功專化水榖運積滯得麥芽杏仁治胃虛不剋得蒼术能壯脾進飲食得茱茰治暴泄不止蒜味辛温主治邪痺蠱毒得黄丹能止瘧莱菔子味辛甘功專治痰下氣消食除脹絲𤓰子味苦功專通經絡解熱毒得槐花治腸風下血得蘆根桃仁治癰杏仁味甘苦入手太隂經功專散結潤燥得天門冬能潤心肺得柿餅治肺病咯血得童便能補肺劫勞梨味甘微酸主治熱𠻳止渴潤肺凉心得黒穭豆治痰喘氣急得丁香治反胃轉食烏藥味辛温功專消風順氣得沉香治胸腹冷氣得益智仁治小便頻數得蘹香青皮良薑治五積切痛没藥味苦功專破血止痛得乳香治打撲踠跌經絡受傷腫痛得虎脛骨治歷節風痛安息香味辛苦主治心腹惡氣夜夢鬼交得諸品香藥能通神明龍腦香一名氷片味辛苦主治骨節間風得猪血令心經痘毒宣發於表阿魏味辛功專殺蟲破癥辟瘟消瘴得丹砂為丸能截瘧得靈脂黄狗疸治噎鬲痞積蘆薈味苦寒入足厥隂經主治鬲熱得使君子治小兒脾疳得硃砂治老人風秘椿樗味苦温功專殺蟲止利得訶黎勒母丁香醋糊治休息利得蒼术枳殻治脾毒腸風得乾薑白芍黄柏治濕熱白帶阿黎勒味苦温功專下氣澁腸得烏梅五味則收歛得橘皮厚朴則泄氣得肉果治水瀉下利黄絲絹得白芨能接㫁腸得丹皮白芨治産婦脬損得棕櫚貫衆京墨荷葉四灰治婦人血崩炊單布受湯上之氣用以引出上焦之傷能治墜馬傷褌襠灰燒灰治隂陽易五倍子味酸得茯苓龍骨治虛勞遺濁得白礬治腸風下血蜘蛛性寒主治小兒大腹丁奚得肉桂治狐疝五靈脂即寒號蟲失入足厥隂經功專散血止痛得蒲黄治心腹疼痛産後惡露刺痛蚌水功專止渴除煩蚌粉治久𠻳不止珠菜味甘温主治虛勞傷憊吐血下利鼠矢雄者兩頭尖味醎寒入足厥隂經得韭根治男子陽易亦治膀胱水結獺肝味甘温主治鬼疰傳尸得竹節中水治心腹積聚亂髮味苦功專止血通淋得猪膏治婦人隂吹童便味醎寒功專降火止血得甘草治久𠻳肺痿得杏仁猪肝治休息痢秋石味醎功専滋腎水養丹田得乳粉能固元陽延年不老得茯苓兔絲治遺濁得茯苓蓮肉芡實棗肉治色慾過度遺精小便數食物中用腫脹代鹽人乳味甘功專補五臟得梨汁能消痰補虛得美酒治辛不得語夭癸味醎主治熱病勞復得人乳童便滴入鼻内治瞳神反背伏龍肝味苦辛主治血症帶下得阿膠蠶砂治婦人血漏𢎞景註即灶心黄土得附子黄芩阿膠治便後血罌瓶口功專行傷消堅地漿味甘寒主治煩熱霍亂鍼砂味辛功專破積平肝得黄連苦參治熱脹腹瀉石蟹味醎寒入足厥隂經主治青盲丁瞖得羚羊角決明治胬肉攀睛絳雪園古方選註卷十七
