body:
  text: 絳雪園古方選註卷十五蘓州王子接撰折傷科接骨丹七炁罌口古屋上廣漢前上層生瓶年深者良用純鋼銼生剉末研之無聲水飛一錢古文錢約五百年者良火煆醋淬七次研之無聲如塵者佳五分右和匀每服七厘先用甜𤓰子仁去殼三錢嚼爛吐出拌藥再服下清酒過口附録烏古散邵以正真人方用路上牆脚下往來人便溺處久浸烏碎瓦一塊洗潔火煆米醋淬五次黄色為度刀刮細末研之無聲每服三錢好酒送下治骨折筋斷神效罌小口瓶也七炁者日月風雨露霜雪也火土結成堅剛性利復藉天之七炁能透骨入髓理傷續絶古文錢其半兩五銖出自秦漢紅銅者佳唐時開元錢亦可入藥功專腐蝕壊肉陳藏器曰能直入損處銲人斷骨甜𤓰子仁開膓胃之壅遏通筋骨之機闗因丹藥厘數甚微助以入胃轉輸爲丹藥之嚮導也烏古散其理相同取其便捷故附録於後里東丸五靈脂炒醬色為度九兩五錢五分番木鼈用蔴油在銅灼内煎滚放在内約二沉二浮即好十兩穿山甲炒黄焦二兩五錢地龍韭地者佳將滚湯泡熟在日内曬乾如不乾在火上焙乾不得隔夜九兩五錢黄蔴灰切碎貯陽城鑵内鹽泥封固頭大火内煆三兩麝香三錢三分芸香即白膠香楓脂也二兩五錢乳香去油一兩二錢五分古文五銖錢火煆十七个自然銅火煆紅醋淬二兩草烏去皮尖炒三錢五分全蠍去尾上鈎一兩二錢五分當歸酒洗一兩二錢五分京墨如方氏陳者住火燒烟盡為度二錢五分右酒糊爲丸硃砂爲衣蠟丸永久不壊每丸一錢五分重好酒開送下清晨服時須先略飲食然後用藥即下部傷亦食後服里東丸少陵僧所傳細繹是方都用血肉靈動之藥蓋草木具無形之氣不足以治形傷也五靈脂受五行之靈氣迅入肝經用以利氣行血退腫接骨番木鼈形傷者必腫腫則氣凝血死用以解破處之血熱消形傷之結腫穿山甲寓水而食穴陵而居用以出隂入陽走竄經絡迅達傷處蚯蚓上食稿壤下飲黄泉用以從陽入隂取蚓毒攻絡内之瘀更取蚓性逐水解熱消腫四者功專外消結腫分兩獨重者治傷綱領之藥也黄蔴灰用以破血利小便行傷接骨麝香通闗入腎用以外通百竅内透骨髓乳香入心經言諸痛皆屬心火用以䕶心托裏昏神定痛芸香性燥入脾用以勝肉理之濕排膿止痛强筋骨生肌肉古文錢跌撲損傷者用半兩五銖折傷必然肉敗用以腐蝕壊肉自然銅性燥破血用以逐敗惡之血六者去瘀生新安神定痛分兩次之者治傷之條目也草烏外風襲入破傷之處即為破傷風用以祛經絡之風從表而出全蠍外風襲入内風必從用以直攻破損之處消散内風二者非防微杜漸亦折傷中所必有之證也當歸補營血用以去瘀生新京墨灰濇能固衞氣用以生肌膚合傷縫二者各具收成之理統論全方雖非控經定證然其調治折傷之法井井有條先退腫後定痛腐其壊肉去其惡血祛其風活其血俾經脉流通則氣血條暢脂膏流着於傷處其骨自接敗蒲煎敗蒲席一握三寸久用炊單布一尺燒灰緋帛如手大燒灰亂髪如雞子大燒灰大黄一兩切浸湯成下桃仁四十九箇去皮尖甘草如中指節炙剉右七味以童子小便量多少煎湯成内酒一大盞次下大黄去滓分温三服先剉敗蒲席半領煎湯浴衣被蓋覆斯須通利數行痛楚立差利及浴水赤勿怪即瘀血也金匱敗蒲煎治馬墜傷者馳騁之時陽鼔於上卒然而墜傷在於首病頭脹頸麤發熱體痛故其所治有不同於平常跌撲所傷者方中多用陳敗之物取其伏陽而行瘀也敗蒲席須作帆之蒲惟鄉船中嘗以爲臥具者佳藉其精神所憑可以伏陽且陳蒲可逐上焦瘀血炊單布久蒸則受湯熟之氣可以化陽自熄退腫除陳亂髪療驚安神緋帛行瘀捜傷大黄桃仁甘草即桃仁調胃承氣二湯之義用以掃除三焦之瘀外用敗蒲沐浴以逐肌肉筋骨之瘀内外兼治非聖心化裁誰能及此絳雪園古方選註卷十五
