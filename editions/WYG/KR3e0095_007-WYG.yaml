body:
  text: 絳雪園古方選註卷七蘇州王子接撰内科秫米半夏湯秫米一升半夏五合右以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪火沸置秫半徐炊令竭一升半去渣飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已矣久者三飲而已也秫米半夏湯非治奇經蹻絡方也按二十六難曰經有十二絡有十五餘三絡陽蹻陰蹻脾大絡也凡經絡二十七氣相隨上下其蹻絡不拘於十二經四明陳氏曰陽蹻綂諸陽絡陰蹻綂諸陰絡越人云絡脉滿溢不能拘通譬之溝渠滿溢流注深湖而不環周故十二經不能拘其蹻絡而蹻絡亦不能拘十二經是以治奇經古無八脉藥石之方止有八脉鍼刺之法今厥氣客於臟腑衞氣獨行於陽陽蹻氣盛不得入於陰陰虛目不瞑用秫半湯者以藥石不能直入陽蹻故治胃以泄衞氣也半夏辛温入胃經氣分秫糯也北地之膏粱茹粟也甘酸入胃經血分千里水揚之萬遍與甘瀾水同義取其輕揚不助陰邪炊以葦薪武火也火沸入藥仍徐炊令減寓升降之法升以半夏從陽分通衞泄邪降以秫米入隂分通營補虛陰陽通臥立至汗自出故曰汗出則已矣馬膏生桑桂酒方馬膏鬐項上脂生桑灰桑枝炒灰桂用桂枝白酒以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑灰置之坎中高下以坐等以膏熨急頰且飲美酒噉美炙肉不飲酒者自强也為之三拊而已靈樞云季春痺者北地之真中風也春三月陽氣清明其風之中人也不能深入中於陽明之絡卒口僻急者目不合熱則筋縱目不開以北地風高氣燥非辛散袪風藥可療故外用和陽潤燥塗熨之法邪中左頰則口喎於右邪中右頰則口喎於左無邪者筋急引頰移口皮膚頑痺故用馬膏甘辛柔緩以摩其急潤其血脉通其痺中邪者筋弛縱緩不勝收故用桂之辛熱酒之活絡急以塗其緩和其營衞通其血絡以桑鉤鉤之鉤其頰也坎頰間之坎陷也即以生桑灰者生者活也隨時採活桑枝炒灰取其性銳力足通節竅袪風痺高下以坐等者以桑灰置之坎中務使高下厚薄相等然後以膏熨急頰令桑性入絡調匀馬膏舒筋潤痺三拊者輕手拊拍其三次也飲以美酒病在上者酒以行之啖美炙肉助胃氣上升於絡也若夫燔鍼劫刺俟明者釋之生鐵洛飲生鐵落以清水浸一伏硏澄飲水按甲乙經鐵洛為飲作為後飯生鐵落未經煅煉是爐冶間初槌生鐵飛出如蛾者治夏令之時邪以夏氣在臟所惡於火故病則厥陽怒狂厥陽者入夏太陽氣反微少陽氣尚静若太陽脉動於項兩旁大筋前陷者中天窗穴間是太陽脉氣所發之處少陽脉動於曲頰下天容穴間是少陽脉氣所發之處其二脉不應動而大動是為厥治之不以藥石者經言藥石發癲芳草發狂故以生鐵洛用水硏浸為飲葢鐵之生者氣寒味辛其性直行内降下氣疾速用其槌出之花庶得外走經絡開結於木火之中則狂怒自已甲乙經云飲以鐵洛作為後飯病能本論又云奪其食則已是榖氣又在禁例或者以麥食為後飯幷可鎮肝存之以俟君子澤术麋銜散澤㵼十分白朮十分麋銜五分右合以三指撮為後飯澤术麋銜岐伯治酒風即風論曰飲酒中風則為漏風其傷在脾胃病身熱解惰汗出如浴惡風少氣應秋令之時邪以秋氣在分肉所惡於溼内因酒溼所傷則邪留肌肉外因風邪傷衞則陽氣去腠理疎𤣥府開筋痿弱是發證之所由來也麋銜袪在表之風澤㵼滲在裏之濕白术助脾胃之氣以却邪合以三指撮者是為散欲其緩於中以去病也後飯者即仲景云服藥已須臾啜稀粥一升餘以助藥力也藥熨法醇酒二十升蜀椒一升生乾薑一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈并内酒中置酒馬矢煴中葢封塗勿使泄五日五夜出布綿絮曝乾之乾復漬以盡其汁每漬必晬其日乃出乾乾并用渣與綿絮複布為複巾長六七尺為六七巾則用之生桑炭炙巾以熨寒痺所刺之處令熱入至於病所寒復炙巾以熨之三十遍而止汗出以巾拭身亦三十遍而止藥熨大人之寒痺大人者富貴之人也寒痺者時痛而皮膚不仁也其血脉筋骨雖痺而禀氣清靈但以藥熨導引即可蠲痺非若刺布衣而必以火焠之也椒酒薑桂專通營氣以散血分之寒漬酒置馬矢煴中馬矢西北方常用之取其微火非有他義也晬盡日也複巾夾袋也熨至於汗庶營氣得通熨凡三十遍者欲其寒邪去盡以巾拭身亦必三十遍者恐汗液之氣留也角髮酒左角髮方一寸左之長髪刺厥不已以竹管吹其兩耳陶隠居云吹其左耳極三度復吹其右耳三度再鬄其左角之髮燔治飲以美酒一杯不能飲者灌之而已邪客於四臟一腑之絡乃為尸厥者以心腎為水火絡肺脾為天地絡胃為中土絡此五絡皆㑹於耳中上絡左角若陰陽相離不能交㑹則身脉動而形無知其狀如尸當刺五絡之井不已先以竹管吹耳以通五絡之㑹再剃其左角之髮燔為血餘入絡化瘀以通左角本草經云血餘仍自還神化也飲以美酒使絡氣與衞氣相通庶陽和厥醒血氣形志篇云經絡不通病生於不仁治之以醪藥也余按今世神鍼難得可用犀角柏子仁石菖蒲羚羊角桑葉女貞子生地當歸蒸為藥露服之内通四臟六腑之絡以代鍼調入血餘以代燔内治之法其理亦通蘭草湯蘭草水煎服蘭草綱目曰省頭草朱震亨曰花葉俱香燥濕不變内經脾癉口甘岐伯曰脾癉是五有餘之疾必其人數食甘美而多肥五氣上溢轉為消渴之癉治之以蘭即自註云除陳氣也除謂去也陳謂久也言惟此清蔬可除脾經陳久藴蓄之熱葢其味辛性寒主開結利竅解熱止渴故以一味單行能使肥甘不化之氣蕩滌無餘則其性之峻利可知苟非肥美所發之癉又非所宜也四君子湯人參二錢白术二錢炒茯苓二錢炙甘草一錢生薑三片大棗二枚右水煎温服湯以君子名功專健脾和胃以受水榖之精氣而輸布於四臟一如君子有成人之德也入太陰陽明二經然其主治在脾故藥品分兩皆用偶數白朮健脾陽複人參保脾陰炙草和胃陰複茯苓通胃陽大棗悅脾生薑通胃理運陰陽剛柔相濟誠為生化良方加廣皮半夏名六君子不特為脾經治痰而半夏入胃有交通上下陰陽之神妙十全大補湯人參二錢白术二錢土炒茯苓二錢炙甘草一錢當歸三錢川芎一錢生地三錢白芍二錢黄耆一錢肉桂一錢右水二鍾煎八分食逺服四君四物加黄耆肉桂是剛柔複法葢脾為柔臟制以四君剛藥恐過剛損柔乃複黄耆維持柔氣肝為剛臟制以四物柔藥恐過柔損剛乃複肉桂囘䕶剛氣調劑周密是謂十全獨補肝脾而曰大者太陰陽明論云脾臟者常著胃土之精者也生萬物而法天地為後天立命之本肝雖牡臟而位卑不使其有虛實乘勝之患故必補益之中仍寓剛柔互制之法俾肝和脾健中宮生化不息一如天地位而萬物育故曰大補歸脾湯人參二錢白朮二錢土炒茯神二錢炙甘草五分黄耆二錢當歸二錢棗仁二錢炒黒逺志一錢去心炒木香五分桂圓七枚水二盞煎七分食逺服歸脾者調四臟之神志魂魄皆歸向於脾也葢五味入胃必藉脾與胃行其津液以轉輸於四臟而四臟亦必先承順乎脾而為氣化流行之根本假如土者生萬物而法天地為博厚之體然無水則燥無火則濫無木則實無金則死陰符經曰生者死之根死者生之根也參朮神草四君子湯以健脾胃佐以木香醒脾氣桂圓和脾血先為調劑中州複以黄茋走肺固魄棗仁走心歛神安固鬲上二臟當歸入肝芳以悅其魂遠志入腎辛以通其志通調鬲下二臟四臟安和其神志魂魄自然歸向於脾而脾亦能受水榖之氣灌漑四旁榮養氣血矣獨是藥性各走一臟足經方雜用手經藥者以黄耆與當歸棗仁與逺志有相須之理且黄茋味入脾而氣走肺棗仁味入肝而色走心故借用不悖四君子湯用茯苓改用茯神者以苓為死氣而神得松之生氣耳補中益氣湯人參三分𠻳者去之白术三分土炒黄耆一錢蜜炙當歸五分酒焙柴胡二分或三分升麻二分或三分陳皮二分或三分甘草五分炙右件藥㕮咀都作一服水二盞煎至一盞去滓食逺稍熱服氣者專言後天之氣出於胃即所謂清氣衛氣榖氣營氣運氣生氣陽氣春升之氣後天三焦之氣也分而言之則異其實一也東垣以後天立論從内經勞者温之損者益之故以辛甘温之劑温足太陰厥陰升足少陽陽明黄耆當歸和營氣以暢陽佐柴胡引少陽清氣從左出陰之陽人參白术實衞氣以填中佐升麻引春升之氣從下而上達陽明陳皮運衞氣甘草和營氣原其方不特重參耆歸术温補肝脾義在升麻柴胡升舉清陽之氣轉運中州故不僅名補中而復申之曰益氣人參養營湯人參一錢白术一錢土炒茯苓七分廣皮一錢甘草一錢炙熟地七分當歸一錢白芍一錢五分黄耆一錢肉桂一錢逺志肉五分五味子七分右水二鍾加生薑三片大棗二枚煎八分食逺温服養營者調養營氣循衞而行不使其行之度數疾於衞也故於十全大補湯中減川芎行血之品獨用血分填補收斂之藥則營行之度緩於氣分藥中加廣皮行氣之品則衞行之度速觀其一減一加便能調平營衞使其行度不愆複逺志五味者經言營出中焦心經主之以逺志通腎使陰精上奉於心佐以五味收攝神明一通一歛則營有所主而長養矣古今録驗續命湯麻黄三錢去節泡去沫炒桂枝三錢杏仁三十枚去皮尖石膏二錢甘草三錢炙乾薑三錢人參三錢當歸三錢川芎一錢右九味水煎温服當薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風古今録驗者其方録於竹簡從古至漢始刋於金匱附方中續命者有却病延年之功按十六國春秋有盧循遺劉裕益智粽裕乃答以續命湯又歐陽脩有細為續命絲之句可徵二字之謂延年矣藥品同於大青龍湯借川芎佐桂枝以治風痺乾薑佐麻黄以治寒痺杏仁佐石膏以治熱痺獨桂枝人參竝用仲景謂之新加以之治真中風似乎不宜實表然真中風雖有客邪仍以内因為重邪風中人身痱必由表虛絡脉弛縱必由裏熱故氣宜固血宜活風寒宜散脉絡宜凉自當内外施治以辟邪風非處方之冗雜也二陳湯半夏二錢薑礬製陳皮一錢去白茯苓一錢甘草五分右水一鍾五分加生薑一片煎八分温服二陳湯古之祖方也汪訒菴謂其專走脾胃二經豁痰去濕余細繹之其功在利三焦之竅通經隧之壅而痰飲自化非劫痰也觀内經有飲字而無痰字兩漢以前謂之淡飲至仲景始分痰飲義可知矣因其通利無形之氣古人警戒橘皮半夏必以陳者為良恐燥散之性能傷正氣耳故湯即以二陳名若云劫痰正當以大辛大散開辟濁陰何反懼其太過耶再使以甘草緩而行之益見其不欲傷氣之意平胃散茅山蒼术去粗皮米泔浸五兩紫厚朴去皮薑汁炒三兩二錢廣陳皮三兩二錢去白甘草二兩炙右為細末每服二錢水一盞薑三片棗二枚同煎七分温服胃為水土之臟長生於申水榖之入於胃也分為三隧其糟粕一隧下入小腸傳於大腸全賴燥火二氣變化傳送若火不温而金不燥失其長生之氣上雖有心陽以扶土而下焦川凟失利則胃中泛濫而成卑濕之土為濕滿為濡㵼治以蒼术辛温助胃行濕升發榖氣厚朴苦温辟陰去濁温胃滲濕甘草調和小腸橘紅通理大腸胃氣安常大小腸處順故曰平胃相傳出自龍宫禁方俟君子正之括蔞根桂枝湯分兩遵喻嘉言法其意頗通括蔞根三錢桂枝一錢五分芍藥二錢甘草一錢五分生薑三片大棗二枚右六味以水三升煑取一升去滓温服取微汗汗不出食頃食熱粥發之金匱諸篇每多合論其間或邪異而病在一經或邪同而病在各經者分證論治悉相貫徹若後人選註其方不相逭照前後原文則是有闕本篇大㫖若循章徧註而方選又難於博採不得已擇方中之可以摘選者為之申明一二并使前論益明是猶一隅之告耳即如太陽痙濕病非但發熱無汗惡寒更加身體强几几脈反沉遲明是風濕混擾於太陽陽氣為濕邪所滯不得宣通非寒邪之沉遲脉也治以括蔞根桂枝湯者風則用桂枝湯成法濕則君以括蔞根酸苦入陰内走經絡解天行時熱以降濕合之桂枝和營衞而治痙是表法變為和法也防己黄茋湯防己一兩甘草半兩炒白术七錢半黄耆一兩一分去蘆右剉麻豆大每抄五錢七生薑四片大棗一枚水盞半煎八分去滓温服良久再服喘者加麻黄半兩胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如蟲行皮中從腰下如氷煖坐被上又以一被繞腰下温令微汗差防己茯苓湯防己三兩黄耆三兩桂枝三兩茯苓六兩甘草二兩右五味以水六升煑取二升分温三服漢防己太陽經入裏之藥泄腠理療風水通治風濕皮水二證金匱汗出惡風者佐白术水氣在皮膚中聶聶動者佐桂枝一以培土一以和陽同治表邪微分標本葢水濕之陽虛因濕滯於裏而汗出故以白术培土加薑棗和中胃不和再加芍藥皮水之陽虛因風水襲於表内合於肺故用桂枝解肌散邪兼固陽氣不須薑棗以和中也黄蓍湯方下云服藥當如蟲行皮中從腰下如氷可知其汗僅在上部而不至於下即用白术内治其濕尤必外用被圍腰下接令取汗以通陽氣也余治太陽腰髀痛審症叅用兩方如鼓應桴并識之百合知母湯百合七枚擘知母三兩切右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓别以泉水二升煎知母取一升去滓後合和煎取一升五合分温再服滑石代赭湯百合七枚擘滑石三兩碎綿褁代赭石如彈丸大一枚碎綿褁右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓别以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分温服百合雞子湯百合七枚擘雞子黄一枚右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓内雞子黄攪匀煎五分温服百合地黄湯百合七枚擘生地黄汁一升右以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓内生地黄汁煎取一升五合分温再服中病勿更服大便當如漆通章言百合病百脈一宗不但主於營衞而手足六經悉能致其病汗吐下皆非所宜本文云百脈一宗明言病歸於肺君以百合甘涼清肺即可療此疾故名百合病再佐以各經清解絡熱之藥治其病所從來當用先後煎法使不悖於手足經各行之理期以六十日六經氣復而自愈若太陰太陽無病惟少陰少陽厥陰陽明四經為病期以四十日愈若僅屬厥陰陽明二經為病期以二十日愈讀第四章未經汗吐下者治以百合地黄湯中病勿更服大便如漆熱邪已洩再服恐變症也論症以溺時頭痛為辨葢百脈之所重在少陰太陽以太陽統六經之氣其經上循巔頂下通水道氣化不行乃下溺而上頭痛少陰為生水之源開闔澁乃溺而淅然若誤汗傷太陽者溺時頭痛以知母救肺之陰使膀胱水藏知有母氣救肺即所以救膀胱是陽病救陰之法也誤下傷少陰者溺時淅然以滑石上通肺下通太陽之陽恐滑石通腑利竅仍蹈出汗之弊乃複代赭石重鎮心經之氣使無汗泄之虞救膀胱之陽即所以救肺之陽是陰病救陽之法也誤吐傷陽明者以雞子黄救厥陰之陰以安胃氣救厥陰即所以奠陽明救肺之母氣是亦陽病救陰之法也以百合一味引伸諸方總不外乎補陰補陽之理舉此可以類推學者宜自得之升麻鼈甲湯升麻二兩當歸二兩蜀椒炒去汗一兩甘草二兩鼈甲手指大一片炙雄黄半兩研右六味以水四升煑取一升頓服之老小再服取汗金匱原文陰毒去蜀椒雄黄肘後方千金方陽毒用升麻湯無鼈甲有桂枝陰毒用甘草湯無雄黄升麻入陽明太陰二經升清逐穢辟百邪解百毒統治温厲陰陽二病如陽毒為病面赤斑如錦紋陰毒為病面青身如被杖咽㗋痛母論陰陽二毒皆已入營矣但升麻僅走二經氣分故必佐以當歸通絡中之血甘草解絡中之毒微加鼈甲守䕶營神俾椒黄猛劣之品攻毒透表不亂其神明陰毒去椒黄者太陰主内不能透表恐反助厲毒也肘後方千金方陽毒無鼈甲者不欲其守亦恐留戀厲毒也白虎加桂枝湯知母六兩甘草三兩炙石膏一斤粳米二合桂枝三兩右剉每五錢水一盞半煎至八分去滓温服汗出愈内經論瘧以先熱後寒邪藏於骨髓者為温癉二瘧仲景以但熱不寒邪藏於心者為温癉二瘧内經所言是邪之深者仲景所言是邪之淺者也其殆補内經之未逮歟治以白虎加桂枝湯方義原在心營肺衞白虎湯清營分熱邪加桂枝引領石膏知母上行至肺從衞分泄熱使邪之鬱於表者頃刻致和而瘧已至於内經温癉瘧雖未有方然同是少陰之伏邪在手經者為實邪在足經者為虛邪實邪尚不發表而用清降何况虛邪有不顧慮其亡陰者耶臨症之生心化裁是所望于用之者矣蜀漆散蜀漆洗去腥雲母燒二日夜龍骨等分右三味杵為散未發前以漿水服半錢温瘧加蜀漆半分臨發時服一錢匕按漿水乃秫米和麯釀成如醋而淡今人㸃牛乳作餅用之或用真粉作内菉豆者尤佳金匱云牡瘧外臺曰牝瘧皆言心經之瘧也心為陰中之陽邪氣結伏於心下心陽鬱遏不舒瘧發寒多熱少不可謂其陰寒也主之以蜀漆散通心經之陽開發伏氣而使營衞調和蜀漆常山苗也苖性輕揚生用能吐雲母在土中蒸地氣上升而為雲故能入陰分逐邪外出於表然邪氣久留心主之宫城恐逐邪涌吐内亂神明故佐以龍骨鎮心寧神則吐法轉為和法矣柴胡去半夏加括蔞湯柴胡八兩人參三兩黄芩三兩甘草三兩括蔞根四兩生薑二兩大棗十二枚右七味以水一斗二升煑取六升去滓再煎取三升温服一升日二服正瘧寒熱相間邪發於少陽與傷寒邪發於少陽者稍異内經言夏傷於大暑秋傷於風病以時作名曰寒瘧金匱云瘧脈多弦弦數者風發正以凄愴之水寒久伏於腠理皮膚之間營氣先傷而後風傷衞故仲景用柴胡湯去半夏而加括蔞根其義深且切矣葢少陽瘧病發渴者由風火内淫劫奪津液而然奚堪半夏性滑利竅重傷陰液故去之而加天花粉生津潤燥豈非與正傷寒半表半裏之邪當用半夏和胃而通陰陽者有别乎柴胡桂薑湯柴胡半斤桂枝三兩去皮乾薑二兩黄芩三兩括蔞根四兩牡蠣三兩熬甘草二兩炙右七味以水一斗二升煑取六升去滓再煎取三升温服一升日三服初服微煩復服汗出便愈夏月暑邪先傷在内之伏陰至秋復感涼風更傷衞陽其瘧寒多微有熱顯然陰陽無争故瘧邪從衞氣行陰二十五度内無捍格之狀是營衞俱病矣故和其陽即當和其陰用柴胡和少陽之陽即用黄芩和裏用桂枝和太陽之陽即用牡蠣和裏用乾薑和陽明之陽即用天花粉和裏使以甘草調和陰陽其分兩陽分獨重柴胡者以正瘧不離乎少陽也陰藥獨重於花粉者陰虧之瘧以救液為急務也和之得其當故一劑如神達原飲常山一錢檳榔二錢草果一錢厚朴一錢黄芩一錢五分知母二錢石菖蒲七分青皮七分甘草五分右水二鍾煎八分露一宿發後温服瘧發間日者内經言邪氣内薄五臟横連募原全元起本募作膜其道逺其氣深稽古無瘧邪犯膜原之方唯吳又可治疫初犯膜原以達原飲為主方余因博採聖濟常山飲簡易七寶飲叅互攷訂増改三味以治間瘧葢瘧邪内薄則邪不在表非但隨經上下其必横連於膜深入於原矣膜謂鬲間之膜原謂鬲肓之原亦衝脉也靈樞經云肓之原出於脖胦止一穴在臍下同身寸之一寸半經又言邪氣客於腸胃之間膜原之下則膜原又有屬於腸胃者治以常山滌鬲膜之痰檳榔達肓原之氣草果厚朴温除腸胃之濁邪黄芩知母清理腸胃之熱邪複以菖蒲透膜青皮達下甘草和中而瘧自解侯氏黑散菊花四十分白术十分細辛三分茯苓三分左牡蠣三分桔梗八分防風十分人參三分礬石三分黄芩三分當歸三分乾薑三分芎藭三分桂枝三分右十四味杵為散酒服方寸七日三服初服二十日用温酒調服禁一切魚肉大蒜常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷食自能助藥力陳雲來云金匱侯氏黑散係宋人較正附入唐人之方因逸之其辨論頗詳而喻嘉言獨贊其立方之妙驅風補虛行堵截之法良非思議可到方中取用礬石以固澁諸藥冷服四十日使之留積不散以漸填其空竅則風自熄而不生矣此段議論獨開千古之秘誠為治中風之要㫖余讀是方補氣養血散表驅風入走經絡殊覺溷亂顧以黑名意者藥多炒黑不從氣而從味取其苦濇以走於空竅耳再讀方下云初服二十日用温酒調是不欲其遽填也後服六十日并禁熱食則一任填空竅矣夫填竅本之内經久塞其空是謂良工之語煞有來歴余故選之射干麻黄湯射干三兩麻黄四兩紫苑三兩欵冬花三兩北細辛三兩五味子半升半夏半升生薑四兩大棗七枚右九味以水一斗二升先煑麻黄兩沸去上沫内諸藥煑取三升分温三服射干湯以苦辛温入肺者為複方喉中水雞聲者痰氣出入而嗘咯也由肺中冷陽氣不能宣其液鬱於肺而生聲其治不可同於肺冷而吐涎者乃複用本經主治欬逆上氣之品大泄陰液宣通肺氣射干紫苑以苦泄之也麻黄細辛欵冬半夏生薑以温瀉之也五味子酸以收其正氣大棗甘以緩其下行則射干細辛五味之性從麻黄外達肺經内通肺臟泄肺之所苦遂肺之所欲補肺之正温肺之陽俾氣道平而肺得陽和之致自無嗘咯之聲矣厚朴麻黄湯厚朴五兩麻黄四兩石膏如雞子大杏仁半升半夏半升乾薑二兩細辛二兩小麥一升五味子半升右九味以水一斗二升先煑小麥熟去滓内諸藥煮取三升温服一升日三服厚朴麻黄湯大小青龍之變方也咳而上氣作聲脈浮者是屬外邪鼓動下焦之水氣上逆與桂枝芍藥甘草和營衞無涉故加厚朴以降胃氣上逆小麥以降心氣來乘麻杏石膏仍從肺經泄熱存陰細辛半夏深入陰分袪散水寒乾薑五味攝太陽而監制其逆一舉而泄熱下氣散邪固本之功皆備則肺經清肅之令自行何患欬逆上氣作聲有不寧謐者耶麥門冬湯麥門冬七升半夏一升人參三兩甘草二兩粳米三合大棗十二枚右六味以水一斗二升煑取六升温服一升日三夜一服麥門冬湯從胃生津救燥治虛火上氣之方金匱云火逆上氣咽喉不利止逆下氣按内經脈解篇云嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也五臟生成篇云欬逆上氣厥在胸中過在手陽明太陰是則上氣病在肺下氣病在大腸也明矣葢金位之下火氣承之非獨肺也大腸亦然若徒以寒涼冷燥止肺經火逆上氣而手陽明之下氣未平仍然胸中膹鬱閉塞呻吟豈非大腸之燥傳入於肺而為息賁有音上奔而不下也乎仲景另闢門户用人參麥門冬甘草粳米大棗大生胃津救金之母氣以化兩經之燥獨複一味半夏之辛温利咽止逆通達三焦則上氣下氣皆得寧謐徹土綢繆誠為扼要之法止逆下氣或註曰止其逆則氣下是申明火逆上氣於理亦通葶藶大棗瀉肺湯葶藶熬令黄色搗丸如彈子大大棗十二枚右先以水三升煑棗取二升去棗内葶藶煑取一升頓服葶藶泄水下行與甘相反妙在大棗甘而泄中氣故用其甘以載引葶藶上行瀉肺用其泄仍可任葶藶之性下行利水不過藉棗之甘逗留於上而成泄肺之功猶桔梗藉甘草為舟楫也千金葦莖湯葦莖二斤薏苡仁半斤桃仁五十枚瓜瓣半斤右四味以水一斗先煑葦莖得五升去滓内諸藥煑取二升服一升再服當吐如膿葦蘆之大者莖榦也是方也推作者之意病在鬲上越之使吐也葢肺癰由於氣血混一營衞不分以二味凉其氣二味行其血分清營衞之氣因勢涌越誠為先着其瓜瓣當用絲瓜者良時珍曰絲瓜經絡貫串房隔聯屬能通人脈絡臟腑消腫化痰治諸血病與桃仁有相須之理薏仁下氣葦莖上升一升一降激而行其氣血則肉之未敗者不致成膿癰之已潰者能令吐出矣今時用嫩葦根性寒滌熱冬瓜瓣性急趨下合之二仁變成潤下之方借以治肺痺其義頗善賁豚湯甘草二兩芎藭二兩當歸二兩半夏四兩黄芩二兩生葛五兩芍藥二兩生薑四兩甘李根白皮一升右九味以水二斗煑取五升温服一升日三夜一服賁與憤同俗讀奔豚尾後竅又小豕也病從腹中氣攻於上一如江豕以臀憤起而攻也是方治驚恐而得賁豚者緣心動氣馳氣結熱聚故其聚散靡常發則為熱退則為寒陰陽相搏則腹痛君以芍藥甘草奠安中氣臣以生薑半夏開其結氣當歸芎藭入血以和心氣黄芩生葛甘李根白皮性大寒以折其衝逆之氣雜以生葛者寓將欲降之必先升之之理再按賁豚氣有三犯肺之賁豚屬心火犯心之賁豚屬腎寒臍下悸欲作賁豚屬水邪證自分途治亦各異學者當加意諦視括蔞薤白白酒湯括蔞實一枚搗薤白半斤白酒七升右三味同煑取二升分温再服括蔞薤白半夏湯括蔞實一枚搗薤白三兩半夏半斤白酒一斗右四味同煑取四升温服一升日三服枳實薤白桂枝湯枳實四枚厚朴四兩薤白半斤桂枝一兩括蔞實一枚搗右五味以水五升先煑枳實厚朴取二升去滓内諸藥煑數沸分温三服胸痺三方皆用括蔞實薤白按其治法却微分三焦内經言淫氣喘息痺聚在肺葢謂妄行之氣隨各臟之内因所主而入為痺然而病變有不同治法亦稍異止就肺痺喘息咳唾胸背痛短氣者君以薤白滑利通陽臣以括蔞實潤下通陰佐以白酒熟榖之氣上行藥性助其通經活絡而痺自開若轉結中焦而為心痛徹背者但當加半夏一味和胃而通陰陽若結於胸脇更加逆氣上搶於心非但氣結陽微而陰氣并上逆矣薤白湯無足稱也須以枳實厚朴先破其陰氣去白酒之醇加桂枝之辛助薤白括蔞行陽開痺較前法之從急治標又兼治本之意焉附子粳米湯附子一枚炮半夏半斤甘草一兩大棗十枚粳米半升右五味以水八升煑米熟湯成去滓温服一升日三服附子粳米湯温胃通陽於腎之劑本論云腹中寒氣雷鳴切痛胸脇逆滿嘔吐是邪高痛下矣豈非腎虛寒動於下胃陽為寒凝窒乎即首節所云趺陽脈微弦虛寒從下上也治以附子之温半夏之辛佐以粳米之甘使以甘草大棗緩而行之上可去寒止嘔下可温經定痛細讀胸滿寒疝宿食全篇始論正虛邪實繼論邪正俱衰此論上實下虛之治法也當歸生薑羊肉湯當歸三兩生薑五兩羊肉一斤右三味以水八升煑取三升温服七合日三服若寒多者加生薑或一斤痛多而嘔者加橘皮二兩白术一兩加生薑者亦加水五升煑取三升二合服之寒疝為沉寒在下由陰虛得之陰虛則不得用辛熱燥烈之藥重刼其陰故仲景另立一法以當歸羊肉辛甘重濁温煖下元而不傷陰佐以生薑五兩加至一斤隨血肉有情之品引入下焦温散沍寒若痛多而嘔加陳皮白术奠安中氣以禦寒逆本方三味非但治疝氣逆衝移治產後下焦虛寒亦稱神劑甘遂半夏湯甘遂大者三枚半夏十二枚以水一升煑取半升去滓芍藥五枚甘草如指大一枚一本作元右四味以水二升煑取半升去滓以蜜半升和藥汁煎取八合頓服之甘遂反甘草反者此欲下而彼欲上也乃以白芍約之白蜜潤之則雖反而甘遂仍得下滲靈樞有言約方約囊是也甘遂半夏逐留飲瀰漫於腸胃之間雖利而續堅滿苟非以甘草白蜜與甘遂大相反者激而行之焉能去其留着之根相反為方全賴芍藥酸可勝甘約以監反庶不溷亂中焦而為害存之以廣方義學識未優者不可輕試小半夏湯半夏一升生薑半斤右二味以水七升煑取一升半分温再服小半夏加茯苓湯半夏一升生薑半斤茯苓三兩一法四兩右三味以水七升煑取一升五合分温再服外臺茯苓飲茯苓人參白术各三兩枳實二兩橘皮二兩半生薑四兩右六味水六升煑取一升八合分温三服如人行八九里進之三者皆小制之方從脾胃二經分痰飲立治法葢胃之支脈有飲則胃逆為嘔而不渇主之以半夏辛温泄飲生薑辛散行陽獨治陽明微分表裏若卒嘔吐鬲間水悸則飲邪瀰漫於胃矣仍用前方加茯苓一味滲泄水氣并可使腎邪不干前二方是飲邪深淺之治法也若胸中有停痰自吐宿水不能食此不獨胃中有飲而脾經亦有痰矣小半夏湯不能治也仲景引伸外臺茯苓飲取四君子有調元贊化之功加枳實陳皮下氣消痰專治脾經功兼及胃後一方是痰飲兼治之法也舉此三者治痰飲可以類推大半夏湯半夏二升洗完用人參三兩白蜜一升右三味以水一斗二升和蜜揚之二百四十遍煑藥取二升半温服一升餘分再服大半夏湯通補胃腑之藥以人參白蜜之甘厚於半夏之辛則能兼補脾臟故名其方曰大以之治胃反者胃中虛冷脾因濕動而不磨榖胃乃反其常道而為朝暮吐朝暮者厥陰肝氣盡於戌王於丑也宿榖藉肝氣上升而乃吐出主之以半夏辛温利竅除寒人參扶胃正氣佐以白蜜揚之二百四十遍升之緩之俾半夏人參之性下行不速自可斡旋胃氣何患其宿榖不消肝氣僭升也乎橘皮湯橘皮四兩生薑半斤右二味以水七升煑取三升温服一升下咽即愈橘皮竹茹湯橘皮二斤竹茹二升大棗三十枚生薑半斤甘草五兩人參一兩右六味以水一斗煑取三升温服一升日三服橘皮湯治嘔噦橘皮竹茹湯治噦逆嘔者張口有物有聲噦者撮口有聲無物若嘔噦四肢厥冷乃胃中虛冷陰凝陽滯主之以陳皮生薑辛香温散開發胃陽而嘔噦自止若噦逆無寒證明是胃虛虛陽上逆病深聲噦當重用橘皮通陽下氣臣以竹茹清胃中虛火又不渉寒凉佐以參甘薑棗奠安胃氣禦逆止噦病有虛實治有淺深勿謂病深聲噦為難治之候也黄土湯甘草白术附子炮乾地黄阿膠黄芩各三兩竈中黄土半斤右七味以水八升煑取三升分温二服赤小豆當歸散赤小豆三升浸令芽出曝乾當歸十兩右二味杵為散漿水服方寸匕日三服金匱云下血先血後便此近血也赤小豆當歸散主之明指脾絡受傷日滲腸間瘀積於下故大便未行而血先下主之以赤小豆利水散瘀當歸和脾止血若先便後血此逺血也黄土湯主之明指肝經别絡之血因脾虛陽陷生濕血亦就濕而下行主之以竈心黄土温燥而去寒濕佐以生地阿膠黄芩入肝以治血熱白术附子甘草扶陽補脾以治本虛近血内瘀專力清利逺血因虛故兼温補治出天淵須明辨之蜘蛛散蜘蛛十四枚桂半兩右二味為散取八分一匕飲和服日再服蜜丸亦可蜘珠性陰而厲隠見莫測可定幽暗之風其功在殻能泄下焦結氣肉桂芳香入肝專散沉陰結疝陰狐疝偏有大小時時上下如狐之出入無定四時刺逆從論曰厥陰滑為狐疝風推仲景之意亦謂陰狐疝氣是陰邪挾肝風而上下無時也治以蜘蛛如批郤導窽蜘蛛本草言有毒人咸畏之長邑宰林公諱瑛山海衞人壯年調理方用之多年炙熟其味鮮美恒得其功本草言有毒者南北所産不同耳生脈散人參五錢麥門冬三錢五味子三錢右水二鍾煎八分隨時服凡曰散者留藥於胃徐行其性也脉者主於心而發原於肺然脉中之氣所賴以生者尤必資藉於腎陰故内經言君火之下陰精承之也麥冬清肺經治節之司五味收先天癸水之原人參引領麥冬五味都氣於三焦歸於肺而朝百脉猶天之雲霧精白露降故曰生脉玉屏風散黄耆一兩炙防風一兩右為末每服三錢水一鍾煎八分隨時服亦可黄耆畏防風畏者受彼之制也然其氣皆柔皆主乎表故雖畏而仍可相使不過黄蓍性鈍防風性利鈍者受利者之制耳惟其受制乃能隨防風以周衞於身而固䕶表氣故曰玉屏風一方有白术者名白术防風湯瀉白散桑白皮一錢地骨皮一錢甘草五分白粳米百粒右為末開水調服水一鍾煎八分温服亦可肺氣本辛以辛㵼之遂其欲也遂其欲當謂之補而仍云瀉者有平肺之功焉桑皮甘草其氣俱薄不燥不剛雖瀉而無傷於嬌臟苐用其所欲又何複其所苦葢喘咳面腫氣壅熱鬱於上治節不行是肺氣逆也經言肺苦氣上逆急食苦以泄之然肺虛氣逆又非大苦大寒如芩連梔柏輩所宜故複以地骨皮之苦泄陰火退虛熱而平肺氣淮南枕中記載西河女子用地骨皮為服食則知泄氣而仍有補益之功使以甘草粳米緩桑骨二皮於上以清肺定喘非謂肺虛而補之以米也益黄散人參一錢黄耆二錢炙甘草五分陳皮一錢去白黄連少許芍藥七分生甘草五分右為細末每服二錢水一盃煎五分食逺服土色黄脾胃應之不直補土而從土中㵼火清金制木以逺客邪故曰益黄此東垣治脾胃不足火不生土而反抗拒是至而不至者為病之方也火反抗拒者火旺能令肝實實則乘於脾胃即經所謂後來之虛邪也當於心經中以甘温補土之原更於土中瀉火經言熱淫於内以甘瀉之人參黄耆炙甘草瀉虛熱以補土之原也經言熱淫於内以酸收之芍藥酸寒能瀉肝而收肺陰黄連甘草入心而瀉脾熱金旺火衰而肝風自熄脾胃受益矣東垣以之治小兒慢脾風真神品也導赤散生地甘草稍淡竹葉木通各等分右水二鍾煎八分温服導引也小腸一名赤腸為形臟四器之一稟氣於三焦故小腸失化上為口糜下為淋痛生地入胃而能下利小腸甘草和胃而下療莖中痛木通淡竹葉皆輕清入腑之品同生地甘草則能從黄腸導有形之熱邪入於赤腸其濁中清者復導引滲入黒腸而令氣化故曰導赤漿水散桂枝五錢乾薑五錢熟附子五錢炙甘草五錢良薑一錢半夏二錢右為細末每服三五錢先用土漿二盞煎一盞和渣服甚者三四服微者三服土漿水功專去暑濕解渴熱故以名方夏月暴瀉亡陽汗多腹冷氣少脈微君以桂枝乾薑附子迎三焦之陽内返中焦臣以炙甘草土漿水奠安陰氣俾微陽有所歸附仍佐以半夏通經良薑通絡為之交通上下旋轉陰陽庶陽氣有運行不息之機而後元神可復温膽湯茯苓七錢半夏一兩廣皮一兩五錢甘草四錢炙竹茹一兩枳實一兩每服四五錢加生薑七片大棗一枚水一鍾五分煎七分食逺温服温膽湯隔腑求治之方也熱入足少陽之本膽氣横逆移於胃而為嘔苦不眠乃治手少陽三焦欲其旁通膽氣退熱為温而成不寒不燥之體非以膽寒而温之也用二陳專和中焦胃氣複以竹茹清上焦之熱枳實泄下焦之熱治三焦而不及於膽者以膽為生氣所從出不得以苦寒直傷之也命之曰温無過泄之戒辭酸棗仁湯酸棗仁二升炒黒勿研甘草一兩知母二兩茯苓二兩川芎二兩右五味以水八升先煑酸棗仁得六升後内諸藥煑取三升分温三服虛煩胃不和膽液不足三者之不寐是皆虛陽溷擾中宫心火炎而神不定也故用補母瀉子之法以調平之川芎補膽之用甘草緩膽之體補心之母氣也知母清胃熱茯苓泄胃陽瀉心之子氣也獨用棗仁至二升者取酸以入心大遂其欲而收其緩則神自凝而寐矣温脾湯乾薑二兩肉桂心二兩熟附子二兩炙甘草二兩枳實二兩厚朴二兩大黄四錢右㕮咀用一兩水二碗煎六分頓服脾寒泄瀉腹痛者許叔微製温脾湯倣仲景温下之法以下腸胃之冷積夫脾旣寒矣腸旣㵼矣而又下之者以錮冷之積滯久留腸胃而不去徒用温補無益於病也故必以通因通用之法先去其滯而後調補勿畏虛以養病如仲景云太陰病脈弱下利設當行大黄芍藥者宜減之以其人胃氣易動故也今叔微用乾薑肉桂附子為君複以調胃承氣大黄止用四錢謂非得仲景之遺意哉凉膈散薄荷五錢連翹五錢芒硝二錢五分甘草一兩五錢黄芩五錢山梔五錢大黄五錢右為麤末每服五錢水一碗半煎一碗去滓入白蜜一匙微煎温服膈者膜之横蔽心下周圍相着遮隔濁氣不使上薫心肺者也不主十二經凡傷寒藴熱内閉於膈其氣先通心肺膻中火燔煩熱自當上下分消手太陰之脉上膈屬肺足厥陰之脈上貫膈布脇肋循㗋嚨之後以薄荷黄芩從肺散而凉之腎足少陰之脈上貫膈入肺中以甘草從腎清而凉之手少陰之脈下膈絡小腸手太陽之脉下膈抵胃屬小腸以連翹山梔從心之少陽苦而凉之手少陽之脈下膈循屬三焦手厥陰之脈下膈歴絡三焦以山梔芒硝從三焦與心包絡瀉而凉之足太陰之脈上膈挾咽連舌本散舌下以甘草大黄從脾緩而凉之足少陽之脈下貫膈屬膽以薄荷黄芩從膽升降而凉之胃足陽明之支脈下膈屬胃絡大腸手陽明之脈下膈屬大腸以大黄芒硝從胃與大腸下而凉之上則散之中則苦之下則行之絲絲入簆周遍諸經庶幾燎原之場頃刻為清虛之府守真力贊是方為神妙信哉益元散桂林滑石六兩甘草一兩右為粉水飛每服三錢温水下或新汲水下滲泄之劑不損元氣故名益元分兩六一取天一生水地六成之故又名天水滑石味淡性利色白入氣複以甘草載引上行使金令肅降故暑濕之邪傷上焦者效甚速其下清水道蕩熱滲濕之功亦非他藥可及時珍曰熱散則三焦寧而表裏和濕去則闌門通而陰陽利完素以之治七十餘證讚之為凡間仙藥不可闕之大順散甘草三兩乾薑四兩杏仁四兩去皮尖肉桂四兩右先將甘草同白砂炒微黄次入生乾薑同炒令薑裂又入杏仁同炒令杏仁不作聲為度去白砂合桂為末每服二三錢水一鍾煎數滚温服白砂按本草即河砂大順散局方祖仲景大青龍湯以肉桂易桂枝而變為裏法治避暑於廣厦飡生冷襲凉風抑遏陽氣而為吐瀉者病由暑濕傷脾也故先將甘草乾薑同炒辛甘化陽以快脾欲再入杏仁同炒利肺氣以安吐逆白砂本草主治絞腸痧痛用之拌炒以燥脾濕複以肉桂為散俾芳香入陰升發陽氣以交中焦去脾之濕溼去而陽氣得升三焦之氣皆順故曰大順冷香飲子附子炮一錢陳皮一錢炙甘草一錢五分草果同吳茱茰炒黄黒生薑十片水一鍾煎滚即濾井水頓冷服冷香飲子治霍亂陰陽暌隔煩躁脈伏者草果陳皮温脾去濕定嘔炙草生薑奠安脾經陰陽以炮附子通行經絡交接上下用飲子者輕清留中也冷服者緩而行也清暑益氣湯人參五分麥門冬二分五味子九粒黄耆五分甘草二分炙茅山蒼术一錢白术五分升麻一錢葛根二分廣皮五分青皮二分半去白神麯五分澤㵼五分當歸二分黄蘖二分右㕮咀都作一服水二盞煎一盞去渣大温服清暑益氣湯東垣治脾胃虛衰所生受病之方也夏月襲凉飲冷内傷脾胃抑遏真陽而外傷暑濕上焦心肺先受之亟宜益氣不令汗泄以亡津液人參黄耆炙草之甘補元氣退虛熱麥冬之寒滋水源清肺熱五味之酸㵼肝火收肺氣白术澤㵼上下分消其濕熱廣皮青皮理脾氣而逺肝邪升麻葛根蒼术助辛甘之味引清氣以行陽道俾清氣出於脾右遷上行以和陰陽濕勝則食不消用炒神麯以消痞滿熱勝則水涸用黄柏補水虛以滋化源潔古云暑邪屬陰當發散之此治勞苦之人冒暑者也若膏粱之體飲食房勞避暑而為暑所中者當清觧與補益兼施桂苓甘露飲茯苓一兩猪苓五錢澤㵼一兩甘草二兩白术五錢肉桂五錢去皮滑石四兩石膏二兩凝水石二兩右為末每服三錢温湯調下新水亦得生薑湯尤良消暑在於消濕去熱故用五苓去濕三石解熱濕熱旣去一若新秋甘露降而暑氣潛消矣夫濕為陰邪全賴太陽氣化以利小便莫若五苓散為當若熱在濕下者則為粘着之邪又當寒燥以勝之莫妙於三石之功㨗速滑石性雖重而味淡故能上利毛腠之竅以清水濕之源石膏辛寒入胃辛能發汗寒以勝熱故能泄中焦之熱出走膀胱凝水石辛鹹入腎為鹽之精故能凉血滌熱從小便而出子和亦有桂苓甘露飲本方加人參木香再加乾葛霍香雖兼補虛散邪然濕家忌汗不若河間之專也清脾飲柴胡一錢黄芩一錢廣皮八分半夏一錢甘草三分白术炒七分厚朴一錢青皮七分茯苓八分右水一鍾生薑一片棗一枚煎八分熱減時服忌生冷油膩濟生方有草果一錢脾不曰健而曰清者太陰受病清少陽所勝之邪也葢少陽太陰為順乘之臟腑太陰瘧寒熱者必兼少陽而來故以小柴胡和少陽之樞紐複以厚朴青皮蕩滌膜原之邪獨是柴胡湯中去人參用白术者恐人參助氣取白术燥土以勝濕痰不助少陽之熱濟生方有草果雖散太陰滯氣苦熱鬱者非清脾之謂也生津甘露湯升麻五分防風五分羌活一錢柴胡一錢石膏一錢五分黄芩一錢酒炒黄耆一錢生甘草五分杏仁十箇生地五分當歸六分紅花少許桃仁五箇漢防己五分黄柏一錢五分知母一錢酒炒龍膽草一錢半酒炒炙甘草一錢右㕮咀都作一服水二盞酒一匙煎一盞熱食逺服消渇門中生津甘露湯一名清凉飲子東垣治心火亢甚乘於脾胃亦是至而不至乃為不及者之方也升麻柴胡羌活防風氣芳石膏性沉雖云消渇禁芳草石藥其氣慄悍恐助燥熱然欲走達經氣非芳香不能故脾胃不及須少用升麻使陽氣從脾胃中右遷於左以行陽道得春生萬化之機更用柴胡使諸經左遷生發陰陽之氣黄耆杏仁理肺氣佐石膏知母黄芩清手陽明氣分之熱以生津生地當歸桃仁紅花破血結佐龍膽黄柏防己清足陽明血分之熱以生液津液旣生燥熱亦解又何患二陽復結也一方用黄連退心火以消舌上赤脈一方用蘭草經言治之以蘭除陳氣也竹葉黄耆湯竹葉二錢淡石膏煅麥門冬人參黄耆甘草半夏生地當歸白芍川芎黄芩炒以上各一錢右水二鍾煎八分食逺服四方互複獨以竹葉黄耆標而出之者明其方專治肺經熱消非槩治二陽結之消渇者也竹葉石膏湯為輕清之劑複以生地黄芩濁陰之品清肺與大腸之火四物湯為濁陰之劑複以竹葉石膏清燥之品清肝膽之火補中益氣湯人參黄耆甘草除煩熱之聖藥複以石膏白芍清脾胃之火黄芩湯治後天太陰之劑複以生地麥冬壯水之品清腎中之火竹葉石膏湯不去半夏藉以通氣分之竅四物湯不去川芎藉以通血分之竅綂論全方補瀉兼施寒之不致亡陽補之不致助火養正却邪誠為良劑清燥救肺湯經霜桑葉三錢去筋杏仁七分去皮尖炒黄麥門冬一錢二分去心石膏二錢五分人參七分阿膠八分胡麻仁一錢炒甘草一錢枇杷葉一片去毛筋水一碗煎六分食逺服燥曰清者傷於天之燥氣當清以化之非比内傷血燥宜於潤也肺曰救者燥從金化最易自戕肺氣經言秋傷於燥上逆而咳發為痿厥肺為嬌臟不容緩圖故曰救石膏之辛麥門之甘杏仁之苦肅清肺經之氣人參甘草生津補土培肺之母氣桑葉入肺走腎枇杷葉入肝走肺清西方之燥㵼東方之實阿膠胡麻色黒入腎壯生水之源雖亢火害金水得承而制之則肺之清氣肅而治節行尚何有喘嘔痿厥之患哉若夫經言燥病治以苦温佐以酸辛者此言初傷於燥肺金之下未有火氣乘勝者也嘉言喻子論燥極而立斯方可謂補軒岐之不及升陽益胃湯羌活五錢防風五錢柴胡二錢獨活五錢川黄連二錢白芍五錢黄耆二兩甘草一兩炙人參一兩白术三錢茯苓三錢廣皮四錢半夏一兩澤㵼三錢右㕮咀每服三錢生薑五片棗二枚水三盞煎至一盞去滓温服早飯午飯之間升陽益胃湯東垣治所生受病肺經之方也葢脾胃虛衰肺先受病金令不能清肅下行則濕熱易攘陽氣不得伸而為諸病當以羌活柴胡防風升舉三陽經氣獨活黄連白芍瀉去三陰鬱熱佐以六君子調和脾胃其分兩獨重於人參黄耆半夏炙草者輕於健脾而重於益胃其升陽之藥銖數少則易升仍宜久煎以厚其氣用於早飯午飯之間藉榖氣以助藥力纔是升胃中之陽耳至於茯苓澤瀉方後註云小便利不淋勿用是滲泄主降非升陽法也外臺杏仁煎杏仁一斤去皮尖捣熬作酪白蜜五合酥油五合以牛乳煎成者生薑汁三合右四味以水三升内杏仁酪煎攪可減半内薑汁煎如稀糖内酥蜜煎令如稠糖毎服一匙日三服夜一服漸加至二匙忌猪肉一方加貝母八合别篩末蘇子汁一升以七小合蘇子研和水濾取汁一方加生地汁三升生麥門冬汁五合杏仁煎潤劑也治勞役表疎寒襲於肺上氣乾咳肺痿聲啞羣複滑潤之品仍無腸泄之虞杏仁入肺功專降逆定喘臣以蜂蜜之利酥油之滑即佐以薑汁之上升性皆同氣相求者逗留中焦和脾胃生肺津而乾咳自止加蘇子貝母者降氣分之火加地黄麥冬者清血分之火審證取舍惟學者裁之調中散桂枝一兩五錢生乾薑五味子人參白术赤茯苓炙甘草當歸各一兩右為末每服三錢水一盞煎八分温服去渣夜再服一陽發病少陰𠻳洩三焦不利上咳下㵼心火不寧其動若掣明是咳㵼屬三焦不利矣仲景云太陽膀胱𠻳不止者當加五味子乾薑宇泰云三焦𠻳者用異功散守真因之主調中散以桂枝乾薑五味開太陽以參术炙草闔陽明而獨倍加桂枝佐以當歸赤苓炙草是不獨治三焦意專重於榮養心陽以安動掣則咳瀉自止其義高出千古消石礬石散消石芒硝之底沉凝者準礬石燒等分右二味為散以大麥粥汁和服方寸七日三服病隨大小便去小便正黄大便正黑是候也消石礬石散悍劑也女勞黒癉腹滿者死證也讀仲景原文當急奪下焦之瘀血庶可斡全生氣舍此别無良法可醫惜乎後醫不解病情惟知清熱去濕隔靴搔癢日漸困篤迨至束手而斃殊不知女勞傷其精而溺血若血能流通則無發黄變黒之證矣若精竭而血不行鬱遏於膀胱少腹必然陰虛火發而湧泉灼熱明是真精耗竭君相二火並炎薰蒸於脾則身黄燎原於腎則額黒故金匱下文云非水也其殆腎氣之所發也歟治以消石直趨於下苦醎入血散火破瘀礬石酸寒佐消石下趨清腎與膀胱之熱别録云除錮熱在骨髓是也和以大麥粥汁服者以方寸七之藥藉大麥下氣之性而助其功用也金匱另有酒癉之黒乃是濕熱瘀而不行營血腐憊之色又非消石散之所治矣豬膏髮煎豬膏半斤亂髮如雞子大洗潔三枚右二味和膏中煎之髮消藥成分再服病從小便出金匱云諸黄豬膏髮煎主之時珍曰釋者為膏禮内則云以水潤釋而煎之也諸黄指女勞癉未變黒者言金匱又云婦人胃氣下泄陰吹而正喧此榖氣之實也膏髮煎導之葢以二者皆陽明少陰病耳夫腎為胃之關女勞癉之未黒者未有不因使内過度或交接入水其胃熱脾寒之濁氣乘虛下趨於腎而發黄若婦人陰吹亦屬腎虛胃實榖氣不行而下吹治以膏髮煎潤而通之驅逐腸胃瘀濁之氣不致濕熱趨腎而身黄婦人腸胃清利榖氣不實則陰亦不吹血餘入腎苦以導之腎得清寧則黄不生而陰不吹制方之妙不補而陰自足不寒而黄自退所以本經言髮之功仍自還神化也補肝湯桃仁三兩桂心三兩柏子仁三兩山茰肉三兩茯苓三兩甘草一兩二錢細辛八錢防風八錢大棗二十四枚右㕮咀水九升煑五升去滓分三服舉痛論厥痛計一十三條止有二條為熱餘皆為寒其寒熱厥氣犯胃而痛惟肝藏為最多熱厥痛者用金鈴子散寒厥痛者用補肝湯皆應手取愈但寒厥不以辛散之而以辛補之者以肝為剛藏與之辛散剛劑傷其陰必動其厥陽非治也六元正紀大論曰木鬱之發民病胃腕痛上支兩脇明是肝木鬱於胃土中也當以辛潤補肝㵼去胃中肝邪痛乃止桃仁柏子仁辛潤以補肝陰肉桂山茰辛温以補肝陽甘草大棗甘能和胃緩肝之急防風能於土中瀉木細辛益膽氣以泄肝全方皆辛潤入絡之藥補肝欲而利導之得辛即可達鬱非必以辛散為達木之鬱也二妙散茅山蒼术生用川黄柏炒焦右為末搗生薑煎沸湯調服即集要方二神湯各錢五分水煎空心服二妙散偶方之小制也蒼术生用入陽明經能發二陽之汗黄栢炒黒入太陰經能除至陰之濕一生一熟相為表裏治陰分之濕熱有如鼓應桴之妙觀音應夢散人參三錢紫衣胡桃肉一兩連皮鬲右為末每服三錢水一盞煎八分食逺服日華子本草云食酸齒齼細嚼胡桃即解病有多食梅子歛痰飲於膈酸寒之性搏激於肺令人苦咳聲啞惟胡桃可解膈内之痰飲膈間痰化而𠻳止聲清連皮能收肺經耗散之氣連膈能通命門之火勿去之溧陽洪輯幼子病痰喘將危凡五晝夜不乳食夢觀音授以此方煎湯一蜆殻灌之喘即定亦以乳液凝於膈間故用此得效也三生飲烏頭三錢附子三錢虎掌三錢木香八分右水二鍾煎一鍾或温服或冷服三生者一本而用其三不炮不製故名即肘後方名三建湯者是也大明本草云大者為烏頭中者為附子小而叢生者為虎掌悉是天雄一裔古方並用之取其小者力銳捜其隠曲大者力雄破其衝要中者力緩蕩其餘邪佐以木香者時珍云苦辛泄肺芳香悅脾又能通大腸膀胱之滯為三焦氣分藥複入三生飲中乘其至剛至銳之氣直上直下為斬關奪門之劑苟非寒痰氣厥昏不知人證偏於實者不可輕用但後人方中虎掌皆用南星以南星亦名虎掌乃相沿之誤實非南星也王荆公妙香散人參一兩益智仁一兩五花龍骨一兩茯神五錢去木茯苓五錢逺志肉五錢甘草製甘草二錢五分炙硃砂水飛二錢五分右為末每服二錢空心温酒調服水煎服亦可良方加木香二錢五分麝香一錢妙香散治有夢之遺精經言手足少陰之厥令人妄夢良方加以木香麝香通其神明使人不夢淫邪泮釋自無精泄之患其妙在於二香而荆公之方無此二味亦名妙香其意何居抑或傳流日久而脫文耳夫精之藏蓄在腎綂攝在脾至疎泄之時則惟聽命於心故用茯苓逺志通腎以泄邪火人參益智固脾以攝真精茯神安神硃砂定氣龍骨秘精三者皆安鎮心經之藥炙甘草調和陰陽則心有所主而精不摇矣二香能清夢寐又烏可闕之金鈴子散川楝子去核一兩延胡索一兩右為末每服三錢温酒調服水煎服亦可金鈴子散一泄氣分之熱一行血分之滯雷公炮炙論云心痛欲死速覔延胡潔古複以金鈴治熱厥心痛經言諸痛皆屬於心而熱厥屬於肝逆金鈴子非但泄肝功專導去小腸膀胱之熱引心包相火下行延胡索和一身上下諸痛時珍曰用之中的妙不可言方雖小制配合存神却有應手取愈之功勿以淡而忽之茯神湯茯神去木羚羊角鎊北沙參棗仁炒葳蕤逺志肉去心五味子各三兩龍骨半兩右麤搗篩每服三錢七水一盞煎取七分去滓温服不拘時候聖濟總録列素問病機六十二證每證各載數方河間選其可因者嘗録於宣明方論中生氣通天論曰煩勞則張精絶者是勞則陰精内絶不交外陽致陽氣張大也辟積於夏使人煎厥者朱子曰辟如驅辟積辟蹙也煎炎蒸熱極也陽氣張大不能治辟蹙至夏而天氣炎蒸陰精愈竭乃為煎厥此以内外論厥也處方當從益陰為主河間選用聖濟人參湯實脾莫若聖濟之茯神湯為切近何則目盲不可以視肝精不交於陽也以葳蕤羚羊角北沙參棗仁凉肝熱救陰精耳閉不可以聽腎精不承於陽也以逺志通調腎經不足之氣五味子收攝腎經耗散之精潰潰乎若壞都汨汨乎不可止乃神氣散馳不守以茯神龍骨收肝腎散漫之陽補救陰陽纖悉畢貫矣經又言肝氣當治而未能乃為煎厥詳在後論丸方中赤茯苓湯赤茯苓去皮一兩陳皮去白一兩麥冬去心五錢桔梗一兩人參一兩芍藥五錢檳榔五錢右為末每服三錢水一盞生薑五片同煎至八分去滓温服不計時候生氣通天論又曰大怒則形氣絶血鬱於上使人薄厥薄者氣血相薄也怒則氣上形於面血亦隨氣而上鬱内閉九竅肺失清淨之氣其形自傷而氣絶於下乃為薄厥此以上下論厥也用赤茯苓橘紅生薑利肺經血分之鬱用麥冬桔梗清肺經氣分之鬱人參固肺經之正氣使之下續真陰白芍約肝經厥逆之氣使以檳榔導引至高之氣下行元素曰檳榔之性下行如鐵石之沉重能墜諸藥至於下極方義清肺之鬱而墜其逆其厥自平大川芎丸川芎一斤天麻四兩用鄆州者右為末煉蜜為丸每兩作十丸每服一丸細嚼食後茶酒下祕方茶酒調散石膏另為細末菊花細辛去苗香附子去鬚各等分右為末每服二錢温茶酒調下食後每日三服新沐中風則為首風沐濯髮也經言頭面多汗惡風當先風一日頭痛不可以出内至其風日少愈出内者出户内也至其日正氣上行於頭而有少愈之時也今婦女多有之風入於頭傷其骨空即入於營與風傷衞者有異當從肝虛内風上淫為治故用大川芎丸東垣曰肝虛頭痛宜用天麻芎藭以補之河間以茶酒調散為祕方石膏味辛氣輕治陽明自汗頭痛香附生則氣升能解血鬱頭痛甘菊治厥陰頭痛細辛治少陰頭痛茶酒調服用以升降也白术散牡蠣焙赤二錢白术一兩一分防風二兩五錢右為末每服一錢温水調下不計時如惡風倍防風白术如汗多面腫倍牡蠣飲酒中風則為漏風漏滲也經言食則汗出甚則自汗喘息惡風口渇不能勞事葢酒氣外充則身無汗食入汗出腠理始開風乃滲入肌肉之間好古曰白术治皮間風出汗與黄耆同功東垣曰防風為風藥中潤劑祛肌肉間之風好古曰牡蠣鹹寒固澀雖能止汗頑鈍之物非防風白术引之不能達於肌表河間曰漏風日久必為消渇疾地黄飲子熟地八錢熟附子一錢二分官桂八分石菖蒲一錢逺志肉一錢甘草製淡肉蓯容乾一錢巴㦸肉一錢麥門冬一錢五分五味子一錢山茰肉一錢五分白茯苓一錢五分川石斛一錢五分右為末每服三錢水一盞半生薑五片棗一枚薄荷五分同煎至八分不計時候服飲清水也方名飲子者言其煎有法也瘖痱之證機竅不靈升降失度乃用一派重濁之藥務在藥無過煎數滚即服取其輕清之氣易為升降迅達經絡流走百骸以交陰陽附子官桂開諸竅而祛濁陰菖蒲逺志通心腎以返真陽川石斛入腎以清虛熱白茯苓泄胃水以滌痰飲熟地山茰滋乙癸之源巴㦸蓯容温養先天之氣麥冬五味入肺腎以都氣開之通之清之泄之補之都之不使濁陰之氣横格於喉舌之間則語自解體自正矣鼈甲湯鼈甲去欄醋炙一兩生地黄一兩當歸一兩白芍一兩柴胡去苗一兩官桂三分生薑三分切片焙乾大腹子皮一兩京三稜一兩右為末每服三錢水一大盞入生薑木香五分同煎至八分去滓空心温服鼈甲湯治伏梁伏匿藏也梁石絶水為梁喻其鬱氣阻於腹中也張子和曰伏梁火之鬱也以熱藥散之則益甚以火炙之則彌聚其證有二一由氣鬱一由血鬱岐伯曰裹大膿血居腸胃之外下則因陰上廹胃腕當生内癰居臍上為逆居臍下為從勿動亟奪戒人勿急切按摩用下奪之法此以四物湯去川芎用柴胡從血分散火之鬱大腹子皮攻腸胃外之冷熱氣官桂生薑宣通臍上下之陰結京三稜入絡破血攻堅削積鼈甲亦能破癥瘕去瘀血本草釋名神守凡攻擊之劑用以固守神明功居要領故以名湯白术湯白术一兩厚朴生薑汁炒一兩當歸去苗一兩龍骨煅一兩艾葉炒熟五錢右為末每服三錢水一盞生薑三片同煎至八分去滓空心温服白术湯治飱泄食不化而出清榖用温固升清之法經言熱氣生清清氣在下則生飱泄是清濁交錯矣白术健脾消榖厚朴平胃散結即傷寒論下焦利從胃主治之義龍骨止下利固大腸之脫艾葉震亨謂其入藥服則氣上行時珍曰轉肅殺之氣為融和能回埀絶之元陽當歸病因熱而轉生清者血分必傷用以調血也吳茱茰湯吳茱茰湯淘炒二兩官桂去皮二兩乾薑炮二兩蜀椒出子炒去汗五錢陳皮去白五錢白术五錢厚朴生薑製二兩右為末每服三錢水一大盞生薑三片同煎至八分空心去滓温服呉茱茰湯治濁氣上升而生䐜脹用温散降濁之法經言寒氣生濁濁氣在上則生䐜脹是亦陰陽反作也方義宣布五陽亦用白术厚朴者中焦䐜脹正當以白术温中健脾厚朴温散和胃吳萸入肝官桂入心乾薑入脾橘紅入肺蜀椒入腎皆氣厚性輕芳香開發用以驅散濁陰有㨗於影響之妙犀角湯犀角鎊五錢升麻三錢元參五錢連翹五錢射干一分去毛麥門冬一兩去心沉香一分剉芒硝一兩柴胡五錢去苗木通三錢炙甘草一分右為末每服三錢水一大盞同煎至八分食前去滓温服結陽者腫四肢陽别於陰雖非死病亦危證也本論云所謂陽者胃脘之陽也别於陽者知病處也故用犀角升麻解散陽明之結熱元參連翹肅清樞機引領清氣上下以散結熱射干麥冬解上焦之結熱芒硝沉香破下焦之結陽柴胡升清氣則樞機自轉木通通心竅則經絡流行甘草以和諸藥之性此結之見乎外者從表散也地榆湯地榆四兩甘草三兩半生半炙右為末每服五錢水三盞内縮砂仁七枚每服可加炒用亦可煎至一半去滓温服結陰者陰氣自結不和於陽也結則下瘀血若瘀血去盡而再結再下三結三下斷續不絶亦危證也治以地榆身能止血稍能行血甘草生用能行肝胃二經汚濁之血炙之入陰而温散血中之結煎時另入縮砂仁香而能竄内醒臟氣引領二味止血開結此結之徴乎内者從裏解也聖濟大建中湯人參二兩黄耆三兩當歸三兩白芍二兩炙甘草二兩逺志去心三兩龍骨二兩澤㵼三兩右為末每服三錢水一盞生薑五片煎至八分去滓温服不計時候風邪從肺乘勝至脾脾風傳腎燥土之氣腎之所惡真精不守乃寃熱腹痛而出白液病名曰蠱即左傳以喪志為蠱也當此之時雖云可按可藥然邪及四臟亦死期將至矣聖濟方治以人參黄耆當歸白芍炙草柔脾之陽以化燥氣佐以逺志强志益腎澤瀉滌熱止洩龍骨固守真精處方在脾主治在腎二臟並治故名大建中建中加減湯人參一兩黄耆四兩當歸一兩白芍四兩炙甘草一兩生地四兩麥冬四兩龍骨四兩茯苓一兩厚朴生薑製一兩官桂一兩附子一兩右為末每服三錢水一盞半生薑五片棗一枚􅄳少許煎至一盞去滓温服腎風傳心亦用建中法者以心主營而出中焦故病則筋脈相引搐搦名曰瘛當此之時若心不受邪復反傳而行之肺法當三嵗死若心不反傳滿十日法當死其為危殆更甚於前矣治以人參黄耆當歸白芍炙草加生地麥冬倣仲景復脈湯法先為保䕶心氣龍骨固守心神佐以茯苓厚朴官桂附子兼中下以祛腎邪黄耆湯黄耆二兩薑汁炒人參二兩五味子二兩枸把子一兩熟地一兩生乾薑一兩新改川桂枝一兩新改右為末每服三錢水二盞煎至一盞去滓温服無時原方有桑皮麥冬無乾薑桂枝心移寒於肺飲一溲二謂之死陰不治三日而死聖濟方治之以黄耆湯余考其證與方當増損二味夫飲少溲多者飲入於胃上輸於脾脾氣不能散精而精捍二氣綂歸於肺肺亦統輸膀胱水精仍不能四布有下而不上有柔而無剛竟成一派死陰方中用人參枸把熟地以足經藥治手經病從陰中和陽深中肯綮獨以麥冬桑皮瀉心肺二經之邪於理未切因率管見損此二味増以桂枝乾薑葢桂枝人參能和心經之陽乾薑五味可攝膀胱之氣治足經而手經亦得其功移寒之邪可解矣麥冬飲子麥冬二兩去心知母一兩人參一兩炙甘草一兩生地一兩茯神一兩栝蔞實一兩葛根一兩右為末每服五錢水二盞竹葉數片同煎至一盞去滓食後温服心移熱於肺傳為膈消是亦死陰也雖不若移寒之三日而死然熱久消渇煩心短氣津液日耗漸成危證治以人參甘草和胃生津麥冬知母救肺陰生地茯神清心熱葛根升胃津括蔞止消渇危證立方止求無過治本之圖不為迂矣雞屎醴散大黄一錢桃仁一錢雞屎醴一錢右為末每服一錢水一盞生薑三片煎湯調下食後臨臥服臘月乾雞屎白半斤袋盛以甜酒一斗漬七日濾清取酒用醴甜酒也少麴多米釀之一宿而成僅有酒香者佳水氣鼓脹用雞屎白者雞無前陰溺屎同竅佐以桃仁大黄微利水濕從大便而出清酒為熟榖之氣達於皮毛行於脈絡下通水道雞屎與醴同行復能使水濕從小便而出二便通利腹脹潛消矣故云一劑知二劑已柴胡地骨皮湯柴胡去苗地骨皮各一兩右為末每服三錢水一大盞煎至八分去滓細含嚥之食後服如有病人大段實者加大黄朴硝可瀉熱甚膀胱移熱於小腸鬲腸不便上為口糜者手足太陽熱結也胃之水榖不得傳輸於下則令腸膈塞而不便惡熱上蒸口中糜爛由於兩陽之開闔混淆當治少陽之樞故以柴胡内開腑間結氣外通開闔之機佐以地骨皮之甘寒專瀉下焦熱淫仍賴柴胡引領清氣上升而行陽道則熱解糜平蠲痺湯黄耆二錢五分防風一錢二分去蘆當歸二錢五分酒洗羌活一錢二分赤芍一錢二分片子薑黄二錢五分炒炙甘草五分右水二鍾生薑五片大棗二枚煎一鍾食前服蠲去之疾速也痺溼病也又言痛也痺分三氣雜至風勝為行痺寒勝為痛痺濕勝為着痺余謂三者兼内外因而言非獨言外因也葢有肝虛生風腎虛生寒脾虛生濕抑或有諸内因而兼外邪為痺即經言邪之所凑其氣必虛耳蠲痺湯為治痹祖方黄耆實衞防風祛風當歸和營羌活散寒赤芍通脈絡之痹片子薑黄通經隧之痹甘草和藥性薑棗和營衞其義從營虛則不仁衞虛則不用立法豈非痹屬内外因也乎木香散木香一兩良薑五錢乾薑五錢草豆􅅳三兩陳皮一兩枳實五錢芎藭三兩赤芍五錢訶子皮五錢黒牽牛三兩右為末每服二錢水一盞煎至七分去滓温服岐伯以心脈急為心疝是寒傷營也心不受邪乃傳於小腸而又不能為之散邪故小腹有形痛悶不已治以木香散辛香下氣乃火鬱發之兼下奪之法也木香疏泄腹間滯寒冷氣得良薑乾薑草豆􅅳相為佐使其效尤速陳皮枳實破氣分之滯赤芍川芎開血分之鬱訶子皮火食長老曰能消利腹中一切惡物牽牛稟火之氣善走經絡利大小便有殊功劉守真張子和一時倡率用之苐心與小腸皆屬於火雖為寒鬱小腸純用一派辛熱之藥無監製之品偏於剛猛未免有刼陰之患學者審證用之栢子仁散栢子仁三兩當歸五錢防風三兩細辛三兩川芎三兩枳殻三兩白术三兩茯苓三兩附子五錢官桂三兩檳榔五錢右為末每服三錢水一盞半生薑三片棗二枚同煎至八分去滓温服不計時候栢子仁散治疹筋疹者初病即可得而診見也經言尺脈數甚筋急而見是人腹必急白黒色見則病甚白肺色黒腎色二色見於面筋急見於腹是俯仰之臟皆虛難治之候也此不治肺腎而治肝者金虛則木無所畏腎虛則肝失其養腹急筋見是肝病也用栢子仁當歸川芎細辛防風補肝之虛好古曰枳殻利腸胃欲益氣則佐以白术茯苓腹急筋見是虛寒也佐以附子官桂通下焦之陽使以檳榔寛其腹乃急則治標之法也益膽湯苦參一兩五錢黄芩二兩去朽官桂一兩人參二兩茯神一兩五錢炙甘草二兩右為末每服三錢水一盞煎至八分去滓隨時温服益膽者益膽汁也内經膽癉治之以陽陵泉鍼刺法也前賢旁通其義變易湯藥之治法苦參别録云養肝膽氣王氷註云入肝為温増其味即益其氣也佐以官桂者少陽未平以辛苦發之發不逺熱無犯寒凉也人參炙草風熱淫於内佐以甘苦以甘緩之也茯神熱淫於内以清勝之也脾癉膽癉皆臟腑熱溢而為奇病脾癉已見前註膽癉治以苦補辛散甘緩以代鍼刺誠為合法通腎湯菖蒲剉二兩五加皮剉一兩生乾地黄焙二兩羚羊角二兩赤芍藥二兩甘草炙剉一兩猪苓去黒皮一兩澤㵼一兩右為末每服三錢水一盞半煎七分去滓温服通腎湯治解㑊解舒緩也㑊者疑也不可必之辭病有脊脈痛少氣安臥不欲言胗其尺胍沉緩而濇察其病疑於寒亦疑於熱疑於壯亦疑於弱此作强之官精氣内滯不能運行於形體也以菖蒲五加皮通九竅强志意能運動腎精猪苓澤瀉助陽通竅起陰利腎生地羚羊角起陰氣强筋骨赤芍入陰散氣甘草入腎緩急其證難憑當憑其脈即知病之所在而無疑也豆􅅳散肉豆􅅳五箇麫裹煨炙甘草三錢厚朴五錢右為末每服二錢米飲一盞調下食前白湯亦得嵗水不及濕乃大行長氣反用民病濡泄濡潤也楊子曰泄歇也謂洞泄下水一去而少歇須臾復去也肉果味辛温甘草味甘厚朴味苦辛温至真論云太陰之勝治以鹹熱佐以辛甘以苦瀉之又云太陰之客以甘補之以苦瀉之以甘緩之然此三味治濡泄之初病者也若長氣反用火鬱於濕甚則風復黄氣乃損又非三者可治矣越桃散大山梔子三錢高良薑三錢右和匀每服三錢或米飲或酒調下痛立止越桃山梔也産於南陽山上者佳故名痢後小便利者下焦有寒也若腹中虛痛不可忍者是非寒也明是肺氣下鬱於大腸積而成熱寒熱混淆而痛治以山梔仍從肺經瀉其鬱熱複以高良薑開發胃陽辟除冷氣則陰陽和而腹痛止中滿分消湯川烏二分柴胡二分升麻三分麻黄二分乾薑二分半夏三分草果五分益智三分厚朴五分木香三分青皮二分人參二分黄耆五分當歸二分呉茱萸五分蓽澄茄二分茯苓三分澤瀉二分黄連二分黄栢五分生薑二分右剉如麻豆大都作一服水二大盞煎至一盞食前熱服分消者上下分消其邪也謂以辛熱散之苦熱泄之澹滲利之使其陰陽自然分化不必瀉穢以下之也川烏母取其原生之腦體居中守性不外揚功專内走陰道為宣布五陽之嚮導麻黄輕揚外達肌表為升泄陽道之前驅柴胡升麻升發少陽生氣行於陽分生薑半夏草果益智消散脾胃之寒邪乾薑厚朴木香青皮通行脾胃之滯氣人參黄耆當歸培植營衞正氣以展五陽之用吳茱萸蓽澄茄苦熱泄中下濁陰之氣使不犯中茯苓澤瀉利清陽之道路俾濁陰自上而下泄寒脹用連栢者以六陽居坤土之中其氣鬱而不舒亦有兼熱之證如經言諸腹脹滿諸病有聲鼓之如皷者是也再讀中滿分消丸以清熱利水為用無事於開鬼門宣布五陽之法原其立方之㫖通其幽門則吸門亦不受邪膈咽得通濁陰下歸而䐜脹自除矣五膈湯杏仁去皮尖香䜴熬麴乾薑吳茱萸蜀椒炒去汗各等分右六味搗篩蜜丸飲服七丸日三服忌冷膈病非獨三陽結猶有憂氣恚食寒之證夫憂氣二膈結氣於胸以杏仁香豉開之恨怒食生菜二膈結氣於心下以乾薑麴開之寒膈結氣於腹以茱椒開之統論五者皆係鬱結日久醖釀成膈非麴豉之蒸罨不能除其陳腐非茱椒之辛香不能内開閉塞是方出隠居效驗備急肘後三丰諸書藥品皆同自因獲驗得以流傳又有飲膈熱膈非結氣所致兹不具贅進退黄連湯川黄連薑汁炒一錢半乾薑炮一錢五分人參人乳拌蒸一錢五分桂枝一錢半夏薑製一錢五分大棗右進法用本方三味不製水三茶鍾煎減半温服退法桂枝不用黄連減半或加肉桂五分如上製煎服黄連湯仲景治胃有邪胸有熱腹有寒喻嘉言旁通其㫖加進退之法以治關格獨超千古藉其冲和王道之方從中調治使胃氣自為敷布以漸通於上下如格則吐逆則進桂枝和衞通陽俾陰氣由中漸透於上藥以生用而升如關則不得小便則退桂枝減黄連俾陽氣由中漸透於下藥以熟用而降如關而且格者陰陽由中而漸透於上下衞氣先通則加意通衞營氣先通則加意通營不以纔通而變法斯得治關格之㫖矣蒼术石膏湯蒼术五錢石膏三錢知母一錢五分甘草一錢右剉細和匀都作一服水二盞煎一盞温服蒼术石膏湯太陰陽明經降劑治溼淫者經言濕上甚為熱仲景云濕邪以寒戰而解則知濕邪當以降為治立夏後濕温從三焦而傷肌肉為太陰陽明所屬故四肢沉重身熱汗多不欲飲水治以蒼术石膏剛劑燥之又得石膏知母辛鹹降之以甘草佐蒼术知母佐石膏剛柔相配不傷臟腑之正氣可謂詳審精密矣雖與白虎湯相似其義各有微妙囘陽返本湯熟附子上乾薑中甘草下人參中麥門冬中五味子下臘茶中陳皮下面戴陽者下虛也加葱白七莖黄連少許右用澄清土漿水一鍾煎六分臨服入白蜜五匙隔冷水頓冷服取汗為度節庵變易仲景之白通湯而為囘陽補虛之製葱白乾薑附子藉以通陽温經人參麥冬五味藉以收陰生脈然陰陽格拒病深在臟又非温經生脈所能通也而節庵更有生心化裁之妙佐以廣皮芳香利氣土漿靜鎮中宮線通氣道使以臘茶芳香苦降為之嚮導大破格拒之陰其飛越之陽有不翕然返本寧謐者耶羊肉湯左牡蠣三錢龍骨二錢川桂枝一錢大白芍一錢五分熟附子一錢當歸一錢五分生薑一錢精羊肉四兩右都作一服水二盞煎八分温服不計時羊肉湯救逆湯之􅃨方也韓秪和曰救逆不應當複羊肉為效甚速葢以陽盛於上而衰於下者與以羊肉有情之品比類從陽先為眷戀在下欲脫之陽然後重鎮降逆則在上失守之陽知有所歸宿矣安胃湯新製川椒五分炒去汗安吉烏梅一錢去核川黄連一錢人參三錢枳實一錢五分生淡乾薑一錢五分右為末每服三錢水一鍾煎八分温服安胃者毋使乘勝之氣犯胃也倦不思食無不由於脾胃為病然揆其寒熱虛實却有盛衰初無定體余生平閲證肝病十居其五惟就厥陰之饑不欲食一證遵仲景甲巳化土之論叅東垣治脾胃之說為疏一方川椒之辛佐烏梅之酸行陰以㵼肝枳實乾薑助人參行陽道以益氣黄連於脾胃中㵼心火之亢清脾胃生化之源統論全方辛酸同用以化肝氣酸甘相輔以和胃氣肝化胃和自能進榖犀角地黄湯新改暹羅犀角三錢生地五錢連翹三錢生甘草五分原方有丹皮赤芍無連翹甘草右水二鍾武火煎八分温服無時候局方犀角地黄湯厥陰陽明藥也温熱入絡舌絳煩熱八九日不解醫反治經寒之散之攻之熱勢益熾得犀角地黄湯立效者非解陽明熱邪解心經之絡熱也按本草犀角地黄能走心經專解營熱余因革去丹皮赤芍易以連翹入心散客熱生甘草入心和絡血以治温熱證熱邪入絡之方於理無悖敢以質諸當世治䘌桃仁湯槐角子一兩碎桃仁一兩碎艾葉一兩大棗十五枚右水煎服蟲蝕謂之䘌三尸蟲最靈異分處三焦能上下接應每藏於腸胃卑濕處以蝕外來之五味五氣故病名濕䘌與狐惑同若病久不食腸胃空虛五味斷絶蟲便蝕人五臟之五味五氣緩治則殺人槐角子槐字從鬼得虛星之精其實苦寒能伏隠見莫測之蟲桃為五木之精尸蟲附人屬木桃仁苦甘能鎮安求食之蟲艾葉得五陽之精性入三陰之分能出陽入陰以搜僻處接應之蟲時珍曰多食棗令人齒黄生䘌則知棗為三尸蟲所喜複以大棗誘其蝕以伏之也余曽遇此證用之良驗豭鼠糞湯韮根一大把豭鼠糞十四粒兩頭尖者右二味以水二升煑取半升去渣再煎三沸温服盡必有粘汗出為效未效再作服鼠糞韮根皆厥陰藥也陰易是婦人病温後毒移男子而病也葢婦人以肝為先天冬不周密傷少陽之生氣至春病温若愈未百日餘毒襲男男必手足拘攣顯厥陰之證以韮根為君滑利通陽疾於下行再以鼠糞之陰霾引入至陰之處通陰舒陽其功效之速如鼓應桴後學勿以匪物棄之道斯廣矣脚氣雞鳴散紫蘇葉一兩木𤓰一兩生薑連皮二兩桔梗五錢廣皮一兩吳茱萸一兩檳榔七箇右為麤末分作八服每服隔宿用水三大碗慢火煎至碗半去滓再用水二碗煎滓取一小碗去滓兩次煎汁相和安頓床頭次早五更分二三服只是冷服冬月略温服後用餅餌壓下至天明大便當下黒糞水碗許即是腎經感寒濕毒氣下也自然痛住腫消經以脚氣名厥漢名緩風宋齊後始名脚氣按前賢論皆由風寒暑濕乘虛襲於三陰經宜急為重劑以治之外臺療脚氣惟唐侍中方為最驗至明周文采醫方選要雞鳴散藥品相同惟多桔梗一味取義於五更服故曰雞鳴散紫蘇色赤氣香通行氣血專散風毒同生薑則去寒同木瓜則收濕佐以桔梗開上焦之氣廣皮開中焦之氣妙在吳茱茰泄降下逆更妙在檳榔沉重性墜諸藥直達下焦開之散之泄之收之俾毒邪不得上壅入腹冲心而成危候雞鳴時服者從陽注於陰也服藥須冷者從陰以解邪也東垣分南北二方治法各隨其所勝者而偏調之證相宜者而倍用之是亦發前人之未發在圓機者斟酌變通斯為善矣神效散白浮石蛤粉蟬蛻右為細末用大鯽魚膽七箇調三錢服不拘時神效鬲消聖濟總録治以麥冬飲子河間因之余再讀本事方用神效散其識見之高逺逈勝於前賢葢心肺同居鬲上熱邪移肺刼其真津而成熇熇之勢無不外達三焦復移熱於鬲熾若燎原故渇而求救於水飲如長鯨之吸川雖補水降火無及也妙在即以水中鹹寒之物從其所欲以治之故仲景用文蛤散潔古化水丹用蛤粉皆出此義是方更有進焉者浮石蛤粉鯽魚膽三者以鹹勝苦以苦勝辛辛肺之氣味也佐以蟬蛻輕浮上升引領三者直達肺經解熱止渇且浮石蛤粉之鹹皆平善無過非但止渴兼能利水可無聚水之變幻世醫但以滋陰寒劑救燎原之火孰知火熱旣消反不能消水轉成中滿腫脹吾於此敬服許學士具通天手眼轉展囘顧有如此非深於得道者其孰能之絳雪園古方選註卷七
