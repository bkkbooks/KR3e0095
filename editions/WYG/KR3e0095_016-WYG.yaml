body:
  text: 絳雪園古方選註卷十六蘓州王子接撰金簇科王不留行散王不留行十分八月八日採蒴藋細葉十分七月七日採桑東南根白皮十分三月三日採川椒三分除目及閉口炒去汗厚朴二分黄芩二分芍藥二分乾薑二分甘草十八分右九味桑根皮以上三味燒灰存性勿令灰過各别杵篩合治之爲散服方寸匕小瘡即粉之大瘡但服之產後亦可服如風寒桑東根勿取之前三物皆隂乾百日金刄傷處封固不宻中於風則倉卒無汁中於水則出青黄汁風則發痙水則溼爛成瘡王不留行疾行脉絡之血灌溉周身不使其湍激於傷處桑根皮泄肌肉之風水蒴藋葉釋名接骨草滲筋骨之風水三者皆燒灰欲其入血去邪止血也川椒祛瘡口之風厚朴燥刀痕之濕黄芩退肌熱赤芍散惡血乾薑和陽甘草和隂用以爲君者欲其入血退腫生肌也風濕去隂陽和瘡口收肌肉生此治金瘡之大要地榆絹煎地榆八兩洗淨搗爲細末絹一疋小薄者右用清水洗淨絹糊以炭灰淋清汁二斗煮絹候灰汁盡爲度絹已爛熟擘得成片叚五寸至三寸即將絹􅀢盡灰汁於清水内洗五六次令灰力去盡重入鍋内以水二斗入地榆末煎煮熟爛撈起絹不成片入砂盆研之如糊分爲四服用白粳粥飲調每日空心用一服服後仰臥不得轉側言語驚動其藥食忌一切毒物惟食爛黄雌雞白米輭飯須將飬一月加意慎䕶其藥直至損處補完傷痕隔日開瘡口看之只有宿舊物出而無新惡物出外用長肉散肉長其痕自合絹能接腸補囊及一切藏府傷殘者得乎桑之力也以桑受日出之生氣又爲箕星之精故稱桑爲神葉蠶食之化爲絲能入藏府傷處續絶補破真有煉石補天之神地榆能化五金八石故能療金簇毒藥之傷王損庵立贊此方神妙余觀外臺千金療金刄傷處以桑線縫之桑膏塗之是亦取生氣也絳雪園古方選註卷十六
