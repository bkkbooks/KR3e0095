body:
  text: 絳雪園古方選注卷六蘇州王子接撰下劑小承氣湯大黃四兩去皮厚朴二兩炙去皮枳實三枚炙已上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之承氣者以下承上也取法乎地蓋地以受制為資生之道故胃以酸苦為涌泄之機若陽明腑實燥屎不行地道失矣乃用制法以去其實大黃制厚朴苦勝辛也厚朴制枳實辛勝酸也酸以勝胃氣之實苦以化小腸之糟粕辛以開大腸之祕結燥屎去地道通陰氣承故曰承氣獨治胃實故曰小大承氣湯芒硝三兩大黃四兩去皮酒洗厚朴八兩炙去皮枳實五枚炙右四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上微火一二沸溫再服得下餘勿服芒硝入腎破泄陰氣用以承氣者何也當知奪陰者芒硝而通陰者亦芒硝蓋陽明燥結日久至於潮熱其腎中真水為陽明熱邪吸引告竭甚急矣若徒用大黃厚朴枳實制勝之法以攻陽明安能使下焦燥結急去以存陰氣故用假途滅虢之策借芒硝直入下焦軟堅潤燥而後大黃朴實得破陽明之實破中焦竟犯下焦故稱之曰大因經言下不以偶所以大黃芒硝再分兩次內煎乃是偶方而用竒法以殺其勢展轉回顧有如此調胃承氣湯大黃四兩清酒浸甘草二兩炙芒硝半升右三味㕮咀以水三升煮取一升去滓內芒硝更上火微煮令沸少少溫服之調胃承氣者以甘草緩大黃芒硝留中泄熱故曰調胃非惡硝黃傷胃而用甘草也泄盡胃中無形結熱而陰氣亦得上承故亦曰承氣其義亦用制勝甘草制芒硝甘勝醎也芒硝制大黃醎勝苦也去枳實厚朴者熱邪結胃劫津恐辛燥重劫胃津也桃仁承氣湯桃仁五十個去皮尖桂枝二兩去皮大黃四兩去皮芒硝二兩甘草二兩右五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利桃仁承氣治太陽熱結解而血復結於少陽樞紐間者必攻血通陰乃得陰氣上承大黃芒硝甘草本皆入血之品必主之以桃仁直達血所攻其急結仍佐桂枝泄太陽隨經之餘熱內外分解庶血結無留戀之處矣小陷胸湯括蔞實大者一枚黃連一兩半夏半升洗右三味以水六升先煮括蔞取三升去滓內諸藥煮取二升去滓分溫三服結胸按之始痛者邪在脈絡也故小陷胸止陷脈絡之邪從無形之氣而散括蔞生於蔓草故能入絡半夏成於坤月故亦通陰二者性皆滑利內通結氣使黃連直趨少陰陷脈絡之熱攻雖不峻胸中亦如陷陳故名陷胸僅陷中焦脈絡之邪不及下焦故名小大陷胸湯大黃六兩去皮芒硝一升甘遂一錢七右三味以水六升先煮大黃取二升去滓內芒硝一二沸內甘遂末溫服一升得快利止後服大陷胸湯陷胸鬲間與腸胃有形之垢並解邪從心下至少腹硬滿而痛不可近邪不在一經矣胸鬲為陽明之維太陽之門户太陽寒水之氣結於陽明當以猛劣之劑竟從陽明攻陷大黃陷熱結甘遂攻水結佐以芒硝之監制二者之苦不令直行而下使其引入硬滿之處軟堅破結導去熱邪又大陷胸湯栝蔞實一枚去皮甘遂四兩桂枝四兩去皮人參四兩大棗十二枚擘右五味以水七升煮取三升去滓溫服一升胸中無堅勿與之大陷胸湯有二方者一陷中下二焦之邪此陷上中二焦之邪也括蔞陷胸中之痰甘遂陷經隧之水以桂枝回護經氣以人參奠安裏氣仍以大棗泄營徐徐縱熱下行得成陷下清化之功大陷胸丸葶藶半升熬杏仁半升去皮尖熬黑大黃八兩去皮芒硝半升右四味搗篩大黃葶藶二味內杏仁芒硝合研如脂和散取如彈丸一枚别搗甘遂末一錢七白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法大陷胸丸從高陷下三焦並攻結胸項強邪據太陽之高位矣故用葶藶杏仁以陷上焦甘遂以陷中焦大黃芒硝以陷下焦庶上下之邪一治成功其法之微妙并申明之搗為丸者唯恐藥性峻利不能逗留於上而攻結也不與丸服者唯恐滯而不行也以水煮之再內白蜜者又欲其緩攻於下也其析義之精又如此王海藏曰大陷胸湯治太陽熱實大陷胸丸治陽明熱喘小陷胸湯治少陽熱痞雖非仲景之意此理頗通姑識之大柴胡湯柴胡八兩黃芩三兩半夏半升生薑五兩切大棗十二枚擘芍藥三兩枳實四枚炙大黃二兩去皮酒洗右七味以水一斗二升煮取六升去滓再煎溫服一升日三服一方加大黃二兩若不加大黃恐不為大柴胡湯也是言古方有二仲景採其有大黃者而申明之此是明言二焦並治乃得稱大大柴胡湯下也前章言少陽證不可下而此復出下法者以熱邪從少陽而來結於陽明而少陽未罷不得不借柴胡湯以下陽明無形之熱故於本方去人參甘草實脾之藥倍加生薑佐柴胡解表加赤芍破裏結則枳實大黃下之不礙表邪矣柴胡治中大黃導下二焦並治故稱大柴胡加芒硝湯柴胡二兩十六銖黃芩一兩人參一兩甘草一兩炙生薑一兩切半夏五枚大棗四枚芒硝二兩右七味以水四升煮取二升去滓分二服以解為瘥不解更作服芒硝治久熱胃閉少陽熱已入胃而猶潮熱脅滿者則熱在胃而證未離少陽治亦仍用柴胡但加芒硝以滌胃熱仍從少陽之樞外出使其中外蕩滌無遺乃為合法錢塘張錫駒云應以大柴胡加芒硝其理亦通姑志之柴胡加大黃芒硝桑螵蛸湯柴胡二兩黃芩十八銖人參十八銖甘草十八銖炙生薑十八銖切半夏五枚洗大棗四枚擘芒硝三合大黃四兩去皮酒洗桑螵蛸五枚右前七味以水四升煮取二升去滓下芒硝大黃桑螵蛸煮取一升半去滓溫服五合微下即愈本方柴胡再服以解其外餘一服加芒硝大黃桑螵蛸柴胡加桑螵蛸湯此亦有方而無證大都用柴胡湯其邪必從少陽而來熱及於陽明者加芒硝熱實於陽明者加大黃其邪入陽明而後可議下然裏虛之應下者加芒硝當佐人參以安中若如大黃當佐桑螵蛸固陰續絶以安下此少陽而有陽明症者下之之方也桂枝加大黃湯桂枝三兩芍藥六兩甘草二兩炙生薑三兩切大棗十二枚擘大黃二兩去皮右六味㕮咀以水七升煮取三升去滓溫服一升大黃入於桂枝湯中欲其破脾實而不傷陰也大黃非治太陰之藥脾實腹痛是腸中燥矢不去顯然太陰轉屬陽明而陽道實故以薑桂入太陰升陽分殺太陰結滯則大黃入脾反有理陰之功即調胃承氣之義燥矢去而陽明之內道通則太陰之經氣出注運行而腹痛減是雙解法也如下文云其人胃氣弱者大黃芍藥宜減之豈非太陰屬陽明之論治乎枳實梔子豉湯枳實三枚炙梔子十四枚擘香䜴一升綿裹右三味以清漿水七升空煎取四升內枳實梔子煮取二升內豉更煮五六沸去滓溫分再服覆令微似汗若有宿食加大黃如博碁子大五六枚枳實梔子䜴湯微汗微下方也大都瘥復必虛實相兼故汗之不欲其大汗下之不欲其大下梔豉上焦藥也復以枳實宣通中焦再用清漿水空煮減三升則水性熟而沉梔䜴輕而清不吐不下必發於表故覆之必有微汗若欲微下再加大黃圍碁子大佐枳實下泄助熟水下沉則梔豉從上瀉下三焦通暢營衛得和而勞復愈故云微下四逆散柴胡十分枳實十分炙芍藥十分甘草十分炙右四味各十分搗篩白飲和服方寸七日三服四逆散與四逆湯藥品皆異者此四逆由於熱深而厥也素問厥論云陰氣虛則陽氣入胃不和而精氣竭則不營其四肢厥陰篇曰前熱者後必厥厥深熱亦深厥微熱亦微厥應下之故雖少陰逆而屬陽邪陷入者亦可下但不用寒下耳熱邪傷陰以芍藥甘草和其陰熱邪結陰以枳實泄其陰陽邪傷陰陰不接陽以柴胡和其樞紐之陽此四味而為下法者從苦勝幸辛勝酸酸勝甘乃可以勝腎邪故得稱下服以散者取藥性緩乃能入陰也白散桔梗三分貝母三分巴豆一分去皮心熬黑研如脂右三味為末內巴豆更於臼中杵之以白飲和服強人半錢羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若以水噀之洗之益令熱却不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法白散結胸者亦可服其義仍在噀水灌水外寒實表熱却於內故用桔梗貝母開提肺氣以泄表實使巴豆散水寒開胸結法用熬黑者熟則性緩欲其入胃緩緩劫寒破結作散服者至中焦而藥性散也三味分入手足兩經者以脾胃寄旺於各臟借以治標本也麻仁圓麻子仁二升杏仁一斤去皮尖白芍八兩大黃一斤去皮厚朴一尺炙去皮枳實八兩右六味為末煉蜜為丸梧子大飲服十丸日二服漸加以利為度下法不曰承氣而曰麻仁者明指脾約為脾土過燥胃液日亡故以麻杏潤脾燥白芍安脾陰而後以枳朴大黃承氣法勝之則下不亡陰法中用丸漸加者脾燥宜用緩法以遂脾欲非比胃實當急下也抵當湯水蛭三十箇熬虻蟲三十箇熬去翅足桃仁三十箇去皮尖大黃三兩去皮酒浸右四味為末以水五升煮取三升去滓溫服一升不下再服抵當者至當也蓄血者死陰之屬真氣運行而不入者也故草木不能獨治其邪務必以靈動嗜血之蟲為之向導飛者走陽絡潛者走陰絡引領桃仁攻血大黃下熱破無情之血結誠為至當不易之方毋懼乎藥之險也抵當丸水蛭二十箇虻蟲二十箇去翅足熬桃仁二十五箇大黃三兩去皮酒浸右四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服血蓄少腹之硬者亦必以水蛭虻蟲攻之乃為至當總非桃仁承氣等足以動其血故仲景云不可餘藥但於方中減其蟲數易以丸制宜少服之攻得輕重緩急之宜矣五苓散豬苓十八銖去皮茯苓十八銖澤瀉一兩六銖白术十八銖桂五錢去皮右五味為末以白飲和服方寸匕日三服多服暖水汗出愈苓臣藥也二苓相輔則五者之中可為君藥矣故曰五苓豬苓澤瀉相須藉澤瀉之醎以潤下茯苓白术相須藉白术之燥以升精脾精升則濕熱散而小便利即東垣欲降先升之理也然欲小便利者又難越膀胱一腑故以肉桂熱因熱用內通陽道使太陽裏水引而竭之當知是湯専治留著之水滲於肌肉而為腫滿若水腫與足太陰無涉者又非對證之方豬苓湯豬苓一兩去皮茯苓一兩阿膠一兩滑石一兩澤瀉一兩右五味以水四升先煮四味取二升去滓內下阿膠煬消溫服七合日三服五者皆利水藥標其性之最利者名之故曰豬苓湯與五苓之用其義天淵五苓散治太陽入本利水監以實脾守陽是通而固者也豬苓湯治陽明少陰熱結利水復以滑竅育陰是通而利者也蓋熱邪壅閉劫陰取滑石滑利三焦泄熱救陰淡滲之劑唯恐重亡其陰取阿膠即從利水中育陰是滋養無形以行有陰也故仲景云汗多胃燥雖渴而裏無熱者不可與也十棗湯芫花熬甘遂大戟各等分大棗十枚擘右三味等分各别搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢七羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養攻飲湯劑每以大棗緩甘遂大戟之性者欲其循行經隧不欲其竟走腸胃也故不名其方而名法曰十棗湯芫花之辛輕清入肺直從至高之分去鬱陳莝以甘遂大戟之苦佐大棗甘而泄者緩攻之則從心及脅之飲皆從二便出矣牡蠣澤瀉散牡蠣熬澤瀉海藻洗去鹽蜀漆洗去腥葶藶熬商陸根熬括蔞根已上名等分右七味異搗下篩為散更入臼中治之白飲和服方寸七小便利止後服日二服牡蠣澤瀉名其散者治濕取重醎也蓋逐水宜苦消腫宜醎牡蠣澤瀉海藻之醎蜀漆葶藶括蔞商陸之酸苦辛相使相須皆從陰出陽之藥也醎軟之苦平之辛泄之酸約之其性必歸於下而勝濕消腫服法用散者以商陸水煎能殺人也蜜煎導法蜜七合右一味內銅器中微火煎如飴勿令焦俟可丸捻作挺如指許長二寸當熱作令頭鋭內穀道中以手急抱欲大便時乃去之蜜煎外導者胃無實邪津液枯涸氣道結澀燥矢不下乃用蜜煎導之雖曰外潤魄門實導引大腸之氣下行也故曰土瓜根亦可為導豬膽導法大豬膽一枚右瀉汁和醋少許以灌穀道中如一食頃當大便出豬膽導者熱結於下腸滿胃虛承氣等湯恐重傷胃氣乃用豬膽之寒苦酒之酸收引上入腸中非但導去有形之垢并能滌盡無形之熱絳雪園古方選注卷六
