body:
  text: 絳雪園古方選注卷十三蘇州王子接撰眼科洗肝散薄荷葉一錢甘草五分羌活一錢防風一錢當歸一錢川芎五分山栀仁炒黑一錢大黃二錢右為末每服二三錢食逺沸湯調下天行時熱目赤胞腫怕日羞明風則散表熱則瀉裏風熱相兼則用洗肝散表裏兼治之薄荷甘草清利上焦開泄肝氣以肝開竅於目也羌活防風升發太陽之氣以太陽經有通項入於腦者正屬目系也當歸川芎行少陽血分之氣少陽為清淨廓雷風相薄而目赤必從大眥始也山栀仁能使三焦之火屈曲下行大黃瀉諸實熱且導且攻熱退腫消矣理明經正不越治病之章程普濟消毒飲黃連黃芩各五錢俱酒炒白殭蠶一錢炒連翹一錢黑元參二錢鼠粘子一錢柴胡桔梗生甘草稍各二錢板藍根馬屁勃各一錢廣橘紅二錢升麻七分人參三錢右為末半用沸湯調時時服之半用煉蜜為丸噙化時行疫癘目赤腫痛胞爛者屬濕熱憎寒壯熱頭面脹者屬風熱此皆邪發於手三隂者也普濟消毒飲本自局方謙甫遵於其師濟源東垣注釋見於準繩黃芩黃連連翹𤣥參瀉心肺之熱為君人參橘紅負荷其正驅逐其邪為臣升麻柴胡伸少陽陽明之正氣桔梗甘草載引諸藥不令下行為佐牛蒡散風消毒殭蠶消風散結板藍根解天行熱毒馬勃消頭面毒腫使藥四味為諸藥驅使於上焦以成消散之功手經病在上故不用下法消障救睛散石蟹一錢五分生研羚羊角一錢鎊草決明一錢連翹一錢五分白蒺藜一錢龍膽草五分酒炒灰甘菊八分木賊草五分漢防己一錢茺蔚子一錢水二鍾煎八分食逺服白睛胬肉狀若魚胞浮鰾世人咸用外㸃鈎割殊非正治余因製消胬湯方功勝鈎割用石蟹為君味鹹性大寒而燥去濕熱消胬肉如鼓應桴堪稱仙品佐以羚羊角之精靈熄肝風散惡血草決明療青盲去白膜連翹瀉客熱散結氣專泄大小眥之熱酒炒龍膽退濕熱之翳白蒺藜散風破血木賊防己療風勝濕甘菊化風茺蔚行血諸藥皆入肝經仍能上行於肺用之屢驗故敢質諸當世慈殊丸慈石硃砂神麯先以慈石置巨火中煆赤醋淬七次曬乾另研極細二兩辰砂另研極細一兩生陳神麯研極細二兩與前藥和勻更以神麯末一兩水和作餅湯中煮浮為度為糊量加煉蜜為丸如桐子大每服十丸加至三十丸空心清飲湯下瞳神散大孫思邈倪微德李東垣皆言心火乘肺上入腦灼髓以火性散溢故瞳子散大倪云忌用辛熱李云忌用寒凉孫云慈硃丸益眼力衆方不及慈石辛鹹寒鎮攝腎精令神水不外馳硃砂微甘寒收納心經浮溜之火慈石伏丹砂水勝火也故倍用慈石易象曰水在火上乃為既濟苐慈石入足少隂硃砂入手少隂手足經之走殊途水火之氣性各異故倪曰微妙在乎神麯非但生用化滯發生氣熟則斂暴氣今以脾經之藥配入心腎藥中猶之道家黃婆媒合嬰姹有相生相制之理附耳鼻桂星散辣桂川芎當歸石菖蒲細辛木通木香白蒺藜炒去刺麻黃去節甘草炙各一錢白芷稍天南星煨裂各一錢半加葱白二莖紫蘇五葉生薑五片水二鍾煎至一鍾食後服一方加全蠍去毒一錢犀角飲子犀角鎊木通石菖蒲甘菊花去蒂𤣥參赤芍赤小豆炒各二錢甘草炙錢加生薑五片水二鍾煎至一鍾不拘時服益腎散磁石製巴㦸川椒各一兩去閉口者石菖蒲沉香各五錢右為細末每服二錢用豬腎一隻細切和以葱白少鹽并藥濕紙十層裹煨令香熟空心細嚼溫酒送下合論桂星散犀角飲子益腎散三方治風虛風熱腎氣厥三者皆屬耳之暴聾雖各有所因治不越乎通陽鎮陰經言耳者腎之竅而心亦寄竅於耳除膀胱心包絡外其餘十經之絡脉皆入耳中故其受邪不一而所因所治亦不一當各隨其經以為治風為之疏散熱為之清利氣厥則為之通其腎氣鎮其逆氣假如風虛耳閉隂陽乍隔脉道不利經氣衝擊鼓動聽户而作嘈嘈風雨諸聲者考諸方書皆以桂星散為主方取其官桂從裏透表南星從表達裏佐以六經之藥分布於入耳之絡脉以宣藏府之氣是僅與人以規矩也後賢權衡在手揆度病情酌而用之其利溥矣若水衰火實熱鬱於上而聽户𤣥府窒塞清神不能通泄而重聽者以犀角飲子獨治心經俾清明之氣上通於舌而走於寄竅則耳受之而聽亦聰矣又若非風非熱非精脫而屬於腎勞氣厥者耳中渾渾燉燉閉塞不聰此即經言地氣冒明也由於腎經濁隂上逆蒙蔽其陽治以益腎散辛熱發其陽重墜鎮其逆然亦不可久服河間潔古二老論曰耳目不可以溫補也喻嘉言曰凡治年髙腎氣逆上而耳不聰者當以磁石鎮之但性主下吸不能制肝木之上吸須佐以地黃山藥等羣隂之藥輔之令隂氣自王於本宮不上觸於陽竅自然空曠無礙而能聽矣是亦治腎虛耳聾之良圖也至於精髓告竭宗脉耗損者即有填補之方終難復聰不復多贅芷辛散白芷一兩辛夷仁五錢蒼耳仁炒去皮二錢半薄荷葉五錢右為細末每服一錢葱湯或茶清調服準繩芷辛散專治鼻淵三因方易名蒼耳散又謂其統治鼻中之病按靈樞云手太隂開竅於鼻而手陽明之脉挾鼻上行故以白芷入手陽明療風去腐辛夷入手太隂消涕止淵然二者性皆外通九竅升清氣於表之功居多故王好古曰白芷與辛夷同用則能入裏托散鼻中之病矣蒼耳仁善通頂腦去鼻中惡肉死肌薄荷葉氣味俱薄能清至髙之風熱合而言之風火在上非辛散不能愈也再按經言膽移熱於腦則為鼻淵是膽熱為病之本矣余謂前方與黃芩鮮生地天麥冬同用以清膽熱亦治本之理歟絳雪園古方選注卷十三
