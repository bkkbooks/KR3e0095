body:
  text: 絳雪園古方選注卷十一蘇州王子接撰外科薏苡附子敗醬散薏苡仁十分敗醬五分附子二分右三味杵為末取方寸匕以水二升煎減半頓服小便當下小腸癰仲景詳言腹無積聚昭然是氣結而成奈諸家以方中附子為據紛紛注釋是小腸寒冷凝結成癰抑何荒謬若此余因懸內照之鑑以明之蓋心氣抑鬱不舒則氣結於小腸之頭阻傳道之去路而為癰腫即內經所謂藏不容邪則還之於腑也故仲景重用薏苡開通心氣榮養心境佐以敗醬化膿為水使以附子一開手太陽小腸之結一化足太陽膀胱之氣務令所化之毒仍從水道而出精微之奧豈庸淺者所能推測耶大黃牡丹湯大黃四兩芒硝三合丹皮桃仁五十箇瓜子半升當是甜瓜子右五味以水六升煮取一升去滓內芒硝再煎沸頓服之有膿當下如無膿當下血金匱上章用附子後人硬派小腸癰是寒結此湯用大黃芒硝又妄派大腸癰是熱結斯誠未足議也然以醫司生命又不得不重言以明之夫肺與大腸為表裏大腸癰者肺氣下結於大腸之頭其道逺於上其位近於下治在下者因而奪之也故重用大黃芒硝開大腸之結桃仁丹皮下將敗之血至於清肺潤腸不過瓜子一味而已服之當下血下未化膿之血也若膿已成形肉已壞又當先用排膿散及湯故原文云膿已成不可下也排膿散枳實十六枚芍藥六分桔梗二分右三味杵為散取雞子黃一枚以藥散與雞子黃相等揉和令相得飲和服之日一服芍藥用赤排膿湯甘草二兩桔梗三兩生薑一兩大棗十枚右四味以水三升煮取一升溫服五合日再服排斥也膿血肉所化也前方枳實赤芍佐以桔梗直從大腸泄氣破血斥逐其膿後方甘桔薑棗仍從上焦開提肺氣調和營衛俾氣行而膿自下審證用方學者出自心裁茄蒂湯鮮茄蒂七箇鮮何首烏量癤輕重等分水二鍾煎八分一服出膿再服收口對口癤生於啞門空處或由濕毒上壅或由腎虛火熾患者每多潰不收口或爛延纒頸甚至不救是殆督脈之陽氣泄也鮮茄蒂味甘寒緩火毒散惡血能收束頭頸之癤口鮮何首烏味苦澀瘍科名紅內消亦取其收斂精氣仲淳力贊是方深得消毒收口之祕真人活命飲白芷一錢防風七分陳皮一錢五分皂角刺五分穿山甲三片切蛤粉炒土貝母一錢天花粉一錢當歸尾一錢五分赤芍一錢乳香一錢去油沒藥五分去油金銀花三錢甘草節一錢在背角刺為君在腹白芷為君在胸加蔞仁在四肢銀花為君右酒水各半煎數十沸即服瘍科之方最繁初無深義難以類選兹取其通用者譯之如活命飲行衛消腫和營止痛是其綱領也經言衛氣不從逆於肉理乃生癰腫故用白芷入陽明通肌肉之閉以透表陳皮芳香利脾胃之氣以疏經中之滯防風卑賤性柔隨所引而入以泄營中之壅遏角刺性鋭能達毒處山甲性堅善走攻堅花粉土貝消腫歸尾赤芍活絡乳香沒藥護心昏神使人不知痛甘草銀花解熱散毒治腫毒之法畢備矣故瘍科推為首方柴胡連翹湯柴胡五錢連翹五錢瞿麥穗六錢黍粘子二錢生地三錢當歸一錢五分黃芩五錢炒知母五錢酒炒黃柏三錢酒炒甘草三錢炙中桂三分右銼如麻豆大每服五錢水二大盞煎至一盞去渣稍熱食後服柴胡連翹湯和劑也馬刀挾癭邪走手足少陽經而來結於耳下治以柴胡散少陽之結氣連翹散外瘍之血結氣聚瞿麥穗決上焦之壅腫黍粘子消上焦之熱腫生地當歸和手足少陽之血脈黃芩知柏解三焦之鬱熱炙甘草調和寒熱之劑微加中桂者馬刀堅硬用以消皮膚浮凍之氣也絳雪園古方選注卷十一
