  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0095_WYG_004-1a, image: WYG0783/WYG0783-0805a.png}
body:
  text: 絳雪園古方選注卷四蘇州王子接撰汗劑麻黃湯麻黃三兩去節杏仁七十粒去皮尖桂枝二兩去皮甘草一兩炙右四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥餘如桂枝法將息麻黃湯破營方也試觀立方大義麻黃輕清入肺杏仁重濁入心仲景治太陽初病必從心營肺衛入意也分言其功能麻黃開竅發汗桂枝和陽解肌杏仁下氣定喘甘草安內攘外四者各擅其長有非諸藥之所能及兼論其相制七法桂枝外監麻黃之發表不使其大汗亡陽甘草內守麻黃之出汗不使其劫陰脫營去薑棗者薑性上升又恐礙麻黃發表棗味緩中又恐阻杏仁下氣輾轉回顧無非欲其神速一劑奏績若喜功屢用必不戢而召亡陽之禍矣故服已又叮嚀不須啜粥亦恐有留戀麻黃之性也麻黃杏仁甘草石膏湯麻黃四兩杏仁五十箇泡去皮尖甘草二兩炙石膏八兩碎綿褁右四味以水七升先煮麻黃減一升去上沫內諸藥煮取二升去滓溫服一升本云黃耳柸喘家作桂枝湯加厚朴杏子治寒喘也今以麻黃石膏加杏子治熱喘也麻黃開毛竅杏仁下裏氣而以甘草載石膏辛寒之性從肺發泄俾陽邪出者出降者降分頭解散喘雖忌汗然此重在急清肺熱以存陰熱清喘定汗即不輟而陽亦不亡矣觀二喘一寒一熱治法仍有營衛分途之義麻黃附子甘草湯麻黃二兩去節附子一枚泡去皮切八片甘草二兩炙右三味以水七升先煮麻黃一二沸去上沫內諸藥煮取三升去滓溫服一升日三服少陰無裏症欲發汗者當以熟附固腎不使麻黃深入腎經劫液為汗更妙在甘草緩麻黃於中焦取水穀之津為汗則內不傷陰邪從表散必無過汗亡陽之慮矣麻黃附子細辛湯麻黃二兩去節細辛二兩附子一枚炮去皮破八片右二味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升日三服少陰得太陽之熱而病者用麻黃發太陽之表汗細辛散少陰之浮熱相須為用欲其引麻黃入於少陰以出太陽陷入之邪尤藉熟附合表裏以溫經外護太陽之剛氣內固少隂之腎根則津液內守而微陽不致外亡此從裏達表由陰出陽之劑也麻黃升麻湯麻黃二兩半去節升麻一兩一分當歸一兩一分知母十八銖黃芩十八銖萎㽔十八銖石膏碎綿裹天門冬去心一方用麥門冬茯苓甘草炙白术白芍藥乾薑桂枝各六銖右十四味以水一斗先煮麻黃一二沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈麻黃升麻湯方中升散寒潤收緩滲泄諸法具偹推其所重在陰中升陽故以麻黃升麻名其湯膏芩知母苦辛清降上焦之津芍藥天冬酸苦收引下焦之液苓草甘淡以生胃津液歸术萎㽔緩脾以致津液獨是九味之藥雖有調和之致不能提出陰分熱邪故以麻黃升麻桂枝乾薑開入陰分與寒涼藥從化其熱庶幾在上之燥氣除在下之陰氣堅而厥陰錯雜之邪可解麻黃連軺赤小豆湯連軺即連翹根𢎞景曰方藥不用無人識者蘇恭亦退入有名未用中麻黃二兩去節連軺二兩赤小豆一升杏仁四十個去皮尖生薑二兩切生梓白皮一升甘草二兩炙大棗十二枚擘已上八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升分溫三服半日服盡麻黃連軺赤小豆湯表裏分解法或太陽之熱或陽明之熱內合太陰之濕乃成瘀熱發黃病雖從外之內而粘著之邪當從陰以出陽也杏仁赤小豆泄肉理濕熱生薑梓白皮泄肌表濕熱仍以甘草大棗奠安太陰之氣麻黃使濕熱從汗而出太陽連軺根導濕熱從小便而出太陽潦水助藥力從陰出陽經云濕上甚為熱若濕下行則熱解熱解則黃退也大青龍湯麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁四十個去皮尖生薑三兩切大棗十二枚擘石膏如雞子大碎綿裹右七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多溫粉撲之一服汗者停後服麻黃桂枝越脾互復成方取名於龍者辛熱之劑復以石膏變為辛涼正如龍為陽體而變其用則為陰雨也太陽寒鬱於表而生喘用杏仁降之太陽熱灼於裏而無汗用石膏泄之麻黃發汗甘草護營復有薑棗以調之方義専在泄衛故不用芍藥欲其直達下焦故倍加銖兩從衛分根本上泄邪庶幾表裏鬱熱之氣頃刻致和不使有傳變之虞內經治遠用竒方大制故稱大青龍小青龍湯麻黃三兩去節桂枝二兩去皮芍藥三兩乾薑三兩細辛三兩五味子半升甘草三兩炙半夏半升湯洗右八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升小青龍湯治太陽表裏俱寒方義迥異於大青龍之治裏熱也蓋水寒上逆即涉少陰腎虛不得已而發表豈可不相綰照獨泄衛氣立剷孤陽之根乎故於麻桂二湯內不但留芍藥之收拘其散表之猛再復乾薑五味攝太陽之氣監制其逆細辛半夏辛滑香幽導綱藥深入少陰溫散水寒從陰出陽推測全方是不欲發汗之意推原神妙亦在乎陽劑而以斂陰為用偶方小制故稱之曰小青龍桂枝麻黃各半湯桂枝一兩十六銖去皮麻黃一兩去節芍藥一兩杏仁二十四粒去皮尖甘草一兩炙生薑一兩切大棗四枚擘右七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合桂枝麻黃互復注解者皆為兩解法是以淺陋之見測作聖之深心良可慨也曷不觀其法先煮麻黃後內諸藥顯然麻黃為主而以桂枝芍藥為監制也蓋太陽邪未解又因陰陽俱虛汗吐下皆禁不能勝麻黃之鋭故監以桂枝約以白芍而又銖兩各減其半以為小制服後得小汗即已庶無大汗亡陽之過爾桂枝二麻黃一湯桂枝一兩十七銖去皮芍藥一兩六銖甘草一兩二銖炙麻黃十六銖去節杏仁十六個去皮尖生薑一兩六銖切大棗五枚擘右七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再服桂枝銖兩多麻黃銖數少即啜粥助汗之變法桂枝湯減用四分之二麻黃湯減用四分之一則固表護陰為主而以發汗為復假麻黃開發血脈精氣助桂枝湯於衛分作微汗耳第十六銖麻黃不能勝一兩十七銖桂枝一兩六銖白芍則發汗之力太微故又先煮麻黃為之嚮道而以桂芍襲其後也桂枝二越脾一湯桂枝十八銖去皮芍藥十八銖甘草十八銖生薑一兩二銖大棗四枚擘麻黃十八銖去節石膏二十四銖碎綿裹右七味㕮咀以水五升煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升本方當裁為越脾湯桂枝湯合飲一升今合為一方桂枝二越脾一桂枝二越脾一湯治脈微無陽無陽者陽分亡津之謂故於桂枝湯照原方用四分之二以和陽越脾湯照原方用四分之一以行陰行陰者發越脾氣而行胃中之津俾陽和津生而脈復因其病在陽故有陽用二陰用一之殊後人稱越脾者傳寫之誤也葛根湯葛根四兩麻黃三兩去節桂枝二兩去皮白芍二兩甘草二兩炙生薑三兩切大棗十二枚擘右七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝法將息及禁忌葛根湯即桂枝湯加麻黃倍葛根以去營實小變麻桂之法也獨是葛根麻黃治營衛實芍藥桂枝治營衛虛方中虛實互復者其微妙在法先煮麻黃葛根減二升後內諸藥則是發營衛之汗為先而固表收陰襲於後不使熱邪傳入陽明也故仲景治太陽病未入陽明者用以驅邪斷入陽明之路若陽明正病中未嘗有葛根之方東垣易老謂葛根是陽明經主藥誤矣葛根加半夏湯葛根四兩麻黃三兩去節湯泡去黃汁焙乾桂枝二兩去皮芍藥二兩甘草二兩炙生薑三兩切大棗十二枚擘半夏半升洗右八味以水一斗先煮葛根麻黃減二升去白沫內諸藥煮取三升去滓溫服一升覆取微似汗葛根湯升劑也半夏辛滑芍藥收陰降藥也太陽陽明兩經皆病開闔失機故以升降法治之麻葛薑桂其性皆升惟其升極即有降理寓於其中又有芍藥甘草奠安中焦再加半夏以通陰陽而氣遂下嘔亦止是先升後降之制也絳雪園古方選注卷四
