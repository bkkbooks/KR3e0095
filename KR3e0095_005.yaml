body:
  text: 絳雪園古方選注卷五蘇州王子接撰吐劑梔子䜴湯梔子十四枚擘生用香豉四合綿裹右二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐者止後服梔子豉湯為輕劑以吐上焦虛熱者也第梔子本非吐藥以此二者生熟互用湧泄同行而激之吐也蓋梔子生則氣浮其性涌香䜴蒸罯熟腐其性泄涌者宣也泄者降也既欲其宣又欲其降兩者氣爭於陽分自必從宣而越於上矣余以生升熟降為論柯韻伯以梔子之性屈曲下行淡豉腐氣上蒸而為吐引證瓜蒂散之吐亦在於豉汁吾恐瓜蒂亦是上涌之品吐由瓜蒂非豉汁也存之以俟君子教我梔子甘草豉湯梔子十四枚生用甘草二兩香豉四合綿裹右三味以水四升先煮梔子甘草得二升半內䜴煮取一升半去滓分二服溫進一服得吐止後服梔子豉湯吐胸中熱鬱之劑加甘草一味能治少氣而諸家注釋皆謂益中非理也蓋少氣者一如飲家之短氣也熱藴至高之分乃加甘草載梔豉於上須臾即吐越出至高之熱梔子生薑豉湯梔子十四枚生用生薑五兩香䜴四合綿裹右三味以水四升先煮梔子生薑得二升半內䜴煮取一升半去滓分二服溫進一服得吐止後服梔子豉湯加生薑則又何說也蓋梔豉為輕劑以吐胸中之熱若嘔則熱更在卑窒於胃矣故加生薑入胃升散引領梔䜴從胃中湧熱上出也首章言胸中窒塞前章言胸之上此章言胸之下梔子厚朴湯梔子十四枚生用厚朴四兩薑炙枳實四兩湯浸去穰炒右三味以水三升半煮取一升半去滓分二服溫進一服得吐止後服梔子厚朴湯下後遺熱心煩起臥不安腹滿是三焦病矣故以上涌下泄為治凡用梔子皆取其上涌客熱復以厚朴枳實者取其酸苦下泄陰滯不煩不滿而起臥亦安矣瓜蒂散瓜蒂一分熬黃赤小豆一分香䜴一合右三味各别搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散赤小豆按本草用細粒赤豆今人用半紅半黑者恐非瓜蒂散乃酸苦涌泄重劑以吐胸寒者邪結於胸不涉太陽表實只以三物為散煮作稀糜留戀中焦以吐之能事畢矣瓜蒂性升吐苦而湧豆性酸斂味苦而泄恐其未必即能宣越故復以香豉湯陳腐之性開發實邪定當越上而吐矣絳雪園古方選注卷五
