body:
  text: 綘雪園古方選註卷九蘓州王子接撰女科四物湯生地二兩當歸三兩酒洗芎藭一兩五錢芍藥二兩右㕮咀每服四錢水二盞煎八分去滓温服四物湯物類也四者相類而仍各具一性各建一功並行不悖芎歸入少陽主升芍地入厥隂主降芎藭鬱者逹之常歸虛者補之芍藥實者瀉之地黄急者緩之能使肝膽血調隂陽氣暢故爲婦人專劑逍遥散柴胡一錢當歸一錢白芍一錢甘草五分白术一錢茯苓一錢右水二鍾加煨薑一片薄荷五分煎八分食逺温服薛立齋加丹皮一錢山梔炒黑一錢逍遥説文與消摇通莊子逍遥遊註云如陽動氷消雖耗不竭其本舟行水摇雖動不傷其内譬之於醫消散其氣鬱摇動其血鬱皆無傷乎正氣也盖鬱爲情志之病丹溪雖論六鬱然思憂怒致鬱者多思則氣結於心傷於脾憂則神志不遂精氣消索心脾日以耗損含怒未發肝氣内鬱乗勝於脾治以柴胡肝欲散也佐以甘草肝苦急也當歸以辛補之白芍以酸瀉之治以白术茯苓脾苦濕也佐以甘草脾欲緩用苦瀉之甘補之也治以白芍心苦緩以酸收之佐以甘草心欲耎以甘瀉之也加薄荷生薑入煎即濾統取辛香散鬱也薛立齋加山梔清氣分鬱火丹皮瀉血分鬱熱其理甚通宜遵之旋覆花湯旋覆花三兩葱十四莖新絳尺許右三味以水三升煑取一升頓服旋覆花湯通劑也治半產漏下乃通因通用法仲景云婦人三十六病千變萬端無不因虛積冷結氣三者而成故用旋覆花散結氣通血脉全用葱之青白開積冷安胎氣佐以繭絲補脾氣絳乃紅藍花染就并得烏梅黄栢之監制則通血脉之中仍有收攝之妙余因其義採用新絳和血青葱管利氣再複理氣血之品配合成方移治鬱結傷中胸脇疼痛等證屢有殊功并識之甘草小麥大棗湯甘草三兩小麥一升大棗一枚右三味以水六升煑取三升温分三服小麥苦穀也經言心病宜食麥者以苦補之也心系急則悲甘草大棗甘以緩其急也緩急則云瀉心然立方之義苦生甘是生法而非制法故仍屬補心定巖散豭鼠糞三錢兩頭尖土楝實三錢經霜有核者佳不用川楝露蜂房三錢右煆存性各取淨末三錢和匀每服三錢酒下間兩日一服定止也潰巖服之痛定而爛止也豭鼠糞性主走隂專入厥隂血分通經下乳楝實用土者取其微苦力薄走中焦乳間泄熱不似川楝力厚直行下焦露蜂房入陽明經驅肝經風毒犯胃有收斂之性凡外瘍之毒根在臟腑者非此不愈故乳巖潰爛經年僅存内膜者服之痛止膿乾收斂合口此方傳自江西允稱神異安胎飲子建蓮子去心三錢台州青苧三錢洗去膠白糯米三錢右用水一鍾煎五分每日侵晨服自懷姙兩月服起至六箇月無墮胎之虞小產由於房勞傷損足三隂腎傷則精氣不固肝傷則血熱妄行脾傷則胎元自墮建蓮子清君相之火而能固澀眞氣台州青苧利小便而通子户清淫慾之瘀熱糯米補益脾隂能實陽明空竅使肝氣不妄動而胎氣自安以五穀果實爲方誠爲王道之劑達生散人參一錢白术一錢炒甘草二錢炙廣皮一錢當歸一錢白芍一錢酒炒大腹皮三錢洗紫蘇一錢青葱五葉黄楊嫩頭七箇右水二鍾煎八分隨時服葩經註云逹小羊也羊子易生無留難也昔湖陽公主體肥難産方士進痩胎飲有騐後人因之變方甚多然於藥品中和肥痩之體皆可服者莫若丹溪製此方人參白术炙甘草補正氣陳皮腹皮疏氣中之滯當歸白芍調營血紫蘇青葱通血中之壅補瀉合宜氣血條暢自無難產之患加黄楊嫩頭其樹閏年不長取其知止催其產也千金神造湯蟹爪一升生甘草二尺阿膠三兩右煎藥作東向竈炊以葦薪煑之東流水一斗煑至二升濾去滓入眞阿膠令烊頓服或分二服若人昏不能服者灌入即活神造者製方之妙一若神仙所作者也蟹爪尖專下死胎甘草奠安中氣不使尸氣上乗阿膠滑利前隂分兩用一二三者取數之順衡以升尺戥者取器之動竈向東者取生氣炊以葦薪者取輕脱若雙胎一死一生者蟹爪又安生胎阿膠專於育神甘草培植生氣服之令死者出生者安眞神品也補脬飲生黄絲絹一尺剪碎白丹皮根木白芨各一錢右水一碗煑至絹爛如餳空心服嚥時不得作聲脬婦之膀胱也臨産爲穏婆傷破小水淋漓無度觀其補法有不可思議之妙生絲造者曰絹色黄者入血丹皮連木者入裏色白者走氣二者皆能瀉膀胱之火引清氣以達外竅白芨性粘功專收濇能補五内之破損嚥之無聲乃有效者盖聲出於五臟有聲則五臟之氣動而來迎無聲則五臟之氣靜而寜謐所餌之藥不由五臟分布入肺竟從胃口闌門泌别清濁之處由脂膜之絡滲於膀胱之外膜使白芨得以䕶外而爲固也本草載台州大辟剖出肺傷之處皆白芨所補信有是夫絳雪園古方選註卷九
