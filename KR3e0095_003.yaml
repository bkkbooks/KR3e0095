body:
  text: 絳雪園古方選注卷三蘇州王子接撰溫劑四逆湯甘草二兩炙乾薑一兩半附子一枚生用去皮切八片右三味以氷三升煮取一升二合去滓分溫再服强人可用大附子一枚乾薑三兩四逆者四肢逆冷因證以名方也凡三陰一陽證中有厥者皆用之故少陰用以救元海之陽太陰用以溫臟中之寒厥陰薄厥陽欲立亡非此不救至於太陽誤汗亡陽亦用之者以太少為水火之主非交通中土之氣不能內復真陽故以生附子生乾薑徹上徹下開闢羣陰迎陽歸舍交接於十二經反復以炙草監之者亡陽不至於大汗則陽未必盡亡故可緩制留中而為外召陽氣之良法通脈四逆湯甘草二兩炙附子大者一枚生用去皮破八片乾薑三兩强人可用四兩右三味以水三升煮取一升二合去滓分溫再服其脈即出者愈後加減通脈四逆少陰格陽面赤陽越欲亡急用乾薑生附奪門而入驅散陰霾甘草監制薑附烈性留頓中宫扶持太和元氣藉葱白入營通脈庶可迎陽內返推仲景之心只取其脈通陽返了無餘義矣至於腹痛加芍藥嘔加生薑咽痛加桔梗利不止加人參或涉太陰或干陽明或陰火僣上或穀氣不得非格陽證中所必有者也故仲景不列藥品於主方之內學者所當詳審人參四逆湯人參一兩甘草二兩炙乾薑一兩五錢附子一枚生去皮切八片右四味以水三升煮取一升二合去滓分溫再服四逆加人參治亡陰利止之方蓋陰亡則陽氣亦與之俱去故不當獨治其陰而以乾薑附子溫經助陽人參甘草生津和陰茯苓四逆湯茯苓六兩乾薑一兩五錢附子一枚生甘草二兩炙人參一兩右五味㕮咀以水五升煮取一升二合去滓分溫再服茯苓四逆湯即真武湯之變方太陽篇中汗出煩躁禁用大青龍即以真武湯救之何况煩躁生於先汗後下陽由誤下而欲亡能不救下元之真陽乎故重用茯苓六兩滲泄人參甘草下行以安欲失之真陽生用乾薑附子以祛未盡之寒邪陽和躁寧不使其手足厥逆故亦名四逆通脈四逆加猪膽汁湯乾薑三兩强人四兩甘草二兩炙附子大者一枚生用猪膽汁四合右三味以水三升煮取一升二合去滓內猪膽汁分溫再服四逆加膽汁為陽虛陰甚從治之方津液內竭脈微欲絶是亡陰亡陽由於吐已下後用四逆必當通脈固中焦胃陽啓下焦元陽但陰甚格拒恐陽藥入中强梁不伏故以猪膽汁苦寒從陰之性引領陽藥從心通脈先和陰而後復陽白通湯葱白四莖乾薑一兩附子一枚生用去皮臍破八片右三味以水三升煮取一升去滓分溫再服白通者薑附性燥腎之所苦須藉葱白之潤以通於腎故名若夫金匱云面赤者加葱白則是葱白通上焦之陽下交於腎附子啓下焦之陽上承於心乾薑溫中土之陽以通上下上下交水火濟利自止矣按脈之生原下起於腎由腎而中歸於胃由胃而上出於心由心而大㑹於肺外出於經脈三者能變通於上下亦由是也白通加猪膽汁湯人尿五合猪膽汁一合葱白四莖乾薑一兩附子一枚生用去皮破八片已上三味以水三升煮取一升去滓內膽汁人尿和令相得分溫再服若無膽亦可用白通湯陽藥也少陰下利寒氣太甚內為格拒陽氣逆亂當用監制之法人尿之醎勝猪膽之苦猪膽之苦勝薑䓤附之辛辛受制於醎苦則醎苦為之向導便能下入少陰俾冷性消而熱性發其功乃成此又為外護法也附子湯附子二枚生用去皮茯苓三兩白芍三兩人參二兩白术四兩右五味以水八升煮取三升去滓溫服一升日三服附子湯少陰固本禦邪之劑功在倍用生附力肩少陰之重任故以名方其佐以太厥之藥者扶少陰之陽而不調太厥之開闔則少陰之樞紐終不得和故用白术以培太陰之開白芍以收厥隂之闔茯苓以利少陰之樞紐獨是少陰之邪其出者從陰內注於骨苟非生附焉能直入少陰注於骨間散寒救陽尤必人參佐生附方能下鼓水中之元陽上資君火之熱化全賴元陽一起而少陰之病霍然矣再論藥品與真武相同唯生熟分兩各異其補陽鎮陰之分岐只在一味轉旋學者所當深心體㑹术附湯白术四兩附子三枚炮去皮破八片甘草二兩炙生薑二兩切大棗十二枚擘右五味以水六升煮取二升去滓分溫三服初服其人覺身如痺半日許復服之三服盡其人如冒狀刃怪此以附子與术並走皮中逐水氣未得除故使之耳濕勝於風者用术附湯以濕之中人也太陰受之白术健脾去濕熟附溫經去濕佐以薑棗和表裏不必治風但使濕去則風無所戀而自解矣桂枝附子湯桂枝四兩去皮熟附子三枚炮去皮臍破八片甘草二兩炙生薑三兩切大棗十二枚擘右五味以水六升煮取二升去滓分溫三服桂枝附子湯兩見篇中一治亡陽一治風濕治風濕者以風為天之陽邪桂枝甘草辛甘可以化風濕為地之陰邪熟附可以溫經去濕治亡陽者心陽虛而汗脫桂枝能固心經漏泄之汗太陽虛而津液不藏熟附能固亡陽之汗佐以薑棗者凡表裏有邪皆用之此風勝於濕之主方甘草附子湯甘草二兩炙附子二枚炮去皮破八片白术二兩桂枝四兩去皮右四味以水六升煮取三升去滓溫服一升日三服甘草附子湯兩表兩裏之偶方風淫於表濕流關節陽衰陰勝治宜兩顧白术附子顧裏勝濕桂枝甘草顧表化風獨以甘草冠其名者病深關節義在緩而行之徐徐救解也桂枝去芍藥加附子湯桂枝三兩去皮甘草二兩炙生薑三兩切大棗十二枚擘附子一枚炮去皮破八片右五味㕮咀以水七升煮取三升去滓溫服一升惡寒止停後服桂枝湯去芍藥加附子者下後微惡寒顯然陽氣渙散於中下矣當急救其陽毋暇顧戀陰氣以附子直從下焦溫經助陽臣以桂枝甘草載還中焦陽氣以杜亡陽之機為禦後之策甘草乾薑湯甘草四兩炙乾薑二兩右二味㕮咀以水三升煮取一升五合去滓分溫再服甘草乾薑湯桂枝甘草湯同為辛甘化陽而有分頭異治之道桂枝走表治太陽表虛乾薑守中治少陰裏虛病雖在太陽而見少陰裏虛證當溫中土制水寒以復其陽至於二方分兩亦各有别彼用桂枝四兩甘草二兩是辛勝於甘此用甘草四兩乾薑二兩為甘勝於辛辛勝則能走表護陽甘勝則能守中復陽分兩之間其義精切如此乾薑附子湯乾薑一兩附子一枚炮去皮右二味以水三升煮取一升頓服之乾薑附子湯救太陽壞病轉屬少陰者由於下後復汗一誤再誤而亡其陽致陰躁而見於晝日是陽亡在頃刻矣當急用生乾薑助生附子純用辛熱走竄透入陰經比四逆之勢力尤峻方能驅散陰霾復渙散真陽若猶豫未決必致陽亡而後已理中圓及湯人參三兩甘草三兩炙白术三兩乾薑三兩右四味搗篩為末蜜和丸如雞子黃大以沸湯數合和一丸研碎溫服之日三四服夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服加減法理中者理中焦之氣以交於陰陽也上焦屬陽下焦屬陰而中焦則為陰陽相偶之處仲景立論中焦熱則主五苓以治太陽中焦寒則主理中以治太陰治陽用散治隂用丸皆不及於湯恐湯性易輸易化無留戀之能少致和之功耳人參甘草甘以和陰也白术乾薑辛以和陽也辛甘相輔以處中則隂陽自然和順矣桂枝人參湯桂枝四兩甘草四兩炙人參三兩白术三兩乾薑三兩右五味以水九升煮四味取四升去滓內桂更煮取三升去滓溫服一升日再夜一服理中加人參桂枝去芍藥不曰理中而曰桂枝人參者言桂枝與理中表裏分頭建功也故桂枝加一兩甘草加二兩其治外脅熱而裏虛寒則所重仍在理中故先煮四味而後內桂枝非但人參不佐桂枝實表并不與桂枝相忤宜乎直書人參而不諱也吳茱萸湯吳茱萸一升洗人參三兩生薑六兩切大棗十二枚擘右四味以水七升煮取二升去滓溫服七合日三服吳茱萸湯厥陰陽明藥也厥陰為兩陰交盡而一陽生氣實寓於中故仲景治厥陰以護生氣為重生氣一虧則濁陰上干陽明吐涎沫食穀欲嘔煩躁欲死少陰之陽并露矣故以吳茱萸直入厥陰招其垂絶之陽與人參震坤合德以保生氣仍用薑棗調其營衛則參茱因之以承宣中下二焦不治心肺而涎沫得攝嘔止煩寧真武湯茯苓三兩芍藥三兩生薑三兩切白术二兩附子一枚炮去皮破八片右五味以水八升煮取三升去滓溫服七合日三服後加減术苓芍薑脾胃藥也太陽少陰水臟也用崇土法鎮攝兩經水邪從氣化而出故名真武茯苓淡以勝白术之苦則苦從淡化便能入腎勝濕生薑辛以勝白芍之酸則酸從辛化便能入膀胱以攝陽然命名雖因崇土其出化之機畢竟重在坎中無陽假使腎關不利不由膀胱氣化焉能出諸小便故從上不寧之水全賴附子直走下焦以啓其陽則少陰水邪必從陽部注於經而出矣非但裏鎮少陰水泛并可外禦太陽亡陽桃花湯赤石脂一斤一半全用一半節末乾薑一兩粳米一升右三味以水七升煮米令熟去滓溫服七合內赤石脂末方寸七日三服若一服愈餘勿服桃花湯非名其色也腎臟陽虛用之一若寒谷有陽和之致故名石脂入手陽明經乾薑粳米入足陽明經不及於少陰者少陰下利便血是感君火熱化太過閉藏失職關閘盡撤緩則亡陰矣故取石脂一半同乾薑粳米留戀中宫載住陽明經氣不使其陷下再內石脂末方寸七留藥以沾大腸截其道路庶幾利血無源而自止其腎臟亦安矣絳雪園古方選注卷三
