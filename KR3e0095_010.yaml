body:
  text: 絳雪園古方選注卷十蘇州王子接撰女科丸方烏鰂骨丸烏鰂魚骨四分茹蘆一分右以雀卵為丸如菉豆以五丸為後飯飲以鮑魚汁烏鰂骨丸皆血肉之品蓋血枯氣去苟非有情之物焉能留戀氣血而使之生長烏鰂魚骨醎溫下行性澀去脫久服令人有子可知其固氣益精之功矣茹藘醎酸入肝活血通經疏氣行傷丸以雀卵壯陽益血藥後即飯復飲鮑魚汁壓其藥性下行利腸續絶每用五丸者經言脫血入房肝傷由於中氣竭故欲其留頓中宫仍從脾胃轉輸於下也按素問用䕡茹農經言有毒蝕惡肉排膿血茹藘無毒亦能通經脈治六極傷産後血暈去淤排膿暌度二者之用莫辨孰是但䕡茹今人有名未用茹藘即茜草藥肆易得且與病情亦相合姑從茹藘注釋惟後賢詳審聚精丸附內科方黃魚鰾一斤切碎蛤粉炒沙苑蒺藜八兩馬乳浸隔湯蒸一炷香右為末煉蜜丸每服八十丸白湯下震一索而得長男長男盛陽也震始於寅在人屬少陽初關精氣動念在兹有勇猛精進之體用齊乎巽隂相見乎離得虛靈不昧之性自然得子成男若少陽男人頭小面長目大無鬚爪枯脛細平素膽精不足不能會合腎精者其何以有子宜服聚精丸積精全神積精者腎藏精三合膽藏精三合兩精摩蕩而生神也黃魚鰾甘鹹入少隂和血固精沙苑蒺藜辛甘入少陽利竅益精俾精聚氣全使內之時女妻有震虩喜悅之象則知巽隂潔齊而得孕矣加味香附丸金華香附一斤為末四兩煮酒浸兩宿搗碎焙乾磨四兩米醋浸同上法四兩童便浸同上法滓四兩用炒山梔四兩煎濃汁去入香附浸同上法澤蘭淨葉六兩酒洗海螵蛸六兩搗稍碎炒當歸四兩酒洗川芎三兩白芍四兩酒炒懷熟地八兩搗膏焙乾右為末用浮小麥粉酒醋水打糊為丸如菉豆大每日早晚服兩次忌食萊蔔及牛肉生冷震陽也其動也厲巽隂也其正也貞巽隂從陽非泛從也隂不失柔順從容中正之道乃能潔齊乎陽若女子經水不調赤白帶下腹寒胞閉夢與鬼交有絶産十二症者半屬奇經半屬肝虛即不能從陽得子宜服香附丸以四物和肝之隂陽烏鰂骨治使內肝傷澤蘭葉調病傷八脈任通衝盛精氣溢寫自能有子坎氣丹附內科方坎氣二十四條男者良人乳粉二兩四錢熟地八兩砂仁一兩五錢陳煮酒八兩製久晒者良人參二兩枸杞子四兩右法製烘燥入磨為末用酒釀四兩白蜜四兩同煉搗為丸每服五錢清米飲湯送坎再索而得中男在人為腎中之陽陽險乎中得子非易若少隂男人耳薄鼻尖毛悴精寒者尤難種子易曰有孚維心亨行有尚必得少女之心有孚於夫剛中得正孕雖險亦可求而得男承上文説言乎兊之義易曰勞乎坎者腎雖為作強之官陽陷而險更當慰勞腎中之陽乃能剛中而不失其孚宜服坎氣丹坎氣人乳補先天之正氣熟地人參枸把填補足三隂經丸以酒釀白蜜醖釀之品而成化育之功斑龍丸方見內科丸方中艮三索而得少男得其所止之陽也象曰艮其限陽極於上不能退聽於隂索而不有其身矣男子八八天數已極不得其子亦止所當止無為之時也然隂陽處過極之候必變而後得如從震而變大過曰枯楊生梯老夫得其女妻從艮而變損曰山澤通氣易曰艮其背陽氣止於背而不能變當從兌以悅之也男服斑龍丸通督脈之隂陽補玉堂關下之穴以救尾閭滄海之竭猶藉女妻有孚庶可索而得男當服吉祥丸啓子宫生氣則從兊而變悅也疏肝清胃丸夏枯草蒲公英金銀花漏蘆橘葉甘菊豭鼠糞紫花地丁貝母連翹白芷山慈姑瓜蔞實炙甘草廣陳皮茜根乳香沒藥右法製等分為末另用夏枯草煎膏為丸每服五錢開水送乳巗發於乳中按胃經循乳穴歌云乳中正在乳頭心次有乳根出乳下又肝經循乳穴歌云循本經之章門至期門之所挾胃屬肝故前賢皆以憂思鬱怒積氣於肝胃兩經而成乳巗苐方書治法雖多不失之峻補則失之峻攻惟仲醇製疏肝清胃丸雖平淡無奇却有深中肯綮之妙夏枯草入厥隂解鬱熱散結氣蒲公英一名黃花地丁入陽明散熱毒消癰腫二味為君金銀花入陽明散熱消乳腫甘菊清風熱益肝隂鼠糞入隂解熱紫花地丁透乳消腫茜根行血通經貝母開鬱結消乳癰凡此六者皆入肝經連翹清客熱消腫毒白芷散血熱攻乳癖山慈姑攻毒散結瓜蔞實降火滌痰甘草和胃消癰陳皮和胃破結凡此六者皆入胃經共十二味為佐乳香活血沒藥散血皆能止痛消腫二味為使再復以夏枯草煎膏為丸者其義重在通陽化隂流通血脈乳癖自散實遵經言肝欲散胃喜通之旨較之世人以乳癰為實乳巗為虛泥於參术以滯其氣者其用意逺矣椿皮丸椿根白皮一兩五錢白芍藥五錢良薑炒成灰三錢黃柏炒成灰二錢右為末粥漿丸每服三五十丸空心米飲下椿皮丸治瘦人帶下熱勝於濕又弱而不禁攻者瘦人多血熱故以椿皮苦澀入血清熱勝濕以止帶瘦人多隂弱故以白芍酸寒收隂氣以約帶瘦人多中虛故以良薑入胃和陽截生濕之源頭瘦人多隂火故以黃柏入腎堅隂固帶下之去路然以薑柏炒灰則成不寒不熱僅存固澀收脫之性助椿皮以建功白斂丸白斂八兩狗脊𠠃去毛一兩鹿茸酒蒸焙二兩右為細末用艾煎醋汁打糯米糊丸如梧子大每服五十丸空心溫酒送下室女衝任虛寒及嫁房勞帶下隂中腫痛陽虛之體而得火證當以白斂殺火消腫為要故名白斂丸佐以狗脊療傷中通關節仍主以鹿茸保護督脈之陽以安衝任固本治標功稱嫓美固陽丸新製黃耆酒炒三兩當歸酒淨三兩乾薑一兩六錢赤石脂一兩二錢泥罐中煆赤研水飛舶蘹香八錢白龍骨煆捶碎絹袋盛大豆同蒸豆熟出取焙乾研水飛一兩二錢陽起石用乾鍋於大火中煆令通紅取出酒淬置隂地令乾研水飛一兩二錢肉桂八錢韭菜子酒浸曝乾微炒一兩六錢茯苓三兩黃鹽炒三錢右法製為末酒糊丸每服五十丸溫酒下治帶諸方燥濕清熱者居多若夫久曠失志心陽內耗而命門失守或內勞無度液脫陽離而命門不禁博採古方治此二證者藥品冗雜一無成法可遵余因製此方以固未散之真陽黃耆茯苓通陽明之氣道引領陽起石升發諸陽乾薑赤石脂堵截陽明之津液不使其順流於前隂當歸肉桂蘹香升少陽之氣以約在下之津液韭菜子去淫欲之火白龍骨固心腎之氣約以黃鹽使熱藥歸下成固攝之功兔腦丸母丁香六粒明乳香去油六分麝香六釐右為細末選八月臘月天醫日修合臨時活劈兔腦為丸六粒硃砂為衣隂乾蠟丸收藏産婦臨盆腰痛兒不能下溫湯囫圇咽下其兒立産男左女右手握藥出兔用小者老則不驗死者亦不驗修合時忌見雞犬經行婦人孝服及諸厭物兔腦丸四味單用皆能催生非特復用為方也兔性善走用其腦者神在精髓也蓋孕環之兔初懷左腋百年之後環歸於腦便能隱形可徵其腦為神之居也丁香入營通氣乳香入營活血麝香為臍之液走竄下通玄竅兔腦為腎之髓寒利專主滑胎二者皆有情之品兒感其氣自然下生一如水火濟而道成隂陽和而雨降也一方有用鼠卵者其走竄入腎之功與兔腦同然用兔腦不免傷生鼠取其外腎以油線縫之放去猶活其功德較勝且鼠腎之上有符篆朱文人佩於身能令見者歡恱所求如意諒嬰兒得之亦必生歡喜心也頥真堂經驗方分兩丸數各用三十六以坎為六坤之成數也其理頗通故并贅之千金吉祥丸應在斑龍丸後天麻煨一兩芎藭一兩桂心一兩桃仁一百枚牡丹皮一兩桃花瓣一兩栁絮一兩白术一兩熟地一兩菟絲子一升覆盆子一升五味子去子一兩茯苓一兩楮實子一升右為末蜜丸如豆大每服五丸空心苦酒下日三服吉祥者詩言吉夢熊羆男子之祥也婦人血積胞門或寒凝子宫致任脈不榮積年不孕斷緒絶産閲古方用蕩胞湯坐導藥而閨中弱質奚堪當硝黃虻蛭猛烈之品是方君以天麻者以其有遊子十二環圍於外結子透虛入莖中潛生土內復芎藭下行血海治血閉無子李杲曰女子肝虛不足宜天麻芎藭以補之也臣以桂心通子宫破瘀桃仁丹皮補肝活血桃花輕薄栁絮顛狂功皆下行走泄其性可以辟除穢惡其情足以感發春心佐以白术地黃補脾腎之正氣再使以菟絲覆盆五味子皆蔓延多子之品茯苓入陽通氣楮實入隂通神俾使內之時精氣神混合一氣自然一舉而得子矣方之取義甚佳用亦屢驗回生丹大黑豆三升用水浸取殼用絹袋盛殼同豆煮熟去豆不用將殼晒乾其汁留用紅花三兩炒黃色入好酒四碗煎三五滚去渣存汁聼用米醋九斤陳者佳大黃一斤為末蘇木三兩打碎用河水五碗前汁三碗聼用右將大黃末一斤入淨鍋下米醋三斤文火熬之以長木筯不住手攪之成膏再加醋三斤熬之又加醋三斤次第加畢然後下黑豆汁三碗再熬次下蘇木汁次下紅花汁熬成大黃膏取入瓦盆盛之大黃鍋焦亦鏟下入後藥同磨人參二兩當歸一兩川芎一兩酒洗香附一兩醋炒延胡索一兩醋炒蒼术一兩米泔浸炒蒲黃一兩隔紙炒茯苓一兩桃仁一兩去皮尖油川牛膝五錢甘草炙五錢地榆五錢酒洗川羌活五錢廣橘紅五錢白芍五錢酒炒木瓜三錢青皮三錢去穰炒白术三錢米泔浸炒烏藥二兩半去皮良薑四錢木香四錢乳香二錢沒藥二錢益母草二兩馬鞭草五錢秋葵子三錢熟地一兩酒蒸如法製就三稜五錢醋浸透紙裹煨五靈脂五錢醋煮化焙乾研細山茱茰肉五錢酒浸蒸搗爛入藥晒右三十味并前黑豆殼共晒乾為末入石臼內下大黃膏勻再下煉熟蜜一斤共搗千槌取起為九每丸重二錢七分靜室隂乾須二十餘日不可日晒不可火烘乾後止重二錢有零鎔蠟護之所謂蠟丸也用時去蠟殼調服回生丹催難産破血暈却有神功難産皆由氣滯不宣血暈每多惡露瘀塞下氣行血均為要法大黃下氣滌垢黑豆逐水破結紅花活中焦之血蘇木破下焦之血均用醋製監制入血不欲其傷氣也馬鞭草秋葵子入奇經通經催生蒲黃五靈脂消瘀下胞衣乳香沒藥療産難損傷烏藥木香除腹中氣分冷痛良薑香附解腹中血分冷痛牛膝桃仁地榆三稜延胡皆取其破血下行佐以四君四物填補正氣以蒼术羌活宣通衛氣以青皮木瓜橘紅甸安營氣益母為生血之品山茰為破結興陽能扶少陽之生氣是方雖漫無綱紀然其羣集催生逐瘀之藥仍有相須之妙已扼坐草四五日治法之要因選之絳雪園古方選注卷十
