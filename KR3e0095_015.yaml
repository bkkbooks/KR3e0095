body:
  text: 絳雪園古方選注卷十五蘇州王子接撰折傷科接骨丹七氣罌口古屋上廣漢前上層生瓶年深者良用純鋼銼生銼末研之無聲水飛一錢古文錢約五百年者良火煆醋淬七次研之無聲如塵者佳五分右和勻每服七厘先用甜瓜子仁去殼三錢嚼爛吐出拌藥再服下清酒過口附録烏古散邵以正真人方用路上牆腳下往來人便溺處久浸烏碎瓦一塊洗潔火煆米醋淬五次黃色為度刀刮細末研之無聲每服三錢好酒送下治骨折筋斷神效罌小口瓶也七氣者日月風雨露霜雪也火土結成堅剛性利復藉天之七氣能透骨入髓理傷續絶古文錢其半兩五銖出自秦漢紅銅者佳唐時開元錢亦可入藥功專腐蝕壞肉陳藏器曰能直入損處銲人斷骨甜瓜子仁開腸胃之壅遏通筋骨之機關因丹藥厘數甚微助以入胃轉輸為丹藥之嚮導也烏古散其理相同取其便捷故附録於後里東丸五靈脂炒醬色為度九兩五錢五分番木鱉用麻油在銅灼內煎滚放在內約二沉二浮即好十兩穿山甲炒黃焦二兩五錢地龍韭地者佳將滚湯泡熟在日內曬乾如不乾在火上焙乾不得隔夜九兩五錢黃麻灰切碎貯陽城罐內鹽泥封固頭大火內煆三兩麝香三錢三分藝香即白膠香楓脂也二兩五錢乳香去油一兩二錢五分古文五銖錢火煆十七個自然銅火煆紅醋淬二兩草烏去皮尖炒三錢五分全蠍去尾上鈎一兩二錢五分當歸酒洗一兩二錢五分京墨如方氏陳者住火燒烟盡為度二錢五分右酒糊為丸硃砂為衣蠟丸永久不壞每丸一錢五分重好酒開送下清晨服時須先略飲食然後用藥即下部傷亦食後服里東丸少陵僧所傳細繹是方都用血肉靈動之藥蓋草木具無形之氣不足以治形傷也五靈脂受五行之靈氣迅入肝經用以利氣行血退腫接骨番木鱉形傷者必腫腫則氣凝血死用以解破處之血熱消形傷之結腫穿山甲寓水而食穴陵而居用以出隂入陽走竄經絡迅達傷處蚯蚓上食稿壤下飲黃泉用以從陽入隂取蚓毒攻絡內之瘀更取蚓性逐水解熱消腫四者功專外消結腫分兩獨重者治傷綱領之藥也黃麻灰用以破血利小便行傷接骨麝香通關入腎用以外通百竅內透骨髓乳香入心經言諸痛皆屬心火用以護心托裏昏神定痛藝香性燥入脾用以勝肉理之濕排膿止痛强筋骨生肌肉古文錢跌撲損傷者用半兩五銖折傷必然肉敗用以腐蝕壞肉自然銅性燥破血用以逐敗惡之血六者去瘀生新安神定痛分兩次之者治傷之條目也草烏外風襲入破傷之處即為破傷風用以祛經絡之風從表而出全蠍外風襲入內風必從用以直攻破損之處消散內風二者非防微杜漸亦折傷中所必有之證也當歸補營血用以去瘀生新京墨灰澀能固衛氣用以生肌膚合傷縫二者各具收成之理統論全方雖非控經定證然其調治折傷之法井井有條先退腫後定痛腐其壞肉去其惡血祛其風活其血俾經脉流通則氣血條暢脂膏流著於傷處其骨自接敗蒲煎敗蒲席一握三寸久用炊單布一尺燒灰緋帛如手大燒灰亂髮如雞子大燒灰大黃一兩切浸湯成下桃仁四十九箇去皮尖甘草如中指節炙銼右七味以童子小便量多少煎湯成內酒一大盞次下大黃去滓分溫三服先銼敗蒲席半領煎湯浴衣被蓋覆斯須通利數行痛楚立差利及浴水赤勿怪即瘀血也金匱敗蒲煎治馬墜傷者馳騁之時陽鼓於上卒然而墜傷在於首病頭脹頸粗發熱體痛故其所治有不同於平常跌撲所傷者方中多用陳敗之物取其伏陽而行瘀也敗蒲席須作帆之蒲惟鄉船中嘗以為臥具者佳藉其精神所憑可以伏陽且陳蒲可逐上焦瘀血炊單布久蒸則受湯熟之氣可以化陽自熄退腫除陳亂髮療驚安神緋帛行瘀搜傷大黃桃仁甘草即桃仁調胃承氣二湯之義用以掃除三焦之瘀外用敗蒲沐浴以逐肌肉筋骨之瘀內外兼治非聖心化裁誰能及此絳雪園古方選注卷十五
